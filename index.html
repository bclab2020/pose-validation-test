<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿勢検証ツール Pro - ARゲージ＆ホモグラフィ補正</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <!-- OpenCV.js 読み込み -->
    <script async src="https://docs.opencv.org/4.5.x/opencv.js" type="text/javascript"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
        .controls { padding: 10px; text-align: center; background: #333; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: center; }
        button, select { padding: 10px 14px; font-size: 14px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        #startCamBtn { background: #4a4a4a; color: white; }
        #recordBtn { background: #d32f2f; color: white; }
        #stopRecBtn { background: #1976d2; color: white; }
        #switchBtn { background: #616161; color: white; }
        #calibBtn { background: #673ab7; color: white; } /* 紫色の校正ボタン */
        #resetCalibBtn { background: #f57c00; color: white; display: none; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        select { background: #eee; color: #333; }
        .container { display: flex; width: 100vw; height: calc(100vh - 120px); }
        .view-port { flex: 1; position: relative; border-right: 1px solid #444; overflow: hidden; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .stats { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 8px; font-size: 12px; border-radius: 4px; pointer-events: none; z-index: 10; }
        .recording-indicator { position: absolute; top: 10px; right: 10px; color: #ff1744; font-weight: bold; display: none; align-items: center; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 20px; z-index: 10; }
        #cvStatus { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: #888; }
    </style>
</head>
<body>

<div class="controls">
    <button id="startCamBtn" disabled>モデル読込中...</button>
    <button id="switchBtn" disabled>🔄 カメラ</button>
    <button id="calibBtn" disabled>🎯 ゲージ校正</button>
    <button id="resetCalibBtn" disabled>🔄 リセット</button>
    <div style="border-left: 1px solid #666; height: 30px; margin: 0 10px;"></div>
    
    <select id="modeSelect">
        <option value="none">可視化オフ</option>
        <option value="squat_side">スクワット側面 (モビリティ)</option>
        <option value="squat_front">スクワット正面 (スタビリティ)</option>
        <option value="single_leg" selected>片足立ち正面 (重心レーダー)</option>
    </select>
    
    <button id="recordBtn" disabled>🔴 計測開始</button>
    <button id="stopRecBtn" disabled>⏹️ 保存</button>
</div>

<div class="container">
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="stats" id="statsMP">MediaPipe</div>
        <div class="recording-indicator" id="recIndMP">● RECORDING</div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div class="stats" id="statsMN">MoveNet</div>
        <div class="recording-indicator" id="recIndMN">● RECORDING</div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>
<div id="cvStatus">OpenCV.js loading...</div>

<script>
    const video = document.getElementById('video');
    const canvasMP = document.getElementById('canvasMP');
    const canvasMN = document.getElementById('canvasMN');
    const ctxMP = canvasMP.getContext('2d');
    const ctxMN = canvasMN.getContext('2d');
    const modeSelect = document.getElementById('modeSelect');
    const recordBtn = document.getElementById('recordBtn');
    const stopRecBtn = document.getElementById('stopRecBtn');
    const calibBtn = document.getElementById('calibBtn');
    const resetCalibBtn = document.getElementById('resetCalibBtn');
    const recInds = [document.getElementById('recIndMP'), document.getElementById('recIndMN')];
    
    let detectorMP, detectorMN;
    let isCameraRunning = false, isRecording = false;
    let logData = [], frameCount = 0;
    let currentFacingMode = 'environment'; 

    // AR/ホモグラフィ関連の状態
    let calibrationPoints = []; // 画面タップで取得した4点
    let isCalibratingMat = false;
    let homographyMatrix = null; // OpenCVで計算した行列

    let calib = {};
    function resetEvaluation() {
        ['MediaPipe', 'MoveNet'].forEach(m => {
            calib[m] = { 
                state: 'waiting', countdownStart: 0, frames: 0, 
                sumP: 0, sumS: 0, baseP: 0, baseS: 0, 
                baseShoulderW: 0, baseHipX: 0, baseHipY: 0, 
                swayHistory: [] 
            };
        });
    }
    resetEvaluation();

    // OpenCV.js の準備完了待ち
    var Module = {
        onRuntimeInitialized: function() {
            document.getElementById('cvStatus').innerText = "OpenCV.js Ready";
            calibBtn.disabled = false;
        }
    };

    modeSelect.addEventListener('change', () => {
        resetEvaluation();
        if (modeSelect.value === 'single_leg') {
            calibBtn.style.display = 'inline-block';
            resetCalibBtn.style.display = 'inline-block';
            resetCalibBtn.disabled = false;
        } else {
            calibBtn.style.display = 'none';
            resetCalibBtn.style.display = 'none';
        }
    });

    // 🎯 ゲージ校正ボタン：タップモード開始
    calibBtn.addEventListener('click', () => {
        calibrationPoints = [];
        isCalibratingMat = true;
        homographyMatrix = null;
        alert("マットの4隅を「左上→右上→右下→左下」の順でタップしてください。");
    });

    // キャンバスをタップして座標を取得
    const handleCanvasClick = (e) => {
        if (!isCalibratingMat) return;
        const rect = e.target.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvasMP.width / rect.width);
        const y = (e.clientY - rect.top) * (canvasMP.height / rect.height);
        calibrationPoints.push({x, y});

        if (calibrationPoints.length === 4) {
            isCalibratingMat = false;
            computeHomography();
        }
    };
    canvasMP.addEventListener('mousedown', handleCanvasClick);
    canvasMN.addEventListener('mousedown', handleCanvasClick);

    // ホモグラフィ行列の計算
    function computeHomography() {
        try {
            // ソース（タップした4点）
            let srcCoords = [];
            calibrationPoints.forEach(p => srcCoords.push(p.x, p.y));
            let srcMat = cv.matFromArray(4, 1, cv.CV_32FC2, srcCoords);

            // デスティネーション（理想的な正方形 500x500）
            let dstCoords = [0, 0, 500, 0, 500, 500, 0, 500];
            let dstMat = cv.matFromArray(4, 1, cv.CV_32FC2, dstCoords);

            // 行列計算
            homographyMatrix = cv.getPerspectiveTransform(srcMat, dstMat);
            
            srcMat.delete(); dstMat.delete();
            resetEvaluation();
            alert("校正完了！ARゲージをロックしました。");
        } catch (err) {
            console.error(err);
            alert("エラーが発生しました。もう一度校正してください。");
            calibrationPoints = [];
        }
    }

    resetCalibBtn.addEventListener('click', () => {
        resetEvaluation();
        calibrationPoints = [];
        homographyMatrix = null;
    });

    const KEYPOINT_NAMES = [
        "nose", "left_eye_inner", "left_eye", "left_eye_outer", "right_eye_inner", "right_eye", "right_eye_outer", 
        "left_ear", "right_ear", "mouth_left", "mouth_right", "left_shoulder", "right_shoulder", "left_elbow", "right_elbow", 
        "left_wrist", "right_wrist", "left_pinky", "right_pinky", "left_index", "right_index", "left_thumb", "right_thumb", 
        "left_hip", "right_hip", "left_knee", "right_knee", "left_ankle", "right_ankle", "left_heel", "right_heel", 
        "left_foot_index", "right_foot_index"
    ];

    async function initModels() {
        await tf.ready();
        detectorMP = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' });
        detectorMN = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });
        const btn = document.getElementById('startCamBtn');
        btn.innerText = "📷 カメラ起動"; btn.disabled = false;
    }

    async function setupCamera() {
        if (video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: currentFacingMode } });
        video.srcObject = stream;
        return new Promise((resolve) => {
            video.onloadeddata = async () => {
                canvasMP.width = canvasMN.width = video.videoWidth; canvasMP.height = canvasMN.height = video.videoHeight;
                await video.play(); resolve();
            };
        });
    }

    document.getElementById('startCamBtn').addEventListener('click', async () => {
        await setupCamera();
        isCameraRunning = true;
        document.getElementById('startCamBtn').disabled = true;
        document.getElementById('switchBtn').disabled = false;
        recordBtn.disabled = false;
        processFrame();
    });

    recordBtn.addEventListener('click', () => {
        isRecording = true; logData = []; frameCount = 0;
        let csvHeaders = ["Frame", "Timestamp_ms", "Model", "InferenceTime_ms", "Score_Average"];
        KEYPOINT_NAMES.forEach((name, index) => csvHeaders.push(`${index}_${name}_X`, `${index}_${name}_Y`, `${index}_${name}_Score`));
        logData.push(csvHeaders);
        recordBtn.disabled = true; stopRecBtn.disabled = false; modeSelect.disabled = true; resetCalibBtn.disabled = true;
        recInds.forEach(el => el.style.display = 'flex');
    });

    stopRecBtn.addEventListener('click', () => {
        isRecording = false; saveCSV();
        recordBtn.disabled = false; stopRecBtn.disabled = true; modeSelect.disabled = false; resetCalibBtn.disabled = false;
        recInds.forEach(el => el.style.display = 'none');
    });

    function saveCSV() {
        const fileName = `pose_data_${modeSelect.value}_${new Date().toISOString().replace(/[:.]/g, '-')}.csv`;
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI("data:text/csv;charset=utf-8," + logData.map(e => e.join(",")).join("
")));
        link.setAttribute("download", fileName);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    async function processFrame() {
        if (!isCameraRunning) return;
        const currentMode = modeSelect.value;
        ctxMP.clearRect(0, 0, canvasMP.width, canvasMP.height);
        ctxMN.clearRect(0, 0, canvasMN.width, canvasMN.height);
        
        ctxMP.drawImage(video, 0, 0, canvasMP.width, canvasMP.height);
        ctxMN.drawImage(video, 0, 0, canvasMN.width, canvasMN.height);

        const posesMP = await detectorMP.estimatePoses(video);
        drawPoses(posesMP, ctxMP, 'red', currentMode, 'MediaPipe', canvasMP);
        if (isRecording) logFrame(posesMP, "MediaPipe", 0);

        const posesMN = await detectorMN.estimatePoses(video);
        drawPoses(posesMN, ctxMN, 'cyan', currentMode, 'MoveNet', canvasMN);
        if (isRecording) logFrame(posesMN, "MoveNet", 0);

        requestAnimationFrame(processFrame);
    }

    function calculateSignedTilt(L, R) {
        if (!L || !R || L.score < 0.3 || R.score < 0.3) return null;
        return Math.atan2(R.y-L.y, R.x-L.x) * 180 / Math.PI;
    }

    // 画面座標(px)をマット上の正規化座標(0-500)に変換
    function transformPointToMat(x, y) {
        if (!homographyMatrix) return {x, y, isNormalized: false};
        let src = cv.matFromArray(1, 1, cv.CV_32FC2, [x, y]);
        let dst = new cv.Mat();
        cv.perspectiveTransform(src, dst, homographyMatrix);
        let rx = dst.data32F[0];
        let ry = dst.data32F[1];
        src.delete(); dst.delete();
        return {x: rx, y: ry, isNormalized: true};
    }

    function drawPoses(poses, ctx, color, mode, modelName, canvasObj) {
        if (poses.length === 0) return;
        const kps = poses[0].keypoints;
        const getK = (n) => kps.find(k => k.name === n);
        renderSkeleton(ctx, kps, color);

        // --- ARゲージ描画ロジック ---
        if (calibrationPoints.length > 0) {
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = "rgba(103, 58, 183, 0.8)"; // 紫
            ctx.lineWidth = 2;
            ctx.moveTo(calibrationPoints[0].x, calibrationPoints[0].y);
            for(let i=1; i<calibrationPoints.length; i++) ctx.lineTo(calibrationPoints[i].x, calibrationPoints[i].y);
            if(calibrationPoints.length === 4) ctx.closePath();
            ctx.stroke();
            ctx.setLineDash([]);

            // タップ箇所のマーカー
            calibrationPoints.forEach((p, idx) => {
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 2*Math.PI); ctx.fill();
                ctx.fillStyle = "black"; ctx.font = "10px sans-serif";
                ctx.fillText(idx+1, p.x-3, p.y+4);
            });
        }

        if (mode === 'single_leg') {
            const rShoulder = getK('right_shoulder'), lShoulder = getK('left_shoulder');
            const rHip = getK('right_hip'), lHip = getK('left_hip');
            const rAnkle = getK('right_ankle'), lAnkle = getK('left_ankle');

            if (rShoulder && lShoulder && rHip && lHip) {
                const pelvicTilt = calculateSignedTilt(lHip, rHip);
                const shoulderTilt = calculateSignedTilt(lShoulder, rShoulder);
                let currentHipMidX = (lHip.x + rHip.x) / 2;
                let currentHipMidY = (lHip.y + rHip.y) / 2;
                let c = calib[modelName];

                // ホモグラフィ適用（座標の正規化）
                let normHip = transformPointToMat(currentHipMidX, currentHipMidY);

                if (!c.isDone) {
                    c.countdownStart = c.countdownStart || performance.now();
                    let remaining = Math.ceil(3.0 - ((performance.now() - c.countdownStart) / 1000));
                    if (remaining > 0) {
                        ctx.fillStyle = "#FFFF00"; ctx.font = "bold 24px sans-serif";
                        ctx.fillText(`⏳ ${remaining}秒後に記録`, 10, 60);
                    } else {
                        c.baseP = pelvicTilt; c.baseS = shoulderTilt;
                        c.baseHipX = normHip.x; c.baseHipY = normHip.y;
                        c.baseShoulderW = Math.abs(rShoulder.x - lShoulder.x);
                        c.isDone = true;
                    }
                } else {
                    // --- 重心レーダー描画 ---
                    const radarSize = Math.max(120, canvasObj.width * 0.25);
                    const radarX = canvasObj.width - radarSize - 15;
                    const radarY = canvasObj.height - radarSize - 15;
                    ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(radarX, radarY, radarSize, radarSize);
                    ctx.strokeStyle = "white"; ctx.strokeRect(radarX, radarY, radarSize, radarSize);

                    // 軌跡計算
                    let dx = normHip.x - c.baseHipX;
                    let dy = normHip.y - c.baseHipY;
                    c.swayHistory.push({dx, dy});
                    if (c.swayHistory.length > 200) c.swayHistory.shift();

                    ctx.beginPath();
                    ctx.strokeStyle = "#00FFFF"; ctx.lineWidth = 2;
                    let cx = radarX + radarSize/2, cy = radarY + radarSize/2;
                    c.swayHistory.forEach((pt, i) => {
                        let px = cx + pt.dx * (radarSize / 100); // 感度調整
                        let py = cy + pt.dy * (radarSize / 100);
                        if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                    });
                    ctx.stroke();

                    // 判定
                    let devP = Math.abs(pelvicTilt - c.baseP);
                    let devS = Math.abs(shoulderTilt - c.baseS);
                    if (devP < 8 && devS < 8 && Math.abs(dx) < 30) {
                        ctx.save(); ctx.font = "bold 140px sans-serif";
                        ctx.fillStyle = "rgba(0, 255, 0, 0.4)"; ctx.textAlign = "center";
                        ctx.fillText("OK", canvasObj.width/2, canvasObj.height/2);
                        ctx.restore();
                    }
                }
            }
        }
    }

    function renderSkeleton(ctx, kps, color) {
        const connections = [[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],[23,25],[25,27],[24,26],[26,28]];
        ctx.strokeStyle = color; ctx.lineWidth = 3;
        connections.forEach(c => {
            const s = kps.find(k => k.name === KEYPOINT_NAMES[c[0]]);
            const e = kps.find(k => k.name === KEYPOINT_NAMES[c[1]]);
            if (s && e && s.score > 0.3 && e.score > 0.3) {
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke();
            }
        });
    }

    function logFrame(poses, model, time) {
        if (!isRecording) return;
        frameCount++;
        let row = [frameCount, performance.now().toFixed(1), model, time.toFixed(1)];
        if (poses.length > 0) {
            const kps = poses[0].keypoints;
            row.push(0.9); // Dummy confidence
            KEYPOINT_NAMES.forEach(n => {
                const k = kps.find(x => x.name === n);
                if (k) row.push(k.x.toFixed(2), k.y.toFixed(2), (k.score || 0).toFixed(3));
                else row.push("", "", "");
            });
        }
        logData.push(row);
    }

    document.getElementById('switchBtn').addEventListener('click', async () => {
        currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
        await setupCamera();
    });

    window.onload = initModels;
</script>
</body>
</html>
