<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿勢検証ツール Pro - 統合マスター版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://unpkg.com/js-aruco@0.0.1/src/cv.js"></script>
    <script src="https://unpkg.com/js-aruco@0.0.1/src/aruco.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
        .controls { padding: 10px; text-align: center; background: #333; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: center; }
        button, select { padding: 10px 14px; font-size: 14px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        #startCamBtn { background: #1976d2; color: white; min-width: 250px; }
        #resetEvalBtn { background: #f57c00; color: white; display: none; }
        .container { display: flex; width: 100vw; height: calc(100vh - 120px); }
        .view-port { flex: 1; position: relative; border-right: 1px solid #444; overflow: hidden; background: #000; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .calib-status { position: absolute; bottom: 10px; left: 10px; font-size: 12px; padding: 5px 12px; border-radius: 20px; z-index: 20; font-weight: bold; }
        .scanning { background: #ffab00; color: black; }
        .locked { background: #00c853; color: white; }
        .stats { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px; font-size: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="controls">
    <button id="startCamBtn" disabled>システム準備中...</button>
    <button id="resetEvalBtn">🔄 測定リセット</button>
    <select id="modeSelect">
        <option value="none">可視化オフ</option>
        <option value="squat_side">スクワット側面 (モビリティ)</option>
        <option value="squat_front">スクワット正面 (スタビリティ)</option>
        <option value="single_leg" selected>片足立ち正面 (重心レーダー)</option>
    </select>
    <button id="recordBtn" disabled>🔴 計測開始</button>
</div>

<div class="container">
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="stats">MediaPipe</div>
        <div id="statusMP" class="calib-status"></div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div class="stats">MoveNet</div>
        <div id="statusMN" class="calib-status"></div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('video');
    const canvasMP = document.getElementById('canvasMP');
    const canvasMN = document.getElementById('canvasMN');
    const ctxMP = canvasMP.getContext('2d');
    const ctxMN = canvasMN.getContext('2d');
    const modeSelect = document.getElementById('modeSelect');
    const startCamBtn = document.getElementById('startCamBtn');
    
    let detectorMP, detectorMN, detectorAR;
    let isCameraRunning = false;
    let homographyMatrix = null;
    let markerCoords = { 0:null, 1:null, 2:null, 3:null };
    let calib = {};

    const KEYPOINT_NAMES = ["nose", "left_eye_inner", "left_eye", "left_eye_outer", "right_eye_inner", "right_eye", "right_eye_outer", "left_ear", "right_ear", "mouth_left", "mouth_right", "left_shoulder", "right_shoulder", "left_elbow", "right_elbow", "left_wrist", "right_wrist", "left_pinky", "right_pinky", "left_index", "right_index", "left_thumb", "right_thumb", "left_hip", "right_hip", "left_knee", "right_knee", "left_ankle", "right_ankle", "left_heel", "right_heel", "left_foot_index", "right_foot_index"];

    async function initSystem() {
        try {
            await tf.ready();
            detectorMP = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'lite' });
            detectorMN = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });
            
            for (let i = 0; i < 30; i++) {
                if (typeof AR !== 'undefined') { detectorAR = new AR.Detector(); break; }
                await new Promise(r => setTimeout(r, 100));
            }

            startCamBtn.innerText = "📷 カメラを起動（統合版）";
            startCamBtn.disabled = false;
            resetEvaluation();
        } catch (e) {
            startCamBtn.innerText = "❌ 読込エラー。再読込してください";
        }
    }

    function resetEvaluation() {
        ['MediaPipe', 'MoveNet'].forEach(m => {
            calib[m] = { state: 'waiting', countdownStart: 0, frames: 0, baseHipX: null, baseHipY: null, swayHistory: [] };
        });
    }

    startCamBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'environment' } });
            video.srcObject = stream;
            video.onloadeddata = () => {
                canvasMP.width = canvasMN.width = video.videoWidth; 
                canvasMP.height = canvasMN.height = video.videoHeight;
                isCameraRunning = true;
                startCamBtn.style.display = 'none';
                document.getElementById('resetEvalBtn').style.display = 'inline-block';
                updateStatusUI();
                processFrame();
            };
        } catch (e) { alert("カメラ起動失敗"); }
    });

    function updateStatusUI() {
        const msg = modeSelect.value === 'single_leg' ? "⌛ マーカー走査中..." : "✅ 関節認識モード実行中";
        const cls = modeSelect.value === 'single_leg' ? "scanning" : "locked";
        document.getElementById('statusMP').innerText = document.getElementById('statusMN').innerText = msg;
        document.getElementById('statusMP').className = document.getElementById('statusMN').className = "calib-status " + cls;
    }

    modeSelect.onchange = () => { resetEvaluation(); updateStatusUI(); };

    async function processFrame() {
        if (!isCameraRunning) return;
        ctxMP.drawImage(video, 0, 0, canvasMP.width, canvasMP.height);
        ctxMN.drawImage(video, 0, 0, canvasMN.width, canvasMN.height);

        // AR認識
        if (detectorAR && !homographyMatrix && modeSelect.value === 'single_leg') {
            let markers = detectorAR.detect(ctxMP.getImageData(0,0,canvasMP.width, canvasMP.height));
            markers.forEach(m => {
                if (m.id >= 0 && m.id <= 3) {
                    let cx = 0, cy = 0; m.corners.forEach(c => { cx+=c.x; cy+=c.y; });
                    markerCoords[m.id] = { x: cx/4, y: cy/4 };
                    ctxMP.fillStyle = "#00ff00"; ctxMP.fillRect(cx/4-5, cy/4-5, 10, 10);
                }
            });
            if (markerCoords[0] && markerCoords[1] && markerCoords[2] && markerCoords[3]) applyHomography(markerCoords);
        }

        const posesMP = await detectorMP.estimatePoses(video);
        const posesMN = await detectorMN.estimatePoses(video);

        drawAndAnalyze(posesMP, ctxMP, 'red', 'MediaPipe', canvasMP);
        drawAndAnalyze(posesMN, ctxMN, 'cyan', 'MoveNet', canvasMN);

        requestAnimationFrame(processFrame);
    }

    function calculateAngle(A, B, C) {
        if (!A || !B || !C) return null;
        let rad = Math.atan2(C.y-B.y, C.x-B.x) - Math.atan2(A.y-B.y, A.x-B.x);
        let deg = Math.abs(rad * 180 / Math.PI);
        return deg > 180 ? 360 - deg : deg;
    }

    function getAngleFromVertical(A, B) {
        if (!A || !B) return null;
        return Math.abs(Math.atan2(B.x - A.x, B.y - A.y) * 180 / Math.PI);
    }

    function drawAndAnalyze(poses, ctx, color, modelName, canvasObj) {
        if (poses.length === 0) return;
        const kps = poses[0].keypoints;
        const getK = (n) => kps.find(k => k.name === n && k.score > 0.3);

        // 骨格描画（無条件）
        const connections = [[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],[23,25],[25,27],[24,26],[26,28]];
        ctx.strokeStyle = color; ctx.lineWidth = 2;
        connections.forEach(([s, e]) => {
            const p1 = kps[s], p2 = kps[e];
            if (p1 && p2 && p1.score > 0.3 && p2.score > 0.3) {
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            }
        });
        kps.forEach(k => { if(k.score > 0.3) { ctx.fillStyle = color; ctx.beginPath(); ctx.arc(k.x, k.y, 4, 0, 2*Math.PI); ctx.fill(); }});

        const mode = modeSelect.value;
        const rShoulder = getK('right_shoulder'), rHip = getK('right_hip'), rKnee = getK('right_knee'), rAnkle = getK('right_ankle');
        const lShoulder = getK('left_shoulder'), lHip = getK('left_hip'), lKnee = getK('left_knee'), lAnkle = getK('left_ankle');

        if (mode === 'squat_side' && rShoulder && rHip && rKnee && rAnkle) {
            const torso = getAngleFromVertical(rShoulder, rHip);
            const tibia = getAngleFromVertical(rKnee, rAnkle);
            ctx.fillStyle = "white"; ctx.font = "bold 20px sans-serif";
            ctx.fillText(`体幹前傾: ${torso.toFixed(1)}°`, 20, 60);
            ctx.fillText(`脛の前傾: ${tibia.toFixed(1)}°`, 20, 90);
            if (Math.abs(torso - tibia) < 15) { ctx.fillStyle = "#00ff00"; ctx.fillText("✅ 平行性良好", 20, 120); }
            else { ctx.fillStyle = "#ff4444"; ctx.fillText("⚠️ 平行性不足", 20, 120); }
        } 
        else if (mode === 'squat_front' && rHip && rKnee && rAnkle && lHip && lKnee && lAnkle) {
            const rAngle = calculateAngle(rHip, rKnee, rAnkle);
            const lAngle = calculateAngle(lHip, lKnee, lAnkle);
            ctx.fillStyle = "white"; ctx.font = "bold 20px sans-serif";
            ctx.fillText(`右膝: ${rAngle.toFixed(1)}°`, 20, 60);
            ctx.fillText(`左膝: ${lAngle.toFixed(1)}°`, 20, 90);
            if (rAngle < 165 || lAngle < 165) { ctx.fillStyle = "#ff4444"; ctx.fillText("⚠️ ニーイン発生", 20, 120); }
        }
        else if (mode === 'single_leg' && lHip && rHip) {
            let hX = (lHip.x + rHip.x)/2, hY = (lHip.y + rHip.y)/2;
            let targetX = hX, targetY = hY;
            if (homographyMatrix) {
                let m = homographyMatrix; let w = m[6]*hX + m[7]*hY + m[8];
                targetX = (m[0]*hX + m[1]*hY + m[2])/w; targetY = (m[3]*hX + m[4]*hY + m[5])/w;
            }
            const c = calib[modelName];
            if (c.state === 'waiting') { c.state = 'countdown'; c.countdownStart = performance.now(); }
            else if (c.state === 'countdown') {
                let rem = Math.ceil(4 - (performance.now() - c.countdownStart)/1000);
                ctx.fillStyle = "yellow"; ctx.font = "bold 30px sans-serif"; ctx.fillText(`⏳ 静止... ${rem}`, 20, 100);
                if (rem <= 0) c.state = 'calibrating';
            } else if (c.state === 'calibrating') {
                c.baseHipX = (c.baseHipX || 0) + targetX; c.baseHipY = (c.baseHipY || 0) + targetY;
                if (++c.frames >= 20) { c.baseHipX /= 20; c.baseHipY /= 20; c.state = 'done'; }
            } else if (c.state === 'done') {
                const rSize = 250, rx = canvasObj.width - rSize - 20, ry = canvasObj.height - rSize - 20;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(rx, ry, rSize, rSize);
                let dx = (targetX - c.baseHipX) * 2.5, dy = (targetY - c.baseHipY) * 2.5;
                c.swayHistory.push({x: dx, y: dy}); if (c.swayHistory.length > 100) c.swayHistory.shift();
                ctx.beginPath(); ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 2;
                c.swayHistory.forEach((p, i) => {
                    let px = rx+rSize/2+p.x, py = ry+rSize/2+p.y;
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                });
                ctx.stroke();
                ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(rx+rSize/2+dx, ry+rSize/2+dy, 8, 0, 2*Math.PI); ctx.fill();
            }
        }
    }

    function applyHomography(pts) {
        let x0 = pts[0].x, y0 = pts[0].y, x1 = pts[1].x, y1 = pts[1].y, x2 = pts[2].x, y2 = pts[2].y, x3 = pts[3].x, y3 = pts[3].y;
        let dx1 = x1-x2, dx2 = x3-x2, sx = x0-x1+x2-x3, dy1 = y1-y2, dy2 = y3-y2, sy = y0-y1+y2-y3, det = dx1*dy2-dy1*dx2;
        if (Math.abs(det) < 0.1) return;
        let g = (sx*dy2-sy*dx2)/det, h = (dx1*sy-dy1*sx)/det;
        let a = x1-x0+g*x1, b = x3-x0+h*x3, c = x0, d = y1-y0+g*y1, e = y3-y0+h*y3, f = y0;
        let detH = a*(e-f*h) - b*(d-f*g) + c*(d*h-e*g);
        let i = 1/detH;
        let inv = [ (e-f*h)*i, (c*h-b)*i, (b*f-c*e)*i, (g*f-d)*i, (a-c*g)*i, (d*c-a*f)*i, (d*h-e*g)*i, (b*g-a*h)*i, (a*e-b*d)*i ];
        homographyMatrix = [inv[0]*500, inv[1]*500, inv[2]*500, inv[3]*500, inv[4]*500, inv[5]*500, inv[6], inv[7], inv[8]];
        updateStatusUI();
    }

    initSystem();
    document.getElementById('resetEvalBtn').onclick = () => { resetEvaluation(); homographyMatrix = null; markerCoords = {0:null,1:null,2:null,3:null}; updateStatusUI(); };
</script>
</body>
</html>
