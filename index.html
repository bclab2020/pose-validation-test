<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNECT AI - Master Evaluation Engine V63 (Workflow Wizard)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        .controls { padding: 12px 15px; background: #1a1a1a; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; align-items: center; border-bottom: 2px solid #333; }
        button, select, input { padding: 8px 12px; font-size: 14px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; outline: none; }
        .mode-dropdown { background: #333; color: #deff9a; border: 1px solid #555; padding: 8px; font-size: 14px; }
        .mode-dropdown optgroup { color: #aaa; background: #222; }
        #durationSelect { background: #1976d2; color: #fff; border: 1px solid #0d47a1; }
        #startBtn { background: #1976d2; color: white; }
        #startBtn:disabled { background: #555; cursor: not-allowed; }
        #recBtn { background: #d32f2f; color: white; min-width: 150px; }
        #downloadCsvBtn { background: #2e7d32; color: white; }
        #printReportBtn { background: #ff9100; color: #000; box-shadow: 0 0 10px rgba(255,145,0,0.3); }
        .toggle-label { color: #00bfff; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px; background: #222; padding: 6px 10px; border-radius: 6px; border: 1px solid #00bfff; }
        .input-group { display: flex; align-items: center; gap: 5px; background: #333; padding: 4px 10px; border-radius: 6px; border: 1px solid #555; }
        .input-group input[type="number"] { width: 60px; background: #222; color: #00bfff; text-align: right; border: 1px solid #444; font-weight: bold; }
        #calibrateMatBtn { background: #673ab7; color: white; }
        #calibrateMatBtn.active { background: #ffeb3b; color: black; box-shadow: 0 0 15px rgba(255,235,59,0.8); animation: pulse 1s infinite; }
        #arCalibrateBtn { background: #00e676; color: black; font-weight: bold; box-shadow: 0 0 10px rgba(0,230,118,0.3); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .info-panel { position: absolute; top: 55px; left: 15px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px; color: #fff; font-size: 12px; z-index: 10; border-left: 3px solid #673ab7; pointer-events: none; }
        .debug-panel { position: absolute; top: 110px; left: 15px; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 6px; font-size: 14px; color: #ffeb3b; border: 2px solid #ffeb3b; z-index: 50; font-family: monospace; pointer-events: none; box-shadow: 0 0 15px rgba(255,235,59,0.4); }
        #tiltPanel { display: none; position: absolute; top: 170px; left: 15px; background: rgba(15,15,15,0.9); border: 2px solid #ff9100; border-radius: 12px; padding: 15px; z-index: 500; box-shadow: 0 5px 20px rgba(255,145,0,0.3); }
        .tilt-header { color: #ff9100; font-size: 14px; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .tilt-slider { width: 200px; cursor: pointer; }
        .tilt-val { display: block; text-align: center; color: white; font-size: 16px; font-weight: bold; margin-top: 5px; }
        #playPauseBtn { background: #00bfff; color: #000; min-width: 90px; }
        #retakeBtn { background: #555; color: white; }
        #editFrameBtn { background: #ff9100; color: #000; font-weight: bold; }
        .container { display: flex; width: 100vw; height: calc(100dvh - 70px); position: relative; background: #000; justify-content: center; align-items: center; }
        .view-port { width: 100%; height: 100%; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; touch-action: none; -webkit-user-select: none; user-select: none; }
        .label { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 4px; font-size: 14px; color: #deff9a; border: 1px solid #deff9a; z-index: 10; font-weight: bold; pointer-events: none; }
        .timer-display { position: absolute; top: 15px; right: 15px; background: rgba(211, 47, 47, 0.9); color: white; padding: 8px 18px; font-size: 20px; font-weight: bold; border-radius: 6px; display: none; z-index: 100; pointer-events: none; }
        .radar-wrapper { position: absolute; top: 60px; right: 15px; width: 150px; height: 150px; z-index: 200; touch-action: none; cursor: grab; transition: transform 0.2s, opacity 0.2s; }
        .radar-wrapper.dragging { cursor: grabbing; transform: scale(1.1); opacity: 0.8; z-index: 999; box-shadow: 0 10px 25px rgba(0,0,0,0.8); border-radius: 50%; transition: none; }
        .radar-box { width: 150px; height: 150px; background: rgba(0, 0, 0, 0.85); border-radius: 50%; box-shadow: 0 0 15px rgba(255,82,82,0.5); border: 2px solid #ff5252; pointer-events: none; }
        .radar-title { position: absolute; top: -20px; left: 15px; font-size: 12px; background: rgba(0,0,0,0.8); padding: 3px 8px; border-radius: 4px; font-weight: bold; white-space: nowrap; pointer-events: none; color: #ff5252; border: 1px solid #ff5252; }
        #dpadPanel { position: absolute; top: 30px; right: 30px; background: rgba(15, 15, 15, 0.95); border: 2px solid #00bfff; border-radius: 16px; padding: 15px 25px; z-index: 1000; display: none; flex-direction: column; align-items: center; box-shadow: 0 5px 20px rgba(0, 191, 255, 0.3); }
        .dpad-header { color: #00bfff; font-size: 14px; font-weight: bold; margin-bottom: 12px; }
        .dpad-row { display: flex; justify-content: center; gap: 8px; margin: 4px 0; }
        .dpad-btn { width: 55px; height: 55px; border-radius: 12px; background: #2a2a2a; color: white; font-size: 24px; border: 1px solid #444; cursor: pointer; }
        .dpad-btn:active { background: #00bfff; color: black; }
        .dpad-step-btn { font-size: 14px; background: #1976d2; border: none; font-weight: bold; }
        .dpad-close { position: absolute; right: -10px; top: -10px; width: 32px; height: 32px; border-radius: 50%; background: #ff5252; color: white; border: none; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        @media print { body { background: white; color: black; overflow: visible; } .controls, .container, #tiltPanel, #dpadPanel, .debug-panel { display: none !important; } }
    </style>
</head>
<body>

<div class="controls" id="setupControls">
    <span style="color:#00bfff; font-weight:bold; font-size:16px;">1. カメラ準備</span>
    <select id="videoSource" style="background:#fff; color:#000;"><option value="">カメラ検索中...</option></select>
    <button id="startBtn" disabled>⏳ 起動準備中...</button>
</div>

<div class="controls" id="mainControls" style="display:none; background:#1a1a1a;">
    <div class="input-group"><span style="color:#aaa; font-size:12px;">身長</span><input type="number" id="patientHeight" value="170" min="100" max="220"><span style="color:#aaa; font-size:12px;">cm</span></div>
    <div class="input-group"><span style="color:#aaa; font-size:12px;">AR</span><input type="number" id="arMarkerSize" value="17.5" min="5" max="50" step="0.1"><span style="color:#aaa; font-size:12px;">cm</span></div>
    <button id="arCalibrateBtn">📷 AR校正</button>
    <button id="calibrateMatBtn">📏 手動校正</button>
    <span style="color:#00bfff; font-weight:bold; margin-left:10px;">現在のポーズ:</span>
    <select id="modeSelect" class="mode-dropdown" onchange="switchReportTab(this.value)">
        <optgroup label="■ 静止姿勢アライメント">
            <option value="front" selected>🧍 前面</option><option value="back">🧍 後面</option><option value="l_side">🧍 左側面</option><option value="r_side">🧍 右側面</option>
        </optgroup>
        <optgroup label="■ 動的機能評価">
            <option value="dyn_overhead">🏋️ OHS [前面]</option><option value="dyn_overhead_side">🏋️ OHS [側面]</option><option value="dyn_single_r">🦵 片脚バランス [右軸]</option>
            <option value="dyn_single_l">🦵 片脚バランス [左軸]</option><option value="dyn_flex_fwd">🙇 立位体前屈</option><option value="dyn_flex_bwd">🤸 立位体後屈</option>
            <option value="dyn_shoulder_r">👐 肩複合可動性 [右上]</option><option value="dyn_shoulder_l">👐 肩複合可動性 [左上]</option>
        </optgroup>
    </select>
    <select id="durationSelect">
        <option value="5000">⏱️ 5秒間</option><option value="10000" selected>⏱️ 10秒間</option><option value="15000">⏱️ 15秒間</option><option value="20000">⏱️ 20秒間</option>
    </select>
    <label class="toggle-label"><input type="checkbox" id="showSwayAlert" checked> 警告表示</label>
    <button id="recBtn">🔴 録画スタート</button>
    <button id="reconnectCamBtn" style="background:#333; color:#ccc; border: 1px solid #555;">⚙️ カメラ変更</button>
</div>

<div class="controls" id="reviewControls" style="display:none; background:#002233; border-bottom: 2px solid #00bfff;">
    <span style="color:#39ff14; font-weight:bold; font-size:16px; margin-right:15px;">📝 データ確認中</span>
    <button id="retakeBtn">🔙 撮影をやり直す</button>
    <button id="editFrameBtn">✂️ ポイント微調整</button>
    <div id="playbackUI" style="display:flex; align-items:center; gap:10px; margin: 0 15px;">
        <button id="playPauseBtn">▶ 再生</button>
        <input type="range" id="timelineSlider" min="0" max="100" value="0" style="width:200px;">
        <span id="frameCounter" style="color:#00bfff; font-weight:bold; font-size:14px;">0 / 0</span>
    </div>
    <button id="nextPoseBtn" style="background:#39ff14; color:black; font-size:16px; padding: 8px 20px;">✅ 保存して次のポーズへ ➔</button>
    <button id="finishBtn" onclick="prepareAndPrintReport()" style="background:#ff9100; color:black; margin-left:15px;">📄 レポート出力</button>
</div>

<div class="container">
    <div id="timerDisplay" class="timer-display">REC 10.0s</div>
    <div id="dpadPanel">
        <div class="dpad-header">🎯 ポイント微調整 <button class="dpad-close" id="dpadClose">✖</button></div>
        <div class="dpad-row"><button class="dpad-btn" id="dpadUp">▲</button></div>
        <div class="dpad-row"><button class="dpad-btn" id="dpadLeft">◀</button><button class="dpad-btn dpad-step-btn" id="dpadStep">1px</button><button class="dpad-btn" id="dpadRight">▶</button></div>
        <div class="dpad-row"><button class="dpad-btn" id="dpadDown">▼</button></div>
    </div>
    <div id="tiltPanel">
        <div class="tilt-header">📐 骨盤傾斜角 (目視補正)</div>
        <div style="display:flex; justify-content:space-between; color:#aaa; font-size:10px;"><span>後傾 (-20°)</span><span>前傾 (+30°)</span></div>
        <input type="range" id="pelvicTiltSlider" class="tilt-slider" min="-20" max="30" value="0">
        <div class="tilt-val" id="tiltValDisplay">0° (ニュートラル)</div>
    </div>
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="label">CONNECT AI - V63 Flow Engine</div>
        <div class="info-panel" id="infoPanel">スケール未校正<br>骨盤傾斜: 0°</div>
        <div class="debug-panel" id="debugLog">AR Status: Initializing Engine...</div>
        <div id="radarWrapperMP" class="radar-wrapper">
            <div class="radar-title">COP RADAR</div>
            <canvas id="canvasRadarMP" class="radar-box" width="150" height="150"></canvas>
        </div>
    </div>
</div>

<canvas id="canvasCombined" style="display:none;"></canvas>
<video id="video" autoplay playsinline muted></video>
<video id="playbackVideo" playsinline muted style="display:none;"></video>

<script>
    const video = document.getElementById('video'), playbackVideo = document.getElementById('playbackVideo'); 
    const canvasMP = document.getElementById('canvasMP'), ctxMP = canvasMP.getContext('2d');
    const canvasComb = document.getElementById('canvasCombined'), ctxComb = canvasComb.getContext('2d');
    const radarWrapperMP = document.getElementById('radarWrapperMP'), canvasRadarMP = document.getElementById('canvasRadarMP'), ctxRadarMP = canvasRadarMP.getContext('2d');
    
    const startBtn = document.getElementById('startBtn'), recBtn = document.getElementById('recBtn'), durationSelect = document.getElementById('durationSelect'), timerDisplay = document.getElementById('timerDisplay'), videoSource = document.getElementById('videoSource'), debugLog = document.getElementById('debugLog');
    const heightInput = document.getElementById('patientHeight'), calibrateMatBtn = document.getElementById('calibrateMatBtn'), arCalibrateBtn = document.getElementById('arCalibrateBtn'), arMarkerSizeInput = document.getElementById('arMarkerSize');
    const infoPanel = document.getElementById('infoPanel'), tiltPanel = document.getElementById('tiltPanel'), pelvicTiltSlider = document.getElementById('pelvicTiltSlider'), tiltValDisplay = document.getElementById('tiltValDisplay');
    const showSwayAlertCheckbox = document.getElementById('showSwayAlert');

    let detectors = [], isRunning = false, isRecording = false, isPausedForEdit = false, currentTab = "front", currentStream = null, appMode = "camera", isPlaying = false;
    let playbackDataMP = [], mainRenderId = null, recordingDuration = 10000, coordinateBufferMP = [], poseDataLog = [], recorder, recordedChunks = [];
    let selectedJointIndex = null, dpadStepVal = 1, isEditingPlaybackFrame = false, swayHistoryMP = [], activeRadarDrag = null, isRadarMovedManually = false, longPressTimer = null, initialTouch = null;
    let pxToCmRatio = null, estimatedPelvicTilt = 0, calibState = "idle", calibrationPoints = [], staticBackgroundData = null; 
    let arDetector = null, latestDetectedMarkers = [];
    let arCanvas = document.createElement('canvas'), arCtx = arCanvas.getContext('2d', { willReadFrequently: true });

    window.currentAnchorPos = null; window.customOriginMarkers = {}; window.anchorStatus = "unlocked";
    const DURATION_MAP = { 'front': 10000, 'back': 5000, 'l_side': 5000, 'r_side': 5000, 'dyn_overhead': 15000, 'dyn_overhead_side': 15000, 'dyn_single_r': 15000, 'dyn_single_l': 15000, 'dyn_flex_fwd': 10000, 'dyn_flex_bwd': 10000, 'dyn_shoulder_r': 10000, 'dyn_shoulder_l': 10000 };
    window.reportDataStore = {};
    Object.keys(DURATION_MAP).forEach(dir => { window.reportDataStore[dir] = null; window.customOriginMarkers[dir] = null; });

    // 🌟 V63: 状態管理エンジン (UIの表示切替を制御)
    function setAppState(state, isDynamic = false) {
        document.getElementById('setupControls').style.display = state === 'setup' ? 'flex' : 'none';
        document.getElementById('mainControls').style.display = state === 'live' ? 'flex' : 'none';
        document.getElementById('reviewControls').style.display = state === 'review' ? 'flex' : 'none';
        
        if (state === 'review') {
            document.getElementById('playbackUI').style.display = isDynamic ? 'flex' : 'none';
        }
        if (state === 'live') {
            isPausedForEdit = false;
            appMode = 'camera';
            closeDpad();
            refreshReportView();
        }
    }

    function loadScript(src) { return new Promise((res, rej) => { let s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); }); }

    async function loadARLibrary() {
        const arCdns = [
            ["https://cdn.jsdelivr.net/npm/js-aruco@0.1.0/src/cv.js", "https://cdn.jsdelivr.net/npm/js-aruco@0.1.0/src/aruco.js"],
            ["https://unpkg.com/js-aruco@0.1.0/src/cv.js", "https://unpkg.com/js-aruco@0.1.0/src/aruco.js"],
            ["https://raw.githack.com/juj/jsaruco/master/src/cv.js", "https://raw.githack.com/juj/jsaruco/master/src/aruco.js"]
        ];
        for (let i = 0; i < arCdns.length; i++) {
            try { debugLog.innerText = `AR Status: Fetching Server ${i+1}...`; await loadScript(arCdns[i][0]); await loadScript(arCdns[i][1]); if (typeof AR !== 'undefined') return true; } catch (e) { }
        } return false;
    }

    async function init() {
        if (!navigator.mediaDevices) { videoSource.innerHTML = '<option>⚠️ HTTPS必須</option>'; startBtn.innerText = "❌ 起動不可"; return; }
        try { const ts = await navigator.mediaDevices.getUserMedia({ video: true }); ts.getTracks().forEach(t => t.stop()); } catch(e) {}
        try {
            const devices = await navigator.mediaDevices.enumerateDevices(); videoSource.innerHTML = ''; let camCount = 1, hasCam = false;
            devices.forEach(d => { if(d.kind==='videoinput') { videoSource.appendChild(new Option(d.label || "カメラ "+camCount++, d.deviceId)); hasCam = true; }});
            if(!hasCam) videoSource.innerHTML = '<option>カメラなし</option>';
            startBtn.innerText = "⏳ AI/AR読込中..."; startBtn.disabled = true;
            
            let arLoaded = await loadARLibrary();
            if (arLoaded) { arDetector = new AR.Detector(); debugLog.innerText = "AR: Ready\nWait for Camera..."; debugLog.style.color = "#00e676"; debugLog.style.borderColor = "#00e676"; } 
            else { debugLog.innerText = "AR: Failed\nISP Blocked."; debugLog.style.color = "#ff5252"; debugLog.style.borderColor = "#ff5252"; }

            await tf.setBackend('webgl'); await tf.ready();
            detectors[0] = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' });
            startBtn.innerText = "📷 カメラを起動して測定開始"; startBtn.disabled = false; updateInfoPanel();
        } catch (e) { startBtn.innerText = "❌ 起動エラー"; }
    }

    function updateInfoPanel() {
        infoPanel.innerHTML = (pxToCmRatio ? "校正済 (1px = " + pxToCmRatio.toFixed(3) + "cm)" : "⚠️ スケール未校正") + "<br>記録された骨盤傾斜: " + (estimatedPelvicTilt > 0 ? '+' : '') + estimatedPelvicTilt + "°";
    }

    arCalibrateBtn.onclick = function() {
        if (latestDetectedMarkers.length === 0) { alert("マーカーが検出されていません。"); return; }
        let physicalSizeCm = parseFloat(arMarkerSizeInput.value) || 17.5, sumRatio = 0, count = 0;
        for (let i = 0; i < latestDetectedMarkers.length; i++) {
            let c = latestDetectedMarkers[i].corners;
            let maxPixelSide = Math.max(Math.hypot(c[1].x-c[0].x, c[1].y-c[0].y), Math.hypot(c[2].x-c[1].x, c[2].y-c[1].y), Math.hypot(c[3].x-c[2].x, c[3].y-c[2].y), Math.hypot(c[0].x-c[3].x, c[0].y-c[3].y));
            if (maxPixelSide > 5) { sumRatio += (physicalSizeCm / maxPixelSide); count++; }
        }
        if (count > 0) { pxToCmRatio = sumRatio / count; arCalibrateBtn.innerText = "✅ AR校正完了"; updateInfoPanel(); setTimeout(() => { arCalibrateBtn.innerText = "📷 AR校正"; }, 2000); } 
        else { alert("解析失敗"); }
    };

    calibrateMatBtn.onclick = function() {
        if (calibState === "idle") { calibState = "wait_left"; calibrationPoints = []; calibrateMatBtn.classList.add('active'); calibrateMatBtn.innerText = "📍 左端をタップ"; } 
        else if (calibState === "adjust_left") { calibState = "wait_right"; document.getElementById('dpadPanel').style.display = 'none'; calibrateMatBtn.innerText = "📍 右端をタップ"; } 
        else if (calibState === "adjust_right") {
            let dPx = Math.hypot(calibrationPoints[1].x - calibrationPoints[0].x, calibrationPoints[1].y - calibrationPoints[0].y);
            if(dPx > 10) pxToCmRatio = 45.0 / dPx; calibState = "idle"; calibrateMatBtn.classList.remove('active'); document.getElementById('dpadPanel').style.display = 'none';
            calibrateMatBtn.innerText = "✅ 校正完了"; updateInfoPanel(); setTimeout(() => { if(calibState==="idle") calibrateMatBtn.innerText = "📏 手動校正"; }, 2000);
        } else { calibState = "idle"; calibrationPoints = []; calibrateMatBtn.classList.remove('active'); document.getElementById('dpadPanel').style.display = 'none'; calibrateMatBtn.innerText = "📏 手動校正"; }
    };

    pelvicTiltSlider.oninput = e => { let v = parseInt(e.target.value); tiltValDisplay.innerText = v === 0 ? "0°" : (v > 0 ? "+" + v + "°(前傾)" : v + "°(後傾)"); estimatedPelvicTilt = v; updateInfoPanel(); };

    function generateVirtualASIS(kps) {
        if(!kps) return kps;
        let dPx = ((parseFloat(heightInput.value) || 170) * 0.085) / (pxToCmRatio || 0.15), aRad = (45 - estimatedPelvicTilt) * (Math.PI / 180);
        let upPx = dPx * Math.sin(aRad), fwdPx = dPx * Math.cos(aRad), lH = kps.find(k=>k.name==='left_hip'||k.name==='23'), rH = kps.find(k=>k.name==='right_hip'||k.name==='24');
        if (lH && rH && lH.score > 0.5 && rH.score > 0.5) {
            let aL = { x: lH.x, y: lH.y - upPx, score: 1.0, name: 'virtual_asis_l' }, aR = { x: rH.x, y: rH.y - upPx, score: 1.0, name: 'virtual_asis_r' };
            if (currentTab === 'r_side') { aL.x += fwdPx; aR.x += fwdPx; } else if (currentTab === 'l_side') { aL.x -= fwdPx; aR.x -= fwdPx; }
            let nKps = JSON.parse(JSON.stringify(kps)); nKps.push(aL); nKps.push(aR); return nKps;
        } return kps;
    }

    function updateRadar(kps, canvas) {
        const hist = swayHistoryMP, nose = kps.find(k => k.name === 'nose');
        let oX = window.currentAnchorPos ? window.currentAnchorPos.x : canvas.width/2, oY = window.currentAnchorPos ? window.currentAnchorPos.y : canvas.height;
        if (nose) {
            let cX = nose.x - oX, hD = oY - nose.y; if (!hist.baseHDist) hist.baseHDist = hD; let cY = hist.baseHDist - hD;
            if (currentTab.includes("side") || currentTab.includes("overhead_side")) { const sh = kps.find(k => k.name === 'left_shoulder') || kps.find(k => k.name === 'right_shoulder'); if (sh) cX = nose.x - sh.x; }
            hist.push({ x: cX, y: cY }); if (hist.length > 150) hist.shift(); drawSpecificRadar(ctxRadarMP, hist, "#ff5252");
        }
    }

    function drawPlaybackRadar(dataArray, currentFrameIdx, canvas) {
        clearRadar(ctxRadarMP, "#ff5252"); let hist = [], bHD = null;
        for (let i = 0; i <= currentFrameIdx; i++) {

    function drawOHSSideAnalysis(ctx, kps) {

        const videoRatio = canvas.width / canvas.height, containerRatio = rect.width / rect.height; let renderWidth, renderHeight, offsetX, offsetY;
        if (containerRatio > videoRatio) { renderHeight = rect.height; renderWidth = rect.height * videoRatio; offsetX = (rect.width - renderWidth) / 2; offsetY = 0; } else { renderWidth = rect.width; renderHeight = rect.width / videoRatio; offsetX = 0; offsetY = (rect.height - renderHeight) / 2; }

        const pos = getEventPos(canvasMP, e); if (!pos) return;
        if (calibState !== "idle") {
            if (calibState === "wait_left" || calibState === "adjust_left") { calibrationPoints[0] = pos; calibState = "adjust_left"; calibrateMatBtn.innerText = "✅ 左端を確定"; document.getElementById('dpadPanel').style.display = 'flex'; } 
            else if (calibState === "wait_right" || calibState === "adjust_right") { calibrationPoints[1] = pos; calibState = "adjust_right"; calibrateMatBtn.innerText = "✅ 右端を確定"; document.getElementById('dpadPanel').style.display = 'flex'; }
            if (isPausedForEdit) refreshReportView(); return; 
        }
        const hitRadius = 80 * pos.renderScale; 
        if ((currentTab === "front" || currentTab === "back" || currentTab === "dyn_overhead" || currentTab.startsWith("dyn_single")) && window.currentAnchorPos && !isRecording && appMode !== 'playback') {
            if (Math.hypot(window.currentAnchorPos.x - pos.x, window.currentAnchorPos.y - pos.y) < hitRadius * 1.5) { dragTarget = { type: 'anchor' }; window.anchorStatus = "dragging"; closeDpad(); return; }
        }
        let kpsToSearch = null;
        if (appMode === 'playback' && isEditingPlaybackFrame) { const fIdx = parseInt(document.getElementById('timelineSlider').value); if (playbackDataMP[fIdx]) kpsToSearch = playbackDataMP[fIdx].keypoints; }
        else if (isPausedForEdit && appMode !== 'playback') { kpsToSearch = window.reportDataStore[currentTab]; }
        
        if (kpsToSearch) {
            let closestIdx = -1, minDist = hitRadius;
            kpsToSearch.forEach(function(kp, idx) { if (kp && kp.score > 0.0) { const dist = Math.hypot(kp.x - pos.x, kp.y - pos.y); if (dist < minDist) { minDist = dist; closestIdx = idx; } } });
            if (closestIdx !== -1) { selectedJointIndex = closestIdx; document.getElementById('dpadPanel').style.display = 'flex'; } else { closeDpad(); }
            if (appMode === 'playback') renderPlaybackFrame(parseInt(document.getElementById('timelineSlider').value)); else refreshReportView();
        }
    });

    canvasMP.addEventListener('pointermove', function(e) {
        if (dragTarget && dragTarget.type === 'anchor') {
            if(e.cancelable) e.preventDefault(); const pos = getEventPos(canvasMP, e); if (!pos) return;
            const safeX = Math.max(0, Math.min(pos.x, canvasMP.width)), safeY = Math.max(0, Math.min(pos.y, canvasMP.height));
            window.customOriginMarkers[currentTab] = { x: safeX, y: safeY }; window.currentAnchorPos = { x: safeX, y: safeY }; if (isPausedForEdit) refreshReportView(); 
        }
    });
    const handleEnd = function() { if (dragTarget && dragTarget.type === 'anchor') { window.anchorStatus = "locked"; dragTarget = null; canvasMP.style.cursor = 'default'; } };
    canvasMP.addEventListener('pointerup', handleEnd); canvasMP.addEventListener('pointercancel', handleEnd);

    function refreshReportView() {
        if(appMode === 'playback') return; const w = video.videoWidth, h = video.videoHeight;
        if (isPausedForEdit && staticBackgroundData) { ctxMP.drawImage(staticBackgroundData, 0, 0, w, h); } else { ctxMP.drawImage(video, 0, 0, w, h); }
        drawCenterGrid(ctxMP, canvasMP);

        if (calibState !== "idle") {
            ctxMP.fillStyle = "#ffeb3b";
            if (calibrationPoints[0]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[0].x, calibrationPoints[0].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_left") drawCrosshair(ctxMP, calibrationPoints[0], canvasMP); }
            if (calibrationPoints[1]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[1].x, calibrationPoints[1].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_right") drawCrosshair(ctxMP, calibrationPoints[1], canvasMP); }
        }

        if (window.reportDataStore[currentTab]) {
            const kps = window.reportDataStore[currentTab]; drawSkeleton(ctxMP, kps, '#ff5252'); 
            drawOHSFrontAnalysis(ctxMP, kps); drawOHSSideAnalysis(ctxMP, kps); drawHeadAnalysis(ctxMP, kps); 
            runReviewLogic(ctxMP, (n) => kps.find(k => k.name === n), canvasMP);
            if (selectedJointIndex !== null) drawCrosshair(ctxMP, kps[selectedJointIndex], canvasMP); 
        }
        ctxComb.drawImage(canvasMP, 0, 0, w, h);
    }

    function drawARMarkers(ctx, markers) {
        if (!markers || markers.length === 0) return;
        ctx.save(); ctx.strokeStyle = "#00e676"; ctx.lineWidth = 3; ctx.font = "bold 14px sans-serif"; ctx.fillStyle = "#00e676";
        for (let i = 0; i < markers.length; i++) {
            let m = markers[i]; ctx.beginPath(); ctx.moveTo(m.corners[0].x, m.corners[0].y);
            for (let j = 1; j < m.corners.length; j++) { ctx.lineTo(m.corners[j].x, m.corners[j].y); }
            ctx.closePath(); ctx.stroke(); ctx.fillText("AR ID: " + m.id, m.corners[0].x, m.corners[0].y - 10);
        } ctx.restore();
    }

    window.addEventListener('load', init); 

    startBtn.onclick = async function() {
        if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1920 }, height: { ideal: 1080 }, deviceId: videoSource.value ? { exact: videoSource.value } : undefined } });
            video.srcObject = currentStream; 
            video.onloadeddata = () => { 
                canvasMP.width=video.videoWidth; canvasMP.height=video.videoHeight; canvasComb.width=video.videoWidth; canvasComb.height=video.videoHeight; 
                isRunning=true; video.play(); render(); recBtn.disabled=false; 
                setAppState('live'); // 🌟 カメラ起動と同時にライブUIへ移行
            };
        } catch(e){ alert("カメラ起動失敗"); }
    };

    async function render() {
        if (!isRunning || appMode === 'playback' || isPausedForEdit) { if(isRunning) mainRenderId = requestAnimationFrame(render); return; }
        const w = video.videoWidth, h = video.videoHeight; ctxMP.drawImage(video, 0, 0, w, h); drawCenterGrid(ctxMP, canvasMP);

        if (appMode === "camera" && !isRecording && arDetector) {
            try {
                const arScale = 640 / w; const arW = 640, arH = h * arScale;
                arCanvas.width = arW; arCanvas.height = arH; arCtx.drawImage(video, 0, 0, arW, arH);
                let imgData = arCtx.getImageData(0, 0, arW, arH); latestDetectedMarkers = arDetector.detect(imgData);
                if (latestDetectedMarkers.length > 0) {
                    latestDetectedMarkers.forEach(m => m.corners.forEach(c => { c.x /= arScale; c.y /= arScale; }));
                    drawARMarkers(ctxMP, latestDetectedMarkers);
                    debugLog.innerText = `AR: OK (${w}x${h}) Found:${latestDetectedMarkers.length}`; debugLog.style.color = "#00e676"; debugLog.style.borderColor = "#00e676";
                } else {
                    debugLog.innerText = `AR: OK (${w}x${h}) No Markers`; debugLog.style.color = "#ffeb3b"; debugLog.style.borderColor = "#ffeb3b";
                }
            } catch(e) {}
        }

        if (calibState !== "idle") {
            ctxMP.fillStyle = "#ffeb3b";
            if (calibrationPoints[0]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[0].x, calibrationPoints[0].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_left") drawCrosshair(ctxMP, calibrationPoints[0], canvasMP); }
            if (calibrationPoints[1]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[1].x, calibrationPoints[1].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_right") drawCrosshair(ctxMP, calibrationPoints[1], canvasMP); }
        }
        
        const poses = await detectors[0].estimatePoses(video);
        if (poses.length > 0) {
            let kps = generateVirtualASIS(poses[0].keypoints); window.reportDataStore[currentTab] = kps;
            if (isRecording) { coordinateBufferMP.push(kps); poseDataLog.push({ time: Date.now(), mode: currentTab, keypoints: JSON.parse(JSON.stringify(kps)) }); }
            drawSkeleton(ctxMP, kps, currentTab.startsWith('dyn_') ? '#ffffff' : '#ff5252'); 
            drawOHSFrontAnalysis(ctxMP, kps); drawOHSSideAnalysis(ctxMP, kps); drawHeadAnalysis(ctxMP, kps); 
            runReviewLogic(ctxMP, n=>kps.find(k=>k.name===n), canvasMP); updateRadar(kps, canvasMP);
        }
        ctxComb.drawImage(canvasMP, 0, 0, w, h); mainRenderId = requestAnimationFrame(render);
    }
    
    function prepareAndPrintReport() { window.print(); }
</script>
</body>
</html>
