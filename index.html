<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNECT AI - Master Evaluation Engine V3</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        /* 臨床現場での視認性を考慮したプレミアムブラックUI */
        body { margin: 0; font-family: sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        .controls { padding: 12px; text-align: center; background: #222; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center; border-bottom: 1px solid #444; }
        button, select { padding: 10px 16px; font-size: 14px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        
        /* モードボタンのステータス管理 */
        .mode-btn { background: #444; color: #999; }
        .mode-btn.active-mode { background: #deff9a; color: #000; box-shadow: 0 0 10px rgba(222, 255, 154, 0.4); }
        
        #startBtn { background: #1976d2; color: white; }
        #recBtn { background: #d32f2f; color: white; }
        #stopBtn { background: #555; color: white; }
        #downloadCsvBtn { background: #2e7d32; color: white; }
        #videoSource { background: #fff; color: #000; }
        .sub-settings { display: inline-block; margin: 0 10px; }
        
        .container { display: flex; width: 100vw; height: calc(100vh - 120px); }
        .view-port { flex: 1; position: relative; border-right: 1px solid #333; overflow: hidden; background: #000; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 4px; font-size: 12px; color: #deff9a; border: 1px solid #deff9a; }
        #recIndicator { color: #ff5252; font-weight: bold; margin-left: 15px; display: none; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="controls">
    <select id="videoSource"><option value="">デバイス検索中...</option></select>
    <button id="startBtn">📷 カメラ起動</button>
    
    <button id="btnStaticMode" class="mode-btn active-mode">🧍 静止姿勢</button>
    <button id="btnDynamicMode" class="mode-btn">🏃 動作測定</button>
    
    <div class="sub-settings">
        <select id="staticItemSelect">
            <option value="alignment_front">前面: 重心動揺・頭部傾斜</option>
            <option value="alignment_side">側面: 矢状面アライメント</option>
        </select>
        
        <select id="dynamicItemSelect" style="display: none;">
            <option value="single_leg_front" selected>片足立ち: 軸足・体幹傾斜</option>
            <option value="squat_front">スクワット: 正面膝角度</option>
            <option value="squat_side">スクワット: 側面平行性</option>
        </select>
    </div>

    <button id="recBtn" disabled>🔴 録画開始</button>
    <button id="stopBtn" disabled>⏹️ 停止</button>
    <button id="downloadCsvBtn" disabled>📊 CSV出力</button>
    <span id="recIndicator">● REC中</span>
</div>

<div class="container">
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="label">MediaPipe (高精度モデル)</div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div class="label">MoveNet (高速モデル)</div>
    </div>
</div>

<canvas id="canvasCombined" style="display:none;"></canvas>
<video id="video" autoplay playsinline muted></video>

<script>
    // 基本要素の取得
    const video = document.getElementById('video');
    const canvases = [document.getElementById('canvasMP'), document.getElementById('canvasMN')];
    const ctxs = canvases.map(c => c.getContext('2d'));
    const canvasComb = document.getElementById('canvasCombined');
    const ctxComb = canvasComb.getContext('2d');
    
    const btnStaticMode = document.getElementById('btnStaticMode');
    const btnDynamicMode = document.getElementById('btnDynamicMode');
    const staticItemSelect = document.getElementById('staticItemSelect');
    const dynamicItemSelect = document.getElementById('dynamicItemSelect');

    let detectors = [];
    let isRunning = false;
    let isRecording = false;
    let currentAppMode = "static";
    let recorder;
    let recordedChunks = [];
    let poseDataLog = [];
    let currentStream = null;

    // UIモード切り替えロジック
    btnStaticMode.onclick = () => { currentAppMode = "static"; btnStaticMode.classList.add('active-mode'); btnDynamicMode.classList.remove('active-mode'); staticItemSelect.style.display = "inline-block"; dynamicItemSelect.style.display = "none"; };
    btnDynamicMode.onclick = () => { currentAppMode = "dynamic"; btnDynamicMode.classList.add('active-mode'); btnStaticMode.classList.remove('active-mode'); staticItemSelect.style.display = "none"; dynamicItemSelect.style.display = "inline-block"; };

    // 【重要設計】測定ロジックの定義
    const EVAL_MODULES = {
        // --- 🧍 静止姿勢測定モード：頭部傾斜・重心動揺の計算ロジック ---
        alignment_front: (ctx, getK, isMP) => {
            ctx.fillStyle = "#deff9a"; ctx.font = "bold 22px sans-serif";
            ctx.fillText("🧍 解析中: 静止姿勢（アライメント・動揺）", 30, 45);
            
            const rS = getK('right_shoulder'), lS = getK('left_shoulder');
            const rA = getK('right_ankle'), lA = getK('left_ankle');
            const nose = getK('nose');

            // 1. 肩の傾斜角 (Shoulder Tilt)
            if (rS && lS) {
                const tilt = ((lS.y - rS.y) / (lS.x - rS.x) * 180 / Math.PI);
                ctx.fillStyle = "#ffffff"; ctx.fillText(`肩傾斜度: ${tilt.toFixed(1)}°`, 30, 85);
            }

            // 2. 頭部偏位 (Head Sway in mm) - 正中線との相対距離
            if (rA && lA && nose) {
                const midAnkleX = (lA.x + rA.x) / 2;
                const headSwayX = (nose.x - midAnkleX) * 4; // 簡易mm換算係数
                ctx.fillStyle = headSwayX < 0 ? "#ff5252" : "#00ff88";
                ctx.fillText(`頭部偏位: ${headSwayX > 0 ? "右" : "左"} ${Math.abs(headSwayX).toFixed(1)} mm`, 30, 125);
                
                // 動揺追従の黄色インジケーター描画
                ctx.strokeStyle = "rgba(255, 255, 0, 0.6)"; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(midAnkleX, nose.y); ctx.lineTo(nose.x, nose.y); ctx.stroke(); ctx.setLineDash([]);
            }

            // 3. 【今回追加】頭部傾斜角 (Head Tilt) - 目元のインデックス(2番, 5番)を利用
            // 注: MoveNetとMediaPipeでインデックスが異なるため、MediaPipe側のみで詳細表示
            if (isMP) {
                // MediaPipe Pose Keypoints: 2=LeftEye, 5=RightEye
                const kps = window.currentKpsMP;
                const lEye = kps[2], rEye = kps[5];
                if (lEye && rEye && lEye.score > 0.4 && rEye.score > 0.4) {
                    const headTilt = Math.atan2(lEye.y - rEye.y, lEye.x - rEye.x) * 180 / Math.PI;
                    ctx.fillStyle = "#deff9a"; ctx.fillText(`頭部傾斜角: ${headTilt.toFixed(1)}°`, 30, 165);
                    
                    // 両目を結ぶ水平基準ガイドラインの描画
                    ctx.strokeStyle = "#deff9a"; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(rEye.x, rEye.y); ctx.lineTo(lEye.x, lEye.y); ctx.stroke();
                }
            }
        },

        // --- 🏃 動的動作測定モード：片足立ち評価（支持脚・体幹傾斜） ---
        single_leg_front: (ctx, getK) => {
            ctx.fillStyle = "#00ff88"; ctx.fillText("🏃 解析中: 片足立ちバランス評価", 30, 45);
            const lA = getK('left_ankle'), rA = getK('right_ankle');
            const rS = getK('right_shoulder'), lS = getK('left_shoulder');
            
            // 体幹の側方傾斜角（代償動作）
            if (rS && lS) {
                const shoulderTilt = ((lS.y - rS.y) / (lS.x - rS.x) * 180 / Math.PI);
                ctx.fillStyle = "#ffff00";
                ctx.fillText(`体幹代償: ${Math.abs(shoulderTilt).toFixed(1)}°`, (lS.x + rS.x)/2 - 50, ((lS.y + rS.y)/2) - 40);
            }

            // 支持脚（軸足）の自動判定と膝のアライメント評価
            if (lA && rA) {
                const isLeftStance = lA.y > rA.y; // 足首が低い方を支持脚とする
                const h = isLeftStance ? getK('left_hip') : getK('right_hip');
                const k = isLeftStance ? getK('left_knee') : getK('right_knee');
                const a = isLeftStance ? lA : rA;
                if (h && k && a) {
                    const ang = calculateAngle(h, k, a);
                    ctx.fillStyle = "#00ff00";
                    ctx.fillText(`軸足膝角度: ${ang.toFixed(1)}°`, isLeftStance ? k.x - 140 : k.x + 40, k.y);
                }
            }
        },

        // 側面・スクワットなどの他項目（拡張用構造を維持）
        alignment_side: (ctx) => { ctx.fillStyle = "#ffffff"; ctx.fillText("側面アライメント解析: 準備中", 30, 45); },
        squat_front: (ctx, getK) => { /* 既存のスクワット正面ロジック */ },
        squat_side: (ctx, getK) => { /* 既存のスクワット側面ロジック */ }
    };

    // --- 以降、システムコアコード（変更なし） ---
    async function init() {
        try {
            await tf.setBackend('webgl'); await tf.ready();
            detectors[0] = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' });
            detectors[1] = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });
            const devices = await navigator.mediaDevices.enumerateDevices();
            videoSource.innerHTML = '';
            devices.forEach(d => { if(d.kind==='videoinput'){ const o=document.createElement('option'); o.value=d.deviceId; o.text=d.label||'Camera'; videoSource.appendChild(o); }});
            startBtn.innerText = "📷 カメラを起動";
        } catch (e) { startBtn.innerText = "❌ 起動エラー"; }
    }

    startBtn.onclick = async () => {
        if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: videoSource.value ? { deviceId: { exact: videoSource.value } } : true });
            video.srcObject = currentStream;
            video.onloadeddata = () => {
                const w=video.videoWidth, h=video.videoHeight;
                canvases.forEach(c=>{c.width=w;c.height=h;}); canvasComb.width=w*2; canvasComb.height=h;
                if(!isRunning){ isRunning=true; render(); }
                recBtn.disabled=false;
            };
        } catch(e){ alert("カメラが見つかりません"); }
    };

    async function render() {
        if(!isRunning) return;
        const w=video.videoWidth, h=video.videoHeight;
        for(let i=0; i<2; i++){
            const ctx=ctxs[i], canvas=canvases[i];
            ctx.drawImage(video, 0, 0, w, h);
            drawCenterGrid(ctx, canvas);
            const poses = await detectors[i].estimatePoses(video);
            if(poses.length > 0){
                const kps = poses[0].keypoints;
                if(i===0) window.currentKpsMP = kps; // MediaPipeの座標をグローバルに保持
                drawSkeleton(ctx, kps, i===0?'#ff5252':'#00ffff');
                const mode = currentAppMode==="static" ? staticItemSelect.value : dynamicItemSelect.value;
                if(EVAL_MODULES[mode]) EVAL_MODULES[mode](ctx, (n)=>kps.find(k=>k.name===n&&k.score>0.3), i===0);
            }
            ctxComb.drawImage(canvas, i*w, 0);
        }
        requestAnimationFrame(render);
    }

    function drawCenterGrid(ctx, canvas) {
        ctx.save(); ctx.strokeStyle="rgba(255,255,255,0.2)"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,canvas.height/2); ctx.lineTo(canvas.width,canvas.height/2); ctx.stroke(); ctx.restore();
    }

    function drawSkeleton(ctx, kps, color) {
        ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=2;
        const pairs = kps.length > 20 ? [[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],[23,25],[25,27],[24,26],[26,28]] : [[5,6],[5,11],[6,12],[11,12],[5,7],[7,9],[6,8],[8,10],[11,13],[13,15],[12,14],[14,16]];
        pairs.forEach(([s,e])=>{ const p1=kps[s], p2=kps[e]; if(p1&&p2&&p1.score>0.3&&p2.score>0.3){ ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }});
        const lA=kps[kps.length>20?27:15], rA=kps[kps.length>20?28:16];
        if(lA&&rA&&lA.score>0.3&&rA.score>0.3){
            const mx=(lA.x+rA.x)/2, my=(lA.y+rA.y)/2;
            ctx.strokeStyle=color; ctx.lineWidth=2; ctx.setLineDash([6,4]); ctx.beginPath(); ctx.moveTo(mx,my); ctx.lineTo(mx,0); ctx.stroke(); ctx.setLineDash([]);
        }
        kps.forEach(k=>{ if(k.score>0.3){ ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(k.x,k.y,2.5,0,2*Math.PI); ctx.fill(); }});
        ctx.restore();
    }

    function calculateAngle(A,B,C) { let d=Math.abs((Math.atan2(C.y-B.y,C.x-B.x)-Math.atan2(A.y-B.y,A.x-B.x))*180/Math.PI); return d>180?360-d:d; }
    
    // 録画・CSV出力ボタン設定
    recBtn.onclick = () => { isRecording=true; recordedChunks=[]; poseDataLog=[]; recIndicator.style.display='inline'; recorder=new MediaRecorder(canvasComb.captureStream(30),{mimeType:'video/webm;codecs=vp8'}); recorder.ondataavailable=(e)=>{if(e.data.size>0)recordedChunks.push(e.data);}; recorder.onstop=()=>{const b=new Blob(recordedChunks,{type:'video/webm'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=`biomet_v3_${Date.now()}.webm`; a.click();}; recorder.start(); recBtn.disabled=true; stopBtn.disabled=false; };
    stopBtn.onclick = () => { isRecording=false; recIndicator.style.display='none'; recorder.stop(); recBtn.disabled=false; stopBtn.disabled=true; downloadCsvBtn.disabled=false; };
    downloadCsvBtn.onclick = () => { let c="Timestamp,Model,Mode,ID,Name,X,Y,Score\n"; poseDataLog.forEach(d=>{c+=`${d.time},${d.model},${d.mode},${d.id},${d.name},${d.x},${d.y},${d.score}\n`;}); const b=new Blob([c],{type:'text/csv'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=`data_v3_${Date.now()}.csv`; a.click(); };

    init();
</script>
</body>
</html>
