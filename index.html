<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿勢検証ツール Pro - ハイブリッド校正版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <!-- 安定したソースに変更 -->
    <script src="https://unpkg.com/js-aruco@0.0.1/src/cv.js"></script>
    <script src="https://unpkg.com/js-aruco@0.0.1/src/aruco.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
        .controls { padding: 10px; text-align: center; background: #333; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: center; }
        button, select { padding: 10px 14px; font-size: 14px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        #startCamBtn { background: #4a4a4a; color: white; min-width: 250px; }
        #resetEvalBtn { background: #f57c00; color: white; display: none; }
        button:disabled { opacity: 0.6; cursor: wait; }
        .container { display: flex; width: 100vw; height: calc(100vh - 120px); }
        .view-port { flex: 1; position: relative; border-right: 1px solid #444; overflow: hidden; background: #000; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .calib-status { position: absolute; bottom: 10px; left: 10px; font-size: 12px; padding: 5px 12px; border-radius: 20px; z-index: 20; font-weight: bold; }
        .locked { background: #00c853; color: white; }
        .scanning { background: #ffab00; color: black; }
        .manual { background: #1976d2; color: white; }
        #errorOverlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px; border-radius: 10px; text-align: center; display: none; z-index: 100; border: 2px solid #d32f2f; }
    </style>
</head>
<body>

<div id="errorOverlay">
    <h3>システム準備中...</h3>
    <p id="errorMsg">ライブラリの展開を待っています。</p>
    <button onclick="location.reload()" style="background: #444; color: white; padding: 10px;">強制リロード</button>
</div>

<div class="controls">
    <button id="startCamBtn" disabled>Initializing...</button>
    <button id="resetEvalBtn" disabled>🔄 測定リセット</button>
    <select id="modeSelect">
        <option value="single_leg" selected>片足立ち正面 (重心レーダー)</option>
    </select>
    <button id="recordBtn" disabled>🔴 計測開始</button>
</div>

<div class="container">
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div id="statusMP" class="calib-status"></div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div id="statusMN" class="calib-status"></div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('video');
    const canvasMP = document.getElementById('canvasMP');
    const canvasMN = document.getElementById('canvasMN');
    const ctxMP = canvasMP.getContext('2d');
    const ctxMN = canvasMN.getContext('2d');
    const startCamBtn = document.getElementById('startCamBtn');
    
    let detectorMP, detectorMN;
    let isCameraRunning = false;
    let homographyMatrix = null;
    let detectorAR = null; 
    let markerCoords = { 0:null, 1:null, 2:null, 3:null };
    let manualPoints = []; // 手動タップ用
    let calib = {};

    // --- 起動シーケンス ---
    async function initSystem() {
        try {
            startCamBtn.innerText = "⏳ 1/3 エンジン読込中...";
            await tf.ready();
            
            startCamBtn.innerText = "⏳ 2/3 姿勢解析モデル読込中...";
            detectorMP = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'lite' });
            detectorMN = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });

            startCamBtn.innerText = "⏳ 3/3 ARライブラリ待機中...";
            // ARライブラリが完全に認識されるまで最大5秒待機するループ
            for (let i = 0; i < 50; i++) {
                if (typeof AR !== 'undefined') {
                    detectorAR = new AR.Detector();
                    break;
                }
                await new Promise(r => setTimeout(r, 100));
            }

            if (!detectorAR) {
                startCamBtn.innerText = "⚠️ AR制限モードで起動";
                startCamBtn.style.background = "#f57c00";
            } else {
                startCamBtn.innerText = "📷 カメラを起動する";
                startCamBtn.style.background = "#1976d2";
            }

            startCamBtn.disabled = false;
            resetEvaluation();
        } catch (e) {
            console.error(e);
            startCamBtn.innerText = "❌ エラー: 再読込してください";
        }
    }

    function resetEvaluation() {
        ['MediaPipe', 'MoveNet'].forEach(m => {
            calib[m] = { state: 'waiting', countdownStart: 0, frames: 0, baseHipX: null, baseHipY: null, swayHistory: [] };
        });
    }

    startCamBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'environment' } });
            video.srcObject = stream;
            video.onloadeddata = () => {
                canvasMP.width = canvasMN.width = video.videoWidth; 
                canvasMP.height = canvasMN.height = video.videoHeight;
                isCameraRunning = true;
                startCamBtn.style.display = 'none';
                document.getElementById('resetEvalBtn').style.display = 'inline-block';
                document.getElementById('resetEvalBtn').disabled = false;
                
                const msg = detectorAR ? "⌛ 自動認識中 (タップで手動)" : "🎯 4隅をタップして校正";
                document.getElementById('statusMP').innerText = document.getElementById('statusMN').innerText = msg;
                document.getElementById('statusMP').className = document.getElementById('statusMN').className = "calib-status scanning";
                
                processFrame();
            };
        } catch (e) { alert("カメラ起動失敗"); }
    });

    // --- 【救済】手動タップによる校正機能 ---
    canvasMP.addEventListener('mousedown', (e) => {
        if (homographyMatrix) return;
        const rect = canvasMP.getBoundingClientRect();
        const scale = rect.width / canvasMP.width;
        const x = (e.clientX - rect.left) / scale;
        const y = (e.clientY - rect.top) / scale;
        manualPoints.push({x, y});
        
        document.getElementById('statusMP').innerText = `🎯 手動校正中 (${manualPoints.length}/4)`;
        if (manualPoints.length === 4) {
            applyHomography(manualPoints);
            manualPoints = [];
        }
    });

    function applyHomography(pts) {
        let h = getHomography(pts);
        if (h) {
            homographyMatrix = h;
            document.getElementById('statusMP').innerText = document.getElementById('statusMN').innerText = "✅ 校正完了";
            document.getElementById('statusMP').className = document.getElementById('statusMN').className = "calib-status locked";
        }
    }

    function getHomography(pts) {
        let x0 = pts[0].x, y0 = pts[0].y, x1 = pts[1].x, y1 = pts[1].y;
        let x2 = pts[2].x, y2 = pts[2].y, x3 = pts[3].x, y3 = pts[3].y;
        let dx1 = x1 - x2, dx2 = x3 - x2, sx = x0 - x1 + x2 - x3;
        let dy1 = y1 - y2, dy2 = y3 - y2, sy = y0 - y1 + y2 - y3;
        let det = dx1 * dy2 - dy1 * dx2;
        if (Math.abs(det) < 0.1) return null;
        let g = (sx * dy2 - sy * dx2) / det, h = (dx1 * sy - dy1 * sx) / det;
        let a = x1-x0+g*x1, b = x3-x0+h*x3, c = x0, d = y1-y0+g*y1, e = y3-y0+h*y3, f = y0;
        let detH = a*(e*1 - f*h) - b*(d*1 - f*g) + c*(d*h - e*g);
        let i = 1/detH;
        let inv = [ (e-f*h)*i, (c*h-b)*i, (b*f-c*e)*i, (g*f-d)*i, (a-c*g)*i, (d*c-a*f)*i, (d*h-e*g)*i, (b*g-a*h)*i, (a*e-b*d)*i ];
        return [inv[0]*500, inv[1]*500, inv[2]*500, inv[3]*500, inv[4]*500, inv[5]*500, inv[6], inv[7], inv[8]];
    }

    async function processFrame() {
        if (!isCameraRunning) return;
        ctxMP.drawImage(video, 0, 0, canvasMP.width, canvasMP.height);
        
        // 自動認識が有効な場合のみトライ
        if (detectorAR && !homographyMatrix) {
            let imageData = ctxMP.getImageData(0, 0, canvasMP.width, canvasMP.height);
            let markers = detectorAR.detect(imageData);
            markers.forEach(m => {
                if (m.id >= 0 && m.id <= 3) {
                    let center = { x: 0, y: 0 };
                    m.corners.forEach(c => { center.x += c.x; center.y += c.y; });
                    markerCoords[m.id] = { x: center.x / 4, y: center.y / 4 };
                }
            });
            if (markerCoords[0] && markerCoords[1] && markerCoords[2] && markerCoords[3]) {
                applyHomography([markerCoords[0], markerCoords[1], markerCoords[2], markerCoords[3]]);
            }
        }

        runPose(detectorMP, ctxMP, 'red', 'MediaPipe', canvasMP);
        runPose(detectorMN, ctxMN, 'cyan', 'MoveNet', canvasMN);
        requestAnimationFrame(processFrame);
    }

    async function runPose(detector, ctx, color, modelName, canvasObj) {
        if (ctx !== ctxMP) ctx.drawImage(video, 0, 0, canvasObj.width, canvasObj.height);
        const poses = await detector.estimatePoses(video);
        if (poses.length === 0) return;
        const kps = poses[0].keypoints;
        const getK = (n) => kps.find(k => k.name === n && k.score > 0.3);

        if (homographyMatrix) {
            let lH = getK('left_hip'), rH = getK('right_hip');
            if (lH && rH) {
                let m = homographyMatrix;
                let hipX = (lH.x + rH.x) / 2, hipY = (lH.y + rH.y) / 2;
                let w = m[6]*hipX + m[7]*hipY + m[8];
                let nx = (m[0]*hipX + m[1]*hipY + m[2])/w, ny = (m[3]*hipX + m[4]*hipY + m[5])/w;
                
                let c = calib[modelName];
                if (c.state === 'waiting') {
                    c.state = 'countdown'; c.countdownStart = performance.now();
                } else if (c.state === 'countdown') {
                    let rem = Math.ceil(4 - (performance.now() - c.countdownStart)/1000);
                    ctx.fillStyle = "yellow"; ctx.font = "bold 24px sans-serif"; ctx.fillText(`⏳ 静止してください... ${rem}`, 20, 80);
                    if (rem <= 0) c.state = 'calibrating';
                } else if (c.state === 'calibrating') {
                    c.baseHipX = (c.baseHipX || 0) + nx; c.baseHipY = (c.baseHipY || 0) + ny;
                    if (++c.frames >= 20) { c.baseHipX /= 20; c.baseHipY /= 20; c.state = 'done'; }
                } else if (c.state === 'done') {
                    const rSize = 250, rx = canvasObj.width - rSize - 20, ry = canvasObj.height - rSize - 20;
                    ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(rx, ry, rSize, rSize);
                    let dx = (nx - c.baseHipX) * 2.5, dy = (ny - c.baseHipY) * 2.5;
                    c.swayHistory.push({x: dx, y: dy}); if (c.swayHistory.length > 80) c.swayHistory.shift();
                    ctx.beginPath(); ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 3;
                    c.swayHistory.forEach((p, i) => {
                        let px = rx + rSize/2 + p.x, py = ry + rSize/2 + p.y;
                        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                    });
                    ctx.stroke();
                    ctx.fillStyle = "#ff5252"; ctx.beginPath(); ctx.arc(rx+rSize/2+dx, ry+rSize/2+dy, 8, 0, 2*Math.PI); ctx.fill();
                }
            }
        }
    }
    initSystem();
    document.getElementById('resetEvalBtn').onclick = () => { resetEvaluation(); homographyMatrix = null; markerCoords = {0:null,1:null,2:null,3:null}; manualPoints = []; };
</script>
</body>
</html>
