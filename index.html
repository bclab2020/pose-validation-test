<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNECT AI - Master Evaluation Engine V8 (Stable Edition)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }
        .controls { padding: 12px; text-align: center; background: #222; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center; border-bottom: 1px solid #444; }
        button, select { padding: 10px 16px; font-size: 14px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        
        .tab-container { display: flex; justify-content: center; background: #111; padding: 10px 0; gap: 8px; border-bottom: 1px solid #333; }
        .tab-btn { background: #333; color: #aaa; padding: 10px 20px; font-weight: bold; border-radius: 4px; border: none; cursor: pointer; }
        .tab-btn.active-tab { background: #deff9a; color: #000; box-shadow: 0 0 8px rgba(222, 255, 154, 0.3); }

        #startBtn { background: #1976d2; color: white; }
        #recBtn { background: #d32f2f; color: white; }
        #downloadCsvBtn { background: #2e7d32; color: white; }
        #videoSource { background: #fff; color: #000; }
        
        .container { display: flex; width: 100vw; height: 520px; position: relative; }
        .view-port { flex: 1; position: relative; border-right: 1px solid #333; overflow: hidden; background: #000; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 4px; font-size: 12px; color: #deff9a; border: 1px solid #deff9a; z-index: 10; }
        .timer-display { position: absolute; top: 10px; right: 10px; background: rgba(211, 47, 47, 0.85); color: white; padding: 8px 16px; font-size: 18px; font-weight: bold; border-radius: 4px; border: 1px solid #ff5252; display: none; z-index: 100; }
        
        .radar-box { position: absolute; bottom: 15px; right: 15px; width: 140px; height: 140px; background: rgba(0, 0, 0, 0.8); border: 2px solid #00ff88; border-radius: 50%; z-index: 50; box-shadow: 0 0 15px rgba(0,255,136,0.3); pointer-events: none; }
        .radar-title { position: absolute; bottom: 160px; right: 25px; font-size: 11px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 3px; color: #00ff88; border: 1px solid #00ff88; font-weight: bold; z-index: 55; }

        .report-section { background: #151515; padding: 25px; border-top: 2px solid #444; margin: 15px; border-radius: 8px; }
        .report-title { font-size: 18px; color: #deff9a; font-weight: bold; margin-bottom: 15px; border-left: 4px solid #deff9a; padding-left: 10px; }
        .review-box { background: #222; border: 1px solid #333; padding: 15px; border-radius: 6px; font-size: 14px; line-height: 1.7; color: #e0e0e0; }
        .review-highlight { color: #ff5252; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <select id="videoSource"><option value="">デバイス検索中...</option></select>
    <button id="startBtn">📷 カメラ起動</button>
    <button id="recBtn" disabled>⏱️ 自動計測スタート</button>
    <button id="downloadCsvBtn" disabled>📊 最終CSV出力</button>
</div>

<div class="tab-container">
    <button id="tab-front" class="tab-btn active-tab" onclick="switchReportTab('front')">🧍 前面アライメント</button>
    <button id="tab-back" class="tab-btn" onclick="switchReportTab('back')">🧍 後面アライメント</button>
    <button id="tab-l_side" class="tab-btn" onclick="switchReportTab('l_side')">🧍 左側面アライメント</button>
    <button id="tab-r_side" class="tab-btn" onclick="switchReportTab('r_side')">🧍 右側面アライメント</button>
    <button id="tab-dynamic" class="tab-btn" onclick="switchReportTab('dynamic')">🏃 動的動作・片足立ち</button>
</div>

<div class="container">
    <div id="timerDisplay" class="timer-display">REC 10.0s</div>
    
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="label">MediaPipe (高精度評価ビュー)</div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div class="label">MoveNet (高速クロスチェック)</div>
        
        <div class="radar-title">COP SWAY RADAR</div>
        <canvas id="canvasRadar" class="radar-box" width="140" height="140"></canvas>
    </div>
</div>

<div class="report-section">
    <div class="report-title">🤖 CONNECT AI バイオメカニクス・ファーストレビュー（学術基準連動）</div>
    <div id="reviewContent" class="review-box">
        カメラを起動し、測定方向のタブを選択してから「自動計測スタート」を押してください。
    </div>
</div>

<canvas id="canvasCombined" style="display:none;"></canvas>
<video id="video" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('video');
    const canvases = [document.getElementById('canvasMP'), document.getElementById('canvasMN')];
    const ctxs = canvases.map(c => c.getContext('2d'));
    const canvasComb = document.getElementById('canvasCombined');
    const ctxComb = canvasComb.getContext('2d');
    
    const canvasRadar = document.getElementById('canvasRadar');
    const ctxRadar = canvasRadar.getContext('2d');
    
    const startBtn = document.getElementById('startBtn');
    const recBtn = document.getElementById('recBtn');
    const downloadCsvBtn = document.getElementById('downloadCsvBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const reviewContent = document.getElementById('reviewContent');

    let detectors = [];
    let isRunning = false;
    let isRecording = false;
    let isPausedForEdit = false; 
    let currentTab = "front"; 
    let currentStream = null;
    let poseDataLog = [];

    let recordingStartTime = 0;
    let recordingDuration = 10000; 
    let coordinateBuffer = []; 
    let swayHistory = []; 

    let dragTarget = null;
    const CLICK_THRESHOLD = 20;

    window.reportDataStore = {
        front: [null, null], back: [null, null], l_side: [null, null], r_side: [null, null], dynamic: [null, null]
    };

    function switchReportTab(tabName) {
        if (isRecording) return; 
        currentTab = tabName;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
        document.getElementById(`tab-${tabName}`).classList.add('active-tab');
        
        swayHistory = [];
        clearRadar();
        refreshReportView();
    }

    function clearRadar() {
        if (!ctxRadar) return; 
        ctxRadar.clearRect(0, 0, 140, 140);
        ctxRadar.strokeStyle = "rgba(0, 255, 136, 0.2)"; ctxRadar.lineWidth = 1;
        ctxRadar.beginPath(); ctxRadar.arc(70, 70, 35, 0, 2*Math.PI); ctxRadar.stroke(); 
        ctxRadar.beginPath(); ctxRadar.arc(70, 70, 55, 0, 2*Math.PI); ctxRadar.stroke();
        ctxRadar.beginPath(); ctxRadar.moveTo(70, 5); ctxRadar.lineTo(70, 135); ctxRadar.moveTo(5, 70); ctxRadar.lineTo(135, 70); ctxRadar.stroke(); 
    }

    // 【フリーズ回避プロテクション】各関節が存在し、かつ一定の信頼度（score）を保っているか安全確認する機構
    function runReviewLogic(ctx, getK, isMP) {
        ctx.fillStyle = "#deff9a"; ctx.font = "bold 20px sans-serif";
        
        const rS = getK('right_shoulder'), lS = getK('left_shoulder');
        const rA = getK('right_ankle'), lA = getK('left_ankle');
        const nose = getK('nose');

        if (currentTab === "front" || currentTab === "back") {
            ctx.fillText(currentTab === "front" ? "🧍 前面アライメント評価" : "🧍 後面アライメント評価", 30, 45);
            let tilt = 0, headSwayX = 0, headTilt = 0;
            
            if (rS && lS) { tilt = ((rS.y - lS.y) / (lS.x - rS.x) * 180 / Math.PI); ctx.fillStyle = "#ffffff"; ctx.fillText(`解剖学的 肩傾斜: ${tilt > 0 ? "左肩上がり" : "右肩上がり"} ${Math.abs(tilt).toFixed(1)}°`, 30, 85); }
            if (rA && lA && nose) {
                const midAnkleX = (lA.x + rA.x) / 2;
                headSwayX = (nose.x - midAnkleX) * 4;
                ctx.fillStyle = headSwayX > 0 ? "#ff5252" : "#00ff88";
                ctx.fillText(`頭部解剖偏位: ${headSwayX > 0 ? "左" : "右"}へ ${Math.abs(headSwayX).toFixed(1)} mm`, 30, 125);
                
                if (isRecording && isMP) {
                    const shoulderDist = Math.hypot(lS.x - rS.x, lS.y - rS.y);
                    if (!window.initialShoulderWidth) window.initialShoulderWidth = shoulderDist;
                    const deltaZ = (shoulderDist - window.initialShoulderWidth) * 8; 
                    swayHistory.push({ x: headSwayX, y: deltaZ });
                    drawSwayRadar();
                }
            }
            
            // 安全プロテクション：後ろを向いた時に目（2番、5番）が未検出なら計算をスキップしてフリーズを徹底回避
            if (isMP && window.reportDataStore[currentTab][0]) {
                const kps = window.reportDataStore[currentTab][0]; 
                const lEye = kps[2], rEye = kps[5];
                if (lEye && rEye && lEye.score > 0.1 && rEye.score > 0.1) { 
                    headTilt = Math.atan2(rEye.y - lEye.y, lEye.x - rEye.x) * 180 / Math.PI; 
                    ctx.fillStyle = "#deff9a"; ctx.fillText(`頭部解剖傾斜: ${headTilt > 0 ? "左側屈" : "右側屈"} ${Math.abs(headTilt).toFixed(1)}°`, 30, 165); 
                } else {
                    ctx.fillStyle = "#ffaa00"; ctx.fillText(`頭部解剖傾斜: 後面のためタップ補正待ち`, 30, 165);
                }
            }

            if (isMP) {
                let reviewTxt = `【解剖学的評価】 ${currentTab==="front"?"前面":"後面"}平均化処理データ：肩甲帯傾斜は <span class="review-highlight">${Math.abs(tilt).toFixed(1)}° (${tilt > 0 ? "左肩上がり" : "右肩上がり"})</span>、頭部正中線偏位は <span class="review-highlight">${Math.abs(headSwayX).toFixed(1)} mm (${headSwayX > 0 ? "左シフト" : "右シフト"})</span> です。<br><br>`;
                if (headSwayX > 15 && headTilt < -0.5) { reviewTxt += `⚠️ <strong>臨床所見:</strong> 体幹の左変位に対し、前庭感覚が働き頭部を右側屈させて視線を水平キープする固定代償パターン。`; }
                else if (headSwayX < -15 && headTilt > 0.5) { reviewTxt += `⚠️ <strong>臨床所見:</strong> 体幹の右変位に対し、頭部を左側屈させて視界を水平に保とうとする代償挙動。`; }
                else { reviewTxt += `✅ <strong>臨床所見:</strong> 10秒移動平均の結果、側方動揺の定常的偏位は少なく、アライメントは適正制御範囲内です。後ろ姿で耳や目が隠れている場合はドットを直接ドラッグして位置を確定させてください。`; }
                reviewContent.innerHTML = reviewTxt;
            }
        } 
        else if (currentTab === "l_side" || currentTab === "r_side") {
            ctx.fillText(currentTab === "l_side" ? "🧍 左側面アライメント評価" : "🧍 右側面アライメント評価", 30, 45);
            const ear = currentTab === "l_side" ? getK('left_ear') : getK('right_ear');
            const shoulder = currentTab === "l_side" ? getK('left_shoulder') : getK('right_shoulder');
            
            if (ear && shoulder) {
                const forwardLean = Math.abs(Math.atan2(shoulder.x - ear.x, shoulder.y - ear.y) * 180 / Math.PI);
                ctx.fillStyle = "#ffffff"; ctx.fillText(`頭部前傾角 (耳-肩): ${forwardLean.toFixed(1)}°`, 30, 85);
                
                if (isRecording && isMP) {
                    const baselineY = (shoulder.x - ear.x) * 4;
                    swayHistory.push({ x: 0, y: baselineY });
                    drawSwayRadar();
                }

                if (isMP) {
                    let reviewTxt = `【側面アライメント評価】 3秒間サンプリング平均値：耳垂線と肩峰のアライメント角は <span class="review-highlight">${forwardLean.toFixed(1)}°</span> です。<br><br>`;
                    if (forwardLean > 15.0) { reviewTxt += `⚠️ <strong>臨床所見:</strong> 垂直アライメント軸から頭部が前方へ突出しています（<strong>ストレートネック兆候</strong>）。`; }
                    else { reviewTxt += `✅ <strong>臨床所見:</strong> 耳垂から肩峰の矢状面垂直軸は正常範囲内であり、頸椎へのメカニカルストレスは最小限です。`; }
                    reviewContent.innerHTML = reviewTxt;
                }
            } else {
                ctx.fillStyle = "#ffaa00"; ctx.fillText(`頭部前傾角: 耳・肩ポイントをドラッグ補正してください`, 30, 85);
                reviewContent.innerHTML = "横を向いたため、髪の毛等により耳（7/8番）や肩（11/12番）が隠れています。画面を拡大し、関節ドットを正しい位置へドラッグして確定させてください。";
            }
        }
        else if (currentTab === "dynamic") {
            ctx.fillText("🏃 動的動作: 片足立ちバランス評価", 30, 45);
            let shoulderTilt = 0;
            if (rS && lS) { shoulderTilt = ((rS.y - lS.y) / (lS.x - rS.x) * 180 / Math.PI); ctx.fillStyle = "#ffff00"; ctx.fillText(`体幹代償傾斜: ${Math.abs(shoulderTilt).toFixed(1)}°`, 30, 85); }
            if (isMP) {
                let reviewTxt = `【動的機能評価】 上半身の側方傾斜ブレ最大値は <span class="review-highlight">${Math.abs(shoulderTilt).toFixed(1)}°</span> を記録。<br><br>`;
                if (Math.abs(shoulderTilt) > 4.0) { reviewTxt += `⚠️ <strong>臨床所見:</strong> 挙上時に体幹を大きく傾ける運動制御不全（トレンデレンブルグ兆候）。`; }
                else { reviewTxt += `✅ <strong>臨床所見:</strong> 骨盤帯スタビリティ良好。`; }
                reviewContent.innerHTML = reviewTxt;
            }
        }
    }

    function drawSwayRadar() {
        if (!ctxRadar) return;
        clearRadar();
        if (swayHistory.length < 2) return;
        ctxRadar.save();
        ctxRadar.strokeStyle = "#00ff88"; ctxRadar.lineWidth = 1.5;
        ctxRadar.beginPath();
        swayHistory.forEach((pt, idx) => {
            const radarX = 70 + (pt.x * 0.8);
            const radarY = 70 + (pt.y * 0.8);
            if (idx === 0) ctxRadar.moveTo(radarX, radarY);
            else ctxRadar.lineTo(radarX, radarY);
        });
        ctxRadar.stroke();
        
        const lastPt = swayHistory[swayHistory.length - 1];
        ctxRadar.fillStyle = "#ff5252"; ctxRadar.beginPath();
        ctxRadar.arc(70 + (lastPt.x * 0.8), 70 + (lastPt.y * 0.8), 3, 0, 2*Math.PI); ctxRadar.fill();
        ctxRadar.restore();
    }

    recBtn.onclick = () => {
        isPausedForEdit = false; isRecording = true;
        coordinateBuffer = []; swayHistory = []; window.initialShoulderWidth = null;
        recordingStartTime = Date.now();
        
        recordingDuration = (currentTab === "front" || currentTab === "back") ? 10000 : 3000;
        timerDisplay.style.display = "block";
        recBtn.disabled = true; downloadCsvBtn.disabled = true;

        const timerInterval = setInterval(() => {
            const elapsed = Date.now() - recordingStartTime;
            const remaining = Math.max(0, (recordingDuration - elapsed) / 1000);
            timerDisplay.innerText = `REC ${remaining.toFixed(1)}s`;

            if (elapsed >= recordingDuration) {
                clearInterval(timerInterval);
                executePostProcessingStop(); 
            }
        }, 100);
    };

    function executePostProcessingStop() {
        isRecording = false; timerDisplay.style.display = "none";
        isPausedForEdit = true; 

        for (let mIdx = 0; mIdx < 2; mIdx++) {
            if (coordinateBuffer[mIdx] && coordinateBuffer[mIdx].length > 0) {
                const totalFrames = coordinateBuffer[mIdx].length;
                let avgKeypoints = JSON.parse(JSON.stringify(coordinateBuffer[mIdx][0]));
                
                avgKeypoints.forEach((kp, kpIdx) => {
                    let sumX = 0, sumY = 0;
                    for (let f = 0; f < totalFrames; f++) {
                        // 異常値(undefined)セーフティ
                        if(coordinateBuffer[mIdx][f][kpIdx]) {
                            sumX += coordinateBuffer[mIdx][f][kpIdx].x;
                            sumY += coordinateBuffer[mIdx][f][kpIdx].y;
                        }
                    }
                    kp.x = sumX / totalFrames; kp.y = sumY / totalFrames;
                    kp.score = 1.00; 
                });
                window.reportDataStore[currentTab][mIdx] = avgKeypoints;
            }
        }
        refreshReportView(); 
        recBtn.disabled = false; downloadCsvBtn.disabled = false;
    }

    canvases.forEach((canvas, modelIdx) => {
        canvas.addEventListener('mousedown', (e) => {
            if (!isPausedForEdit || !window.reportDataStore[currentTab][modelIdx]) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
            let closestIdx = -1; let minDist = CLICK_THRESHOLD;
            window.reportDataStore[currentTab][modelIdx].forEach((kp, idx) => {
                if (kp && kp.score > 0.0) { const dist = Math.hypot(kp.x - mouseX, kp.y - mouseY); if (dist < minDist) { minDist = dist; closestIdx = idx; } }
            });
            if (closestIdx !== -1) { dragTarget = { modelIdx, keypointIndex: closestIdx }; canvas.style.cursor = 'grabbing'; }
        });
        canvas.addEventListener('mousemove', (e) => {
            if (!isPausedForEdit || !dragTarget || dragTarget.modelIdx !== modelIdx) return;
            const rect = canvas.getBoundingClientRect();
            const kp = window.reportDataStore[currentTab][modelIdx][dragTarget.keypointIndex];
            if (kp) {
                kp.x = (e.clientX - rect.left) * (canvas.width / rect.width);
                kp.y = (e.clientY - rect.top) * (canvas.height / rect.height);
                kp.score = 1.00; // 手動確定
                refreshReportView(); 
            }
        });
        window.addEventListener('mouseup', () => { if (dragTarget && dragTarget.modelIdx === modelIdx) { dragTarget = null; canvas.style.cursor = 'default'; } });
    });

    function refreshReportView() {
        const w = video.videoWidth, h = video.videoHeight;
        for (let i = 0; i < 2; i++) {
            const ctx = ctxs[i]; const canvas = canvases[i];
            ctx.drawImage(video, 0, 0, w, h);
            drawCenterGrid(ctx, canvas);
            if (window.reportDataStore[currentTab][i]) {
                const kps = window.reportDataStore[currentTab][i];
                drawSkeleton(ctx, kps, i === 0 ? '#ff5252' : '#00ffff');
                runReviewLogic(ctx, (n) => kps.find(k => k.name === n), i === 0);
            }
            ctxComb.drawImage(canvas, i * w, 0);
        }
    }

    async function init() {
        try {
            await tf.setBackend('webgl'); await tf.ready();
            detectors[0] = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' });
            detectors[1] = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });
            
            clearRadar();

            const devices = await navigator.mediaDevices.enumerateDevices();
            videoSource.innerHTML = '';
            devices.forEach(d => { if(d.kind==='videoinput'){ const o=document.createElement('option'); o.value=d.deviceId; o.text=d.label||'Camera'; videoSource.appendChild(o); }});
            startBtn.innerText = "📷 カメラを起動";
        } catch (e) { 
            console.error(e);
            startBtn.innerText = "❌ 起動エラー"; 
        }
    }

    startBtn.onclick = async () => {
        if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: videoSource.value ? { deviceId: { exact: videoSource.value } } : true });
            video.srcObject = currentStream;
            video.onloadeddata = () => {
                canvases.forEach(c=>{c.width=video.videoWidth;c.height=video.videoHeight;}); canvasComb.width=video.videoWidth*2; canvasComb.height=video.videoHeight;
                isPausedForEdit = false; isRunning=true; render(); recBtn.disabled=false;
            };
        } catch(e){ alert("カメラ起動失敗"); }
    };

    async function render() {
        if (!isRunning || isPausedForEdit) return;
        const w = video.videoWidth, h = video.videoHeight;
        for (let i = 0; i < 2; i++) {
            const ctx = ctxs[i]; const canvas = canvases[i];
            ctx.drawImage(video, 0, 0, w, h);
            drawCenterGrid(ctx, canvas);
            const poses = await detectors[i].estimatePoses(video);
            if (poses.length > 0) {
                const kps = poses[0].keypoints;
                window.reportDataStore[currentTab][i] = kps;
                
                if (isRecording) {
                    if (!coordinateBuffer[i]) coordinateBuffer[i] = [];
                    coordinateBuffer[i].push(kps);
                    poseDataLog.push({ time: Date.now(), model: i===0?"MediaPipe":"MoveNet", mode: currentTab, keypoints: kps });
                }

                drawSkeleton(ctx, kps, i === 0 ? '#ff5252' : '#00ffff');
                runReviewLogic(ctx, (n) => kps.find(k => k.name === n && k.score > 0.1), i === 0);
            }
        }
        requestAnimationFrame(render);
    }

    function drawCenterGrid(ctx, canvas) {
        ctx.save(); ctx.strokeStyle="rgba(255,255,255,0.2)"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,canvas.height/2); ctx.lineTo(canvas.width,canvas.height/2); ctx.stroke(); ctx.restore();
    }

    function drawSkeleton(ctx, kps, color) {
        ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 2;
        const isMP = kps.length > 20;
        const pairs = isMP ? [[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],[23,25],[25,27],[24,26],[26,28]] : [[5,6],[5,11],[6,12],[11,12],[5,7],[7,9],[6,8],[8,10],[11,13],[13,15],[12,14],[14,16]];
        pairs.forEach(([s,e])=>{ 
            const p1=kps[s], p2=kps[e]; 
            if(p1 && p2 && p1.score > 0.0 && p2.score > 0.0){ ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
        });

        const lA = kps[isMP ? 27 : 15], rA = kps[isMP ? 28 : 16];
        if(lA && rA && lA.score > 0.0 && rA.score > 0.0){
            const mx=(lA.x+rA.x)/2, my=(lA.y+rA.y)/2;
            ctx.strokeStyle=color; ctx.setLineDash([6,4]); ctx.beginPath(); ctx.moveTo(mx,my); ctx.lineTo(mx,0); ctx.stroke(); ctx.setLineDash([]);
        }

        if (isMP) {
            const drawCustomLine = (id1, id2, strokeColor) => {
                const pt1 = kps[id1], pt2 = kps[id2];
                if (pt1 && pt2 && pt1.score > 0.1 && pt2.score > 0.1) { ctx.save(); ctx.strokeStyle = strokeColor; ctx.beginPath(); ctx.moveTo(pt1.x, pt1.y); ctx.lineTo(pt2.x, pt2.y); ctx.stroke(); ctx.restore(); }
            };
            if (currentTab === "front" || currentTab === "back") { drawCustomLine(1, 5, "#00ff88"); drawCustomLine(7, 8, "#00ff88"); } 
            else if (currentTab === "l_side" || currentTab === "r_side") { drawCustomLine(7, 11, "#ff00ff"); drawCustomLine(8, 12, "#ff00ff"); }
        }
        kps.forEach(k=>{ if(k && k.score > 0.0){ ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(k.x,k.y,2.5,0,2*Math.PI); ctx.fill(); }});
        ctx.restore();
    }

    function calculateAngle(A,B,C) { let d=Math.abs((Math.atan2(C.y-B.y,C.x-B.x)-Math.atan2(A.y-B.y,A.x-B.x))*180/Math.PI); return d>180?360-d:d; }
    
    downloadCsvBtn.onclick = () => {
        let c="Timestamp,Model,Mode,PointID,PointName,X,Y\n";
        poseDataLog.forEach(d=>{ d.keypoints.forEach((kp, idx)=>{ if(kp) c+=`${d.time},${d.model},${d.mode},${idx},${kp.name},${kp.x.toFixed(1)},${kp.y.toFixed(1)}\n`; }); });
        const b=new Blob([c],{type:'text/csv'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=`connect_ai_final_v8_${Date.now()}.csv`; a.click();
    };

    window.addEventListener('DOMContentLoaded', init);
</script>
