<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNECT AI - Master Evaluation Engine V58 (Complete)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        .controls { padding: 12px 15px; background: #1a1a1a; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; align-items: center; border-bottom: 2px solid #333; }
        button, select, input { padding: 8px 12px; font-size: 14px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; outline: none; }
        .mode-dropdown { background: #333; color: #deff9a; border: 1px solid #555; padding: 8px; font-size: 14px; }
        .mode-dropdown optgroup { color: #aaa; background: #222; }
        #durationSelect { background: #1976d2; color: #fff; border: 1px solid #0d47a1; }
        #startBtn { background: #1976d2; color: white; }
        #startBtn:disabled { background: #555; cursor: not-allowed; }
        #recBtn { background: #d32f2f; color: white; min-width: 150px; }
        #downloadCsvBtn { background: #2e7d32; color: white; }
        #printReportBtn { background: #ff9100; color: #000; box-shadow: 0 0 10px rgba(255,145,0,0.3); }
        .toggle-label { color: #00bfff; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px; background: #222; padding: 6px 10px; border-radius: 6px; border: 1px solid #00bfff; }
        .input-group { display: flex; align-items: center; gap: 5px; background: #333; padding: 4px 10px; border-radius: 6px; border: 1px solid #555; }
        .input-group input[type="number"] { width: 60px; background: #222; color: #00bfff; text-align: right; border: 1px solid #444; font-weight: bold; }
        #calibrateMatBtn { background: #673ab7; color: white; }
        #calibrateMatBtn.active { background: #ffeb3b; color: black; box-shadow: 0 0 15px rgba(255,235,59,0.8); animation: pulse 1s infinite; }
        #arCalibrateBtn { background: #00e676; color: black; font-weight: bold; box-shadow: 0 0 10px rgba(0,230,118,0.3); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .info-panel { position: absolute; top: 55px; left: 15px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px; color: #fff; font-size: 12px; z-index: 10; border-left: 3px solid #673ab7; pointer-events: none; }
        .debug-panel { position: absolute; top: 110px; left: 15px; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 6px; font-size: 14px; color: #ffeb3b; border: 2px solid #ffeb3b; z-index: 50; font-family: monospace; pointer-events: none; box-shadow: 0 0 15px rgba(255,235,59,0.4); }
        #tiltPanel { display: none; position: absolute; top: 170px; left: 15px; background: rgba(15,15,15,0.9); border: 2px solid #ff9100; border-radius: 12px; padding: 15px; z-index: 500; box-shadow: 0 5px 20px rgba(255,145,0,0.3); }
        .tilt-header { color: #ff9100; font-size: 14px; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .tilt-slider { width: 200px; cursor: pointer; }
        .tilt-val { display: block; text-align: center; color: white; font-size: 16px; font-weight: bold; margin-top: 5px; }
        .playback-controls { display: none; padding: 12px 15px; background: #002233; justify-content: center; gap: 15px; align-items: center; border-bottom: 2px solid #00bfff; width: 100%; box-sizing: border-box; }
        #timelineSlider { flex: 1; max-width: 500px; cursor: pointer; }
        #playPauseBtn { background: #00bfff; color: #000; min-width: 90px; }
        #backToCamBtn { background: #555; color: white; }
        #editFrameBtn { background: #ff9100; color: #000; font-weight: bold; }
        .container { display: flex; width: 100vw; height: calc(100dvh - 70px); position: relative; background: #000; justify-content: center; align-items: center; }
        .view-port { width: 100%; height: 100%; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; touch-action: none; -webkit-user-select: none; user-select: none; }
        .label { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 4px; font-size: 14px; color: #deff9a; border: 1px solid #deff9a; z-index: 10; font-weight: bold; pointer-events: none; }
        .timer-display { position: absolute; top: 15px; right: 15px; background: rgba(211, 47, 47, 0.9); color: white; padding: 8px 18px; font-size: 20px; font-weight: bold; border-radius: 6px; display: none; z-index: 100; pointer-events: none; }
        .radar-wrapper { position: absolute; top: 60px; right: 15px; width: 150px; height: 150px; z-index: 200; touch-action: none; cursor: grab; transition: transform 0.2s, opacity 0.2s; }
        .radar-wrapper.dragging { cursor: grabbing; transform: scale(1.1); opacity: 0.8; z-index: 999; box-shadow: 0 10px 25px rgba(0,0,0,0.8); border-radius: 50%; transition: none; }
        .radar-box { width: 150px; height: 150px; background: rgba(0, 0, 0, 0.85); border-radius: 50%; box-shadow: 0 0 15px rgba(255,82,82,0.5); border: 2px solid #ff5252; pointer-events: none; }
        .radar-title { position: absolute; top: -20px; left: 15px; font-size: 12px; background: rgba(0,0,0,0.8); padding: 3px 8px; border-radius: 4px; font-weight: bold; white-space: nowrap; pointer-events: none; color: #ff5252; border: 1px solid #ff5252; }
        #dpadPanel { position: absolute; top: 30px; right: 30px; background: rgba(15, 15, 15, 0.95); border: 2px solid #00bfff; border-radius: 16px; padding: 15px 25px; z-index: 1000; display: none; flex-direction: column; align-items: center; box-shadow: 0 5px 20px rgba(0, 191, 255, 0.3); }
        .dpad-header { color: #00bfff; font-size: 14px; font-weight: bold; margin-bottom: 12px; }
        .dpad-row { display: flex; justify-content: center; gap: 8px; margin: 4px 0; }
        .dpad-btn { width: 55px; height: 55px; border-radius: 12px; background: #2a2a2a; color: white; font-size: 24px; border: 1px solid #444; cursor: pointer; }
        .dpad-btn:active { background: #00bfff; color: black; }
        .dpad-step-btn { font-size: 14px; background: #1976d2; border: none; font-weight: bold; }
        .dpad-close { position: absolute; right: -10px; top: -10px; width: 32px; height: 32px; border-radius: 50%; background: #ff5252; color: white; border: none; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        @media print { body { background: white; color: black; overflow: visible; } .controls, .playback-controls, .container, #tiltPanel, #dpadPanel, .debug-panel { display: none !important; } }
    </style>
</head>
<body>

<div class="controls" id="mainControls">
    <select id="videoSource" style="background:#fff; color:#000;"><option value="">カメラ検索中...</option></select>
    <button id="startBtn" disabled>⏳ 起動準備中...</button>
    <div class="input-group">
        <span style="color:#aaa; font-size:12px;">身長</span>
        <input type="number" id="patientHeight" value="170" min="100" max="220">
        <span style="color:#aaa; font-size:12px;">cm</span>
    </div>
    <div class="input-group">
        <span style="color:#aaa; font-size:12px;">ARｻｲｽﾞ</span>
        <input type="number" id="arMarkerSize" value="17.5" min="5" max="50" step="0.1">
        <span style="color:#aaa; font-size:12px;">cm</span>
    </div>
    <button id="arCalibrateBtn">📷 AR自動空間校正</button>
    <button id="calibrateMatBtn">📏 手動マット校正</button>

    <select id="modeSelect" class="mode-dropdown" onchange="switchReportTab(this.value)">
        <optgroup label="■ 静止姿勢アライメント">
            <option value="front" selected>🧍 前面</option><option value="back">🧍 後面</option><option value="l_side">🧍 左側面</option><option value="r_side">🧍 右側面</option>
        </optgroup>
        <optgroup label="■ 動的機能評価">
            <option value="dyn_overhead">🏋️ OHS [前面]</option><option value="dyn_overhead_side">🏋️ OHS [側面]</option><option value="dyn_single_r">🦵 片脚バランス [右軸]</option>
            <option value="dyn_single_l">🦵 片脚バランス [左軸]</option><option value="dyn_flex_fwd">🙇 立位体前屈</option><option value="dyn_flex_bwd">🤸 立位体後屈</option>
            <option value="dyn_shoulder_r">👐 肩複合可動性 [右上]</option><option value="dyn_shoulder_l">👐 肩複合可動性 [左上]</option>
        </optgroup>
    </select>
    
    <select id="durationSelect">
        <option value="5000">⏱️ 5秒間</option><option value="10000" selected>⏱️ 10秒間</option><option value="15000">⏱️ 15秒間</option>
        <option value="20000">⏱️ 20秒間</option><option value="30000">⏱️ 30秒間</option>
    </select>
    
    <label class="toggle-label"><input type="checkbox" id="showSwayAlert" checked> 警告表示</label>
    <button id="recBtn" disabled>🔴 録画スタート</button>
    <button id="downloadCsvBtn" disabled>📊 CSV出力</button>
    <button id="printReportBtn" onclick="prepareAndPrintReport()">📄 PDFレポート</button>
</div>

<div class="playback-controls" id="playbackControls">
    <button id="backToCamBtn">🔙 再測定へ</button>
    <button id="playPauseBtn">▶ 再生</button>
    <input type="range" id="timelineSlider" min="0" max="100" value="0">
    <span id="frameCounter" style="color:#00bfff; font-weight:bold; font-size:14px;">0 / 0</span>
    <button id="editFrameBtn">✂️ このフレームを微調整</button>
</div>

<div class="container">
    <div id="timerDisplay" class="timer-display">REC 10.0s</div>
    <div id="dpadPanel">
        <div class="dpad-header">🎯 ポイント微調整 <button class="dpad-close" id="dpadClose">✖</button></div>
        <div class="dpad-row"><button class="dpad-btn" id="dpadUp">▲</button></div>
        <div class="dpad-row"><button class="dpad-btn" id="dpadLeft">◀</button><button class="dpad-btn dpad-step-btn" id="dpadStep">1px</button><button class="dpad-btn" id="dpadRight">▶</button></div>
        <div class="dpad-row"><button class="dpad-btn" id="dpadDown">▼</button></div>
    </div>

    <div id="tiltPanel">
        <div class="tilt-header">📐 骨盤傾斜角 (目視補正)</div>
        <div style="display:flex; justify-content:space-between; color:#aaa; font-size:10px;"><span>後傾 (-20°)</span><span>前傾 (+30°)</span></div>
        <input type="range" id="pelvicTiltSlider" class="tilt-slider" min="-20" max="30" value="0">
        <div class="tilt-val" id="tiltValDisplay">0° (ニュートラル)</div>
    </div>

    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="label">CONNECT AI - V58 Complete Fix</div>
        <div class="info-panel" id="infoPanel">スケール未校正<br>骨盤傾斜: 0°</div>
        <div class="debug-panel" id="debugLog">AR Status: Initializing Engine...</div>
        <div id="radarWrapperMP" class="radar-wrapper">
            <div class="radar-title">COP RADAR</div>
            <canvas id="canvasRadarMP" class="radar-box" width="150" height="150"></canvas>
        </div>
    </div>
</div>

<canvas id="canvasCombined" style="display:none;"></canvas>
<video id="video" autoplay playsinline muted></video>
<video id="playbackVideo" playsinline muted style="display:none;"></video>

<script>
    const video = document.getElementById('video');
    const playbackVideo = document.getElementById('playbackVideo'); 
    const canvasMP = document.getElementById('canvasMP');
    const ctxMP = canvasMP.getContext('2d');
    const canvasComb = document.getElementById('canvasCombined');
    const ctxComb = canvasComb.getContext('2d');
    const radarWrapperMP = document.getElementById('radarWrapperMP');
    const canvasRadarMP = document.getElementById('canvasRadarMP');
    const ctxRadarMP = canvasRadarMP.getContext('2d');
    
    const startBtn = document.getElementById('startBtn');
    const recBtn = document.getElementById('recBtn');
    const durationSelect = document.getElementById('durationSelect'); 
    const timerDisplay = document.getElementById('timerDisplay');
    const downloadCsvBtn = document.getElementById('downloadCsvBtn');
    const showSwayAlertCheckbox = document.getElementById('showSwayAlert');
    const videoSource = document.getElementById('videoSource');
    const debugLog = document.getElementById('debugLog');

    const heightInput = document.getElementById('patientHeight');
    const calibrateMatBtn = document.getElementById('calibrateMatBtn');
    const arCalibrateBtn = document.getElementById('arCalibrateBtn');
    const arMarkerSizeInput = document.getElementById('arMarkerSize');
    const infoPanel = document.getElementById('infoPanel');
    const tiltPanel = document.getElementById('tiltPanel');
    const pelvicTiltSlider = document.getElementById('pelvicTiltSlider');
    const tiltValDisplay = document.getElementById('tiltValDisplay');

    let detectors = []; 
    let isRunning = false, isRecording = false, isPausedForEdit = false; 
    let currentTab = "front", currentStream = null, appMode = "camera", isPlaying = false;
    let playbackDataMP = [], mainRenderId = null, recordingDuration = 10000; 
    let coordinateBufferMP = [], poseDataLog = [], recorder, recordedChunks = [];
    let selectedJointIndex = null, dpadStepVal = 1, isEditingPlaybackFrame = false, swayHistoryMP = [];
    let activeRadarDrag = null, isRadarMovedManually = false, longPressTimer = null, initialTouch = null;

    let pxToCmRatio = null; 
    let estimatedPelvicTilt = 0; 
    let calibState = "idle";
    let calibrationPoints = [];
    let staticBackgroundData = null; 
    
    let arDetector = null;
    let latestDetectedMarkers = [];
    let arCanvas = document.createElement('canvas');
    let arCtx = arCanvas.getContext('2d', { willReadFrequently: true });

    window.currentAnchorPos = null; window.customOriginMarkers = {}; window.anchorStatus = "unlocked";
    const DURATION_MAP = { 'front': 10000, 'back': 5000, 'l_side': 5000, 'r_side': 5000, 'dyn_overhead': 15000, 'dyn_overhead_side': 15000, 'dyn_single_r': 15000, 'dyn_single_l': 15000, 'dyn_flex_fwd': 10000, 'dyn_flex_bwd': 10000, 'dyn_shoulder_r': 10000, 'dyn_shoulder_l': 10000 };
    window.reportDataStore = {};
    ['front','back','l_side','r_side','dyn_overhead','dyn_overhead_side','dyn_single_r','dyn_single_l','dyn_flex_fwd','dyn_flex_bwd','dyn_shoulder_r','dyn_shoulder_l'].forEach(dir => { window.reportDataStore[dir] = null; window.customOriginMarkers[dir] = null; });

    function loadScript(src) {
        return new Promise(function(resolve, reject) {
            let s = document.createElement('script'); s.src = src; s.onload = resolve; s.onerror = reject; document.head.appendChild(s);
        });
    }

    async function loadARLibrary() {
        const arCdns = [
            ["https://cdn.jsdelivr.net/npm/js-aruco@0.1.0/src/cv.js", "https://cdn.jsdelivr.net/npm/js-aruco@0.1.0/src/aruco.js"],
            ["https://unpkg.com/js-aruco@0.1.0/src/cv.js", "https://unpkg.com/js-aruco@0.1.0/src/aruco.js"],
            ["https://raw.githack.com/juj/jsaruco/master/src/cv.js", "https://raw.githack.com/juj/jsaruco/master/src/aruco.js"]
        ];
        for (let i = 0; i < arCdns.length; i++) {
            try {
                debugLog.innerText = "AR Status: Fetching Server " + (i+1) + " (NPM)...";
                await loadScript(arCdns[i][0]); await loadScript(arCdns[i][1]);
                if (typeof AR !== 'undefined') return true;
            } catch (e) { console.warn("CDN " + (i+1) + " failed."); }
        }
        return false;
    }

    async function init() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
            videoSource.innerHTML = '<option value="">⚠️ セキュリティ制限 (HTTPS必須)</option>'; startBtn.innerText = "❌ 起動不可"; return;
        }
        try { const tStream = await navigator.mediaDevices.getUserMedia({ video: true }); tStream.getTracks().forEach(t => t.stop()); } catch(e) {}
        
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            videoSource.innerHTML = ''; let camCount = 1, hasCam = false;
            devices.forEach(function(d) { if(d.kind==='videoinput') { videoSource.appendChild(new Option(d.label || "カメラ "+camCount++, d.deviceId)); hasCam = true; }});
            if(!hasCam) videoSource.innerHTML = '<option value="">カメラが見つかりません</option>';
            
            startBtn.innerText = "⏳ AI/AR読込中..."; startBtn.disabled = true;
            let arLoaded = await loadARLibrary();
            
            if (arLoaded) {
                arDetector = new AR.Detector();
                debugLog.innerText = "AR Status: Ready\nWait for Camera..."; debugLog.style.color = "#00e676"; debugLog.style.borderColor = "#00e676";
            } else {
                debugLog.innerText = "AR Status: Failed\nAll servers blocked by ISP."; debugLog.style.color = "#ff5252"; debugLog.style.borderColor = "#ff5252";
            }

            await tf.setBackend('webgl'); await tf.ready();
            detectors[0] = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' });
            
            startBtn.innerText = "📷 フルHD起動"; startBtn.disabled = false; updateInfoPanel();
        } catch (e) { startBtn.innerText = "❌ 起動エラー"; console.error(e); }
    }

    function updateInfoPanel() {
        let scaleText = pxToCmRatio ? "校正済 (1px = " + pxToCmRatio.toFixed(3) + "cm)" : "⚠️ スケール未校正";
        infoPanel.innerHTML = scaleText + "<br>記録された骨盤傾斜: " + (estimatedPelvicTilt > 0 ? '+' : '') + estimatedPelvicTilt + "°";
    }

    arCalibrateBtn.onclick = function() {
        if (latestDetectedMarkers.length === 0) { alert("マーカーが検出されていません。"); return; }
        let physicalSizeCm = parseFloat(arMarkerSizeInput.value) || 17.5;
        let sumRatio = 0; let count = 0;
        
        for (let i = 0; i < latestDetectedMarkers.length; i++) {
            let m = latestDetectedMarkers[i]; let c = m.corners;
            let d1 = Math.hypot(c[1].x - c[0].x, c[1].y - c[0].y), d2 = Math.hypot(c[2].x - c[1].x, c[2].y - c[1].y);
            let d3 = Math.hypot(c[3].x - c[2].x, c[3].y - c[2].y), d4 = Math.hypot(c[0].x - c[3].x, c[0].y - c[3].y);
            let maxPixelSide = Math.max(d1, d2, d3, d4);
            if (maxPixelSide > 5) { sumRatio += (physicalSizeCm / maxPixelSide); count++; }
        }
        
        if (count > 0) {
            pxToCmRatio = sumRatio / count; arCalibrateBtn.innerText = "✅ AR校正完了"; updateInfoPanel();
            setTimeout(function() { arCalibrateBtn.innerText = "📷 AR自動空間校正"; }, 2000);
        } else { alert("解析に失敗しました。"); }
    };

    calibrateMatBtn.onclick = function() {
        if (calibState === "idle") { calibState = "wait_left"; calibrationPoints = []; calibrateMatBtn.classList.add('active'); calibrateMatBtn.innerText = "📍 左端をタップ"; } 
        else if (calibState === "adjust_left") { calibState = "wait_right"; document.getElementById('dpadPanel').style.display = 'none'; calibrateMatBtn.innerText = "📍 右端をタップ"; } 
        else if (calibState === "adjust_right") {
            let distPx = Math.hypot(calibrationPoints[1].x - calibrationPoints[0].x, calibrationPoints[1].y - calibrationPoints[0].y);
            if(distPx > 10) pxToCmRatio = 45.0 / distPx; 
            calibState = "idle"; calibrateMatBtn.classList.remove('active'); document.getElementById('dpadPanel').style.display = 'none';
            calibrateMatBtn.innerText = "✅ 校正完了"; updateInfoPanel(); setTimeout(function() { if(calibState==="idle") calibrateMatBtn.innerText = "手動マット校正"; }, 2000);
        } else { calibState = "idle"; calibrationPoints = []; calibrateMatBtn.classList.remove('active'); document.getElementById('dpadPanel').style.display = 'none'; calibrateMatBtn.innerText = "手動マット校正"; }
    };

    pelvicTiltSlider.oninput = function(e) {
        let val = parseInt(e.target.value); tiltValDisplay.innerText = val === 0 ? "0° (ニュートラル)" : (val > 0 ? "+" + val + "° (前傾)" : val + "° (後傾)"); estimatedPelvicTilt = val; updateInfoPanel();
    };

    function generateVirtualASIS(kps) {
        if(!kps) return kps;
        let distancePx = (parseFloat(heightInput.value) * 0.085) / (pxToCmRatio || 0.15); 
        let aRad = (45 - estimatedPelvicTilt) * (Math.PI / 180);
        let upPx = distancePx * Math.sin(aRad), fwdPx = distancePx * Math.cos(aRad);
        
        let lHip = kps.find(k=>k.name==='left_hip'||k.name==='23'), rHip = kps.find(k=>k.name==='right_hip'||k.name==='24');
        if (lHip && rHip && lHip.score > 0.5 && rHip.score > 0.5) {
            let asisL = { x: lHip.x, y: lHip.y - upPx, score: 1.0, name: 'virtual_asis_l' }, asisR = { x: rHip.x, y: rHip.y - upPx, score: 1.0, name: 'virtual_asis_r' };
            if (currentTab === 'r_side') { asisL.x += fwdPx; asisR.x += fwdPx; } else if (currentTab === 'l_side') { asisL.x -= fwdPx; asisR.x -= fwdPx; }
            let newKps = JSON.parse(JSON.stringify(kps)); newKps.push(asisL); newKps.push(asisR); return newKps;
        }
        return kps;
    }

    function updateRadar(kps, canvas) {
        const hist = swayHistoryMP; const color = "#ff5252"; const nose = kps.find(k => k.name === 'nose');
        let oX = window.currentAnchorPos ? window.currentAnchorPos.x : canvas.width/2; let oY = window.currentAnchorPos ? window.currentAnchorPos.y : canvas.height;
        if (nose) {
            let cX = nose.x - oX; let hDist = oY - nose.y;
            if (!hist.baseHDist) hist.baseHDist = hDist; let cY = hist.baseHDist - hDist;
            if (currentTab.includes("side")) { const sh = kps.find(k=>k.name==='left_shoulder')||kps.find(k=>k.name==='right_shoulder'); if(sh) cX = nose.x - sh.x; }
            hist.push({ x: cX, y: cY }); if (hist.length > 150) hist.shift(); drawSpecificRadar(ctxRadarMP, hist, color);
        }
    }

    function drawPlaybackRadar(dataArray, currentFrameIdx, canvas) {
        clearRadar(ctxRadarMP, "#ff5252"); let hist = []; let baseHDist = null;
        for (let i = 0; i <= currentFrameIdx; i++) {

    function drawSpecificRadar(ctx, history, color) {
        clearRadar(ctx, color); if (history.length < 2) return;
        const scale = 0.5, maxR = 65; 
        ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
        history.forEach((pt, idx) => { 
            let rX = 75 + (pt.x * scale), rY = 75 + (pt.y * scale), dist = Math.hypot(rX - 75, rY - 75);
            if (dist > maxR) { rX = 75 + ((rX - 75) * maxR / dist); rY = 75 + ((rY - 75) * maxR / dist); }
            idx === 0 ? ctx.moveTo(rX, rY) : ctx.lineTo(rX, rY); 
        });
        ctx.stroke(); 
        const lPt = history[history.length - 1]; 
        let lRX = 75 + (lPt.x * scale), lRY = 75 + (lPt.y * scale), lDist = Math.hypot(lRX - 75, lRY - 75);
        if (lDist > maxR) { lRX = 75 + ((lRX - 75) * maxR / lDist); lRY = 75 + ((lRY - 75) * maxR / lDist); }
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(lRX, lRY, 4, 0, 2*Math.PI); ctx.fill(); ctx.restore();
    }

    function drawSkeleton(ctx, kps, color) {
        ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 4;
        let pairs = [[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],[23,25],[25,27],[24,26],[26,28]];
        if (currentTab === 'r_side') pairs = pairs.filter(p => ![[11,13],[13,15],[23,25],[25,27]].some(e => e[0]===p[0] && e[1]===p[1]));
        else if (currentTab === 'l_side') pairs = pairs.filter(p => ![[12,14],[14,16],[24,26],[26,28]].some(e => e[0]===p[0] && e[1]===p[1]));

        pairs.forEach(([s,e])=>{ const p1=kps[s], p2=kps[e]; if(p1 && p2 && p1.score>0 && p2.score>0){ ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }});
        kps.forEach((k, i)=>{ 
            if(k && k.score>0 && !k.name?.includes('virtual')){ 
                let draw = true;
                if (currentTab==='r_side' && [11,13,15,23,25,27,29,31].includes(i)) draw = false; 
                if (currentTab==='l_side' && [12,14,16,24,26,28,30,32].includes(i)) draw = false; 
                if (draw) { ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(k.x,k.y,4,0,2*Math.PI); ctx.fill(); }
            }
        }); 

        let aL=kps.find(k=>k.name==='virtual_asis_l'), aR=kps.find(k=>k.name==='virtual_asis_r'), lH=kps.find(k=>k.name==='left_hip'||k.name==='23'), rH=kps.find(k=>k.name==='right_hip'||k.name==='24');
        if(aL && lH) { ctx.strokeStyle="#39ff14"; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(lH.x, lH.y); ctx.lineTo(aL.x, aL.y); ctx.stroke(); ctx.fillStyle="#39ff14"; ctx.beginPath(); ctx.arc(aL.x, aL.y, 8, 0, 2*Math.PI); ctx.fill(); }
        if(aR && rH) { ctx.strokeStyle="#39ff14"; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(rH.x, rH.y); ctx.lineTo(aR.x, aR.y); ctx.stroke(); ctx.fillStyle="#39ff14"; ctx.beginPath(); ctx.arc(aR.x, aR.y, 8, 0, 2*Math.PI); ctx.fill(); }
        
        if((currentTab==='front'||currentTab==='back') && aL && aR) {
            ctx.strokeStyle="rgba(57,255,20,0.5)"; ctx.setLineDash([]); ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(aL.x, aL.y); ctx.lineTo(aR.x, aR.y); ctx.stroke();
            if(pxToCmRatio) { ctx.fillStyle="#39ff14"; ctx.font="bold 16px sans-serif"; ctx.fillText("骨盤高低差: "+(Math.abs(aL.y-aR.y)*pxToCmRatio).toFixed(1)+"cm", Math.min(aL.x,aR.x), Math.min(aL.y,aR.y)-20); }
        }
        ctx.restore();
    }

    function runReviewLogic(ctx, getK, canvas) {
        const nose = getK('nose'); let oX, oY;
        if (currentTab==='front'||currentTab==='back'||currentTab==='dyn_overhead'||currentTab.startsWith("dyn_single")) {
            if (window.customOriginMarkers[currentTab]) { oX = window.customOriginMarkers[currentTab].x; oY = window.customOriginMarkers[currentTab].y; } else {

                if (fX.length >= 2) { oX = (Math.min(...fX) + Math.max(...fX))/2; oY = Math.max(...fY); }
            }
        }
        if (oX !== undefined && oY !== undefined) {
            window.currentAnchorPos = { x: oX, y: oY }; let c = window.anchorStatus==="dragging"?"rgba(255,165,0,0.8)":"rgba(0,191,255,0.8)";
            ctx.save(); ctx.fillStyle = c; ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(oX, oY, 20, 0, 2*Math.PI); ctx.fill(); ctx.stroke();

            }

        }
    }

    window.addEventListener('load', init); 

    startBtn.onclick = async function() {
        if (mainRenderId) { cancelAnimationFrame(mainRenderId); mainRenderId = null; }
        if(currentStream) { currentStream.getTracks().forEach(t=>t.stop()); video.pause(); video.srcObject = null; }
        swayHistoryMP = []; window.currentAnchorPos = null; window.customOriginMarkers = {}; selectedJointIndex = null; clearRadar(ctxRadarMP, "#ff5252"); latestDetectedMarkers = [];

        try {
            const constraints = { video: { width: { ideal: 1920 }, height: { ideal: 1080 } } };
            if (videoSource.value) constraints.video.deviceId = { exact: videoSource.value }; else constraints.video.facingMode = "environment";
            currentStream = await navigator.mediaDevices.getUserMedia(constraints); video.srcObject = currentStream;
            video.onloadeddata = () => { 
                canvasMP.width=video.videoWidth; canvasMP.height=video.videoHeight; canvasComb.width=video.videoWidth; canvasComb.height=video.videoHeight; 
                isPausedForEdit=false; staticBackgroundData=null; isRunning=true; video.play(); render(); recBtn.disabled=false; 
            };
        } catch(e){ alert("カメラへのアクセスが許可されていません。"); }
    };

    async function render() {
        if (!isRunning || appMode === 'playback' || isPausedForEdit) { if(isRunning) mainRenderId = requestAnimationFrame(render); return; }
        if (video.readyState < 2) { mainRenderId = requestAnimationFrame(render); return; }
        const w = video.videoWidth, h = video.videoHeight;
        
        ctxMP.drawImage(video, 0, 0, w, h); drawCenterGrid(ctxMP, canvasMP);

        if (appMode === "camera" && !isRecording && arDetector) {
            try {
                const arScale = 640 / w; const arW = 640, arH = h * arScale;
                arCanvas.width = arW; arCanvas.height = arH; arCtx.drawImage(video, 0, 0, arW, arH);
                let imgData = arCtx.getImageData(0, 0, arW, arH);
                latestDetectedMarkers = arDetector.detect(imgData);
                
                if (latestDetectedMarkers.length > 0) {
                    latestDetectedMarkers.forEach(m => m.corners.forEach(c => { c.x /= arScale; c.y /= arScale; }));
                    drawARMarkers(ctxMP, latestDetectedMarkers);
                    debugLog.innerText = "AR: OK (" + w + "x" + h + ") Found:" + latestDetectedMarkers.length; debugLog.style.color = "#00e676"; debugLog.style.borderColor = "#00e676";
                } else {
                    debugLog.innerText = "AR: OK (" + w + "x" + h + ") No Markers"; debugLog.style.color = "#ffeb3b"; debugLog.style.borderColor = "#ffeb3b";
                }
            } catch(e) { debugLog.innerText = "AR Err: " + e.message; debugLog.style.color = "#ff5252"; debugLog.style.borderColor = "#ff5252"; }
        }

        if (calibState !== "idle") {
            ctxMP.fillStyle = "#ffeb3b";
            if(calibrationPoints[0]){ ctxMP.beginPath(); ctxMP.arc(calibrationPoints[0].x, calibrationPoints[0].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_left") drawCrosshair(ctxMP, calibrationPoints[0], canvasMP); }
            if(calibrationPoints[1]){ ctxMP.beginPath(); ctxMP.arc(calibrationPoints[1].x, calibrationPoints[1].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_right") drawCrosshair(ctxMP, calibrationPoints[1], canvasMP); }
        }
        
        const poses = await detectors[0].estimatePoses(video);
        if (poses.length > 0) {
            let kps = poses[0].keypoints; kps = generateVirtualASIS(kps); window.reportDataStore[currentTab] = kps;
            if (isRecording) { if(!coordinateBufferMP) coordinateBufferMP=[]; coordinateBufferMP.push(kps); poseDataLog.push({ time: Date.now(), mode: currentTab, keypoints: JSON.parse(JSON.stringify(kps)) }); }
            drawSkeleton(ctxMP, kps, currentTab.startsWith('dyn_') ? '#ffffff' : '#ff5252'); 
            runReviewLogic(ctxMP, n => kps.find(k=>k.name===n), canvasMP); updateRadar(kps, canvasMP); 
        }
        ctxComb.drawImage(canvasMP, 0, 0, w, h); mainRenderId = requestAnimationFrame(render);
    }
    
    function prepareAndPrintReport() { window.print(); }
    downloadCsvBtn.onclick = () => { 
        let c="Timestamp,Mode,PointID,PointName,X,Y\n"; 
        poseDataLog.forEach(d => d.keypoints.forEach((kp, idx) => { if(kp) c+=d.time+","+d.mode+","+idx+","+kp.name+","+kp.x.toFixed(1)+","+kp.y.toFixed(1)+"\n"; })); 
        const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([c],{type:'text/csv'})); a.download="connect_ai_data_"+Date.now()+".csv"; a.click(); 
    };
</script>
</body>
