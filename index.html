<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿勢検証ツール Pro - 重心ロジック刷新版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
        .controls { padding: 10px; text-align: center; background: #333; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: center; }
        button, select { padding: 10px 14px; font-size: 14px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        #startCamBtn { background: #4a4a4a; color: white; }
        #recordBtn { background: #d32f2f; color: white; }
        #stopRecBtn { background: #1976d2; color: white; }
        #switchBtn { background: #616161; color: white; }
        #calibBtn { background: #673ab7; color: white; } 
        #resetEvalBtn { background: #f57c00; color: white; display: none; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        select { background: #eee; color: #333; }
        .container { display: flex; width: 100vw; height: calc(100vh - 120px); }
        .view-port { flex: 1; position: relative; border-right: 1px solid #444; overflow: hidden; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .stats { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 8px; font-size: 12px; border-radius: 4px; pointer-events: none; z-index: 10; }
        .recording-indicator { position: absolute; top: 10px; right: 10px; color: #ff1744; font-weight: bold; display: none; align-items: center; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 20px; z-index: 10; }
    </style>
</head>
<body>

<div class="controls">
    <button id="startCamBtn" disabled>モデル読込中...</button>
    <button id="switchBtn" disabled>🔄 カメラ</button>
    <button id="calibBtn" disabled>🎯 マット校正</button>
    <button id="resetEvalBtn" disabled>🔄 測定リセット</button>
    <div style="border-left: 1px solid #666; height: 30px; margin: 0 10px;"></div>
    
    <select id="modeSelect">
        <option value="none">可視化オフ</option>
        <option value="squat_side">スクワット側面 (モビリティ)</option>
        <option value="squat_front">スクワット正面 (スタビリティ)</option>
        <option value="single_leg" selected>片足立ち正面 (重心レーダー)</option>
    </select>
    
    <button id="recordBtn" disabled>🔴 計測開始</button>
    <button id="stopRecBtn" disabled>⏹️ 保存</button>
</div>

<div class="container">
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="stats" id="statsMP">MediaPipe</div>
        <div class="recording-indicator" id="recIndMP">● RECORDING</div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div class="stats" id="statsMN">MoveNet</div>
        <div class="recording-indicator" id="recIndMN">● RECORDING</div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('video');
    const canvasMP = document.getElementById('canvasMP');
    const canvasMN = document.getElementById('canvasMN');
    const ctxMP = canvasMP.getContext('2d');
    const ctxMN = canvasMN.getContext('2d');
    const modeSelect = document.getElementById('modeSelect');
    const recordBtn = document.getElementById('recordBtn');
    const stopRecBtn = document.getElementById('stopRecBtn');
    const calibBtn = document.getElementById('calibBtn');
    const resetEvalBtn = document.getElementById('resetEvalBtn');
    const recInds = [document.getElementById('recIndMP'), document.getElementById('recIndMN')];
    
    let detectorMP, detectorMN;
    let isCameraRunning = false, isRecording = false;
    let logData = [], frameCount = 0;
    let currentFacingMode = 'environment'; 

    let calibrationPoints = []; 
    let isCalibratingMat = false;
    let homographyMatrix = null; 

    // 【刷新】重心管理オブジェクト
    let calib = {};
    function resetEvaluation() {
        ['MediaPipe', 'MoveNet'].forEach(m => {
            calib[m] = { 
                state: 'waiting', 
                countdownStart: 0, 
                frames: 0, 
                baseP: 0, baseS: 0, 
                baseHipX: null, baseHipY: null, // ここがnullなら未設定
                swayHistory: [] 
            };
        });
    }
    resetEvaluation();

    modeSelect.addEventListener('change', () => {
        resetEvaluation();
        if (modeSelect.value === 'single_leg') {
            calibBtn.style.display = 'inline-block';
            resetEvalBtn.style.display = 'inline-block';
            calibBtn.disabled = false; 
            resetEvalBtn.disabled = false;
        } else {
            calibBtn.style.display = 'none';
            resetEvalBtn.style.display = 'none';
        }
    });

    calibBtn.addEventListener('click', () => {
        calibrationPoints = [];
        isCalibratingMat = true;
        homographyMatrix = null;
        calibBtn.innerText = `🎯 校正中 (0/4)`;
        calibBtn.style.backgroundColor = "#d81b60"; 
        alert("マットの4隅を「左上→右上→右下→左下」の順でタップしてください。");
    });

    resetEvalBtn.addEventListener('click', () => {
        resetEvaluation();
    });

    const handleCanvasClick = (e) => {
        if (!isCalibratingMat) return;
        const canvas = e.target;
        const rect = canvas.getBoundingClientRect();
        const scale = Math.min(rect.width / canvas.width, rect.height / canvas.height);
        const offsetX = (rect.width - canvas.width * scale) / 2;
        const offsetY = (rect.height - canvas.height * scale) / 2;

        let x = (e.clientX - rect.left - offsetX) / scale;
        let y = (e.clientY - rect.top - offsetY) / scale;
        x = Math.max(0, Math.min(canvas.width, x));
        y = Math.max(0, Math.min(canvas.height, y));

        calibrationPoints.push({x, y});
        calibBtn.innerText = `🎯 校正中 (${calibrationPoints.length}/4)`;

        if (calibrationPoints.length === 4) {
            isCalibratingMat = false;
            calibBtn.innerText = `🎯 マット校正`; 
            calibBtn.style.backgroundColor = "#673ab7"; 
            computeHomography();
        }
    };
    canvasMP.addEventListener('mousedown', handleCanvasClick);
    canvasMN.addEventListener('mousedown', handleCanvasClick);

    // 数学的に安定したホモグラフィ計算（省略せず実装）
    function getSquareToQuad(pts) {
        let x0 = pts[0].x, y0 = pts[0].y, x1 = pts[1].x, y1 = pts[1].y;
        let x2 = pts[2].x, y2 = pts[2].y, x3 = pts[3].x, y3 = pts[3].y;
        let dx1 = x1 - x2, dx2 = x3 - x2, sx = x0 - x1 + x2 - x3;
        let dy1 = y1 - y2, dy2 = y3 - y2, sy = y0 - y1 + y2 - y3;
        let det = dx1 * dy2 - dy1 * dx2;
        if (Math.abs(det) < 1e-10) return null;
        let g = (sx * dy2 - sy * dx2) / det;
        let h = (dx1 * sy - dy1 * sx) / det;
        return [x1-x0+g*x1, x3-x0+h*x3, x0, y1-y0+g*y1, y3-y0+h*y3, y0, g, h, 1];
    }

    function invert3x3(m) {
        let det = m[0]*(m[4]*m[8]-m[5]*m[7]) - m[1]*(m[3]*m[8]-m[5]*m[6]) + m[2]*(m[3]*m[7]-m[4]*m[6]);
        if (Math.abs(det) < 1e-10) return null;
        let i = 1/det;
        return [
            (m[4]*m[8]-m[5]*m[7])*i, (m[2]*m[7]-m[1]*m[8])*i, (m[1]*m[5]-m[2]*m[4])*i,
            (m[5]*m[6]-m[3]*m[8])*i, (m[0]*m[8]-m[2]*m[6])*i, (m[2]*m[3]-m[0]*m[5])*i,
            (m[3]*m[7]-m[4]*m[6])*i, (m[1]*m[6]-m[0]*m[7])*i, (m[0]*m[4]-m[1]*m[3])*i
        ];
    }

    function computeHomography() {
        let M_sq_to_src = getSquareToQuad(calibrationPoints);
        if (!M_sq_to_src) return alert("校正エラー：形状が不適切です");
        let M_src_to_sq = invert3x3(M_sq_to_src);
        // マットサイズ500pxへマッピング
        let m = M_src_to_sq;
        homographyMatrix = [m[0]*500, m[1]*500, m[2]*500, m[3]*500, m[4]*500, m[5]*500, m[6], m[7], m[8]];
        resetEvaluation();
        alert("✅ 校正完了。片足で立って静止してください。");
    }

    function transformPoint(x, y) {
        if (!homographyMatrix) return {x, y};
        let m = homographyMatrix;
        let w = m[6]*x + m[7]*y + m[8];
        return { x: (m[0]*x + m[1]*y + m[2])/w, y: (m[3]*x + m[4]*y + m[5])/w };
    }

    async function initModels() {
        await tf.ready();
        detectorMP = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' });
        detectorMN = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });
        document.getElementById('startCamBtn').innerText = "📷 カメラ起動"; 
        document.getElementById('startCamBtn').disabled = false;
        if (modeSelect.value === 'single_leg') calibBtn.disabled = false;
    }

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: currentFacingMode } });
        video.srcObject = stream;
        return new Promise(r => video.onloadeddata = () => {
            canvasMP.width = canvasMN.width = video.videoWidth; 
            canvasMP.height = canvasMN.height = video.videoHeight;
            r();
        });
    }

    document.getElementById('startCamBtn').addEventListener('click', async () => {
        await setupCamera();
        isCameraRunning = true;
        document.getElementById('startCamBtn').disabled = true;
        document.getElementById('switchBtn').disabled = false;
        recordBtn.disabled = false;
        processFrame();
    });

    async function processFrame() {
        if (!isCameraRunning) return;
        ctxMP.drawImage(video, 0, 0, canvasMP.width, canvasMP.height);
        ctxMN.drawImage(video, 0, 0, canvasMN.width, canvasMN.height);

        const posesMP = await detectorMP.estimatePoses(video);
        const posesMN = await detectorMN.estimatePoses(video);

        drawAndEvaluate(posesMP, ctxMP, 'red', 'MediaPipe', canvasMP);
        drawAndEvaluate(posesMN, ctxMN, 'cyan', 'MoveNet', canvasMN);

        requestAnimationFrame(processFrame);
    }

    function drawAndEvaluate(poses, ctx, color, modelName, canvasObj) {
        if (poses.length === 0) return;
        const kps = poses[0].keypoints;
        const getK = (n) => kps.find(k => k.name === n && k.score > 0.3);
        
        // 骨格描画
        kps.forEach(k => { if(k.score > 0.3) { ctx.fillStyle = color; ctx.beginPath(); ctx.arc(k.x, k.y, 4, 0, 2*Math.PI); ctx.fill(); }});

        if (modeSelect.value !== 'single_leg') return;

        let lH = getK('left_hip'), rH = getK('right_hip'), lS = getK('left_shoulder'), rS = getK('right_shoulder');
        if (!lH || !rH || !lS || !rS) return;

        let hipX = (lH.x + rH.x) / 2;
        let hipY = (lH.y + rH.y) / 2;
        let pelvicTilt = Math.atan2(rH.y - lH.y, rH.x - lH.x) * 180 / Math.PI;
        let shoulderTilt = Math.atan2(rS.y - lS.y, rS.x - lS.x) * 180 / Math.PI;

        // マット座標へ変換
        let normPos = transformPoint(hipX, hipY);
        let c = calib[modelName];

        // --- 測定シーケンス ---
        if (c.state === 'waiting') {
            c.state = 'countdown';
            c.countdownStart = performance.now();
        } else if (c.state === 'countdown') {
            let remain = Math.ceil(4 - (performance.now() - c.countdownStart) / 1000);
            ctx.fillStyle = "yellow"; ctx.font = "20px sans-serif";
            ctx.fillText(`⏳ 静止してください... ${remain}`, 10, 60);
            if (remain <= 0) c.state = 'calibrating';
        } else if (c.state === 'calibrating') {
            c.baseHipX = (c.baseHipX || 0) + normPos.x;
            c.baseHipY = (c.baseHipY || 0) + normPos.y;
            c.baseP += pelvicTilt; c.baseS += shoulderTilt;
            if (++c.frames >= 20) {
                c.baseHipX /= 20; c.baseHipY /= 20;
                c.baseP /= 20; c.baseS /= 20;
                c.state = 'done';
            }
        } else if (c.state === 'done') {
            // レーダー描画
            const rSize = 140, rMargin = 10;
            const rx = canvasObj.width - rSize - rMargin, ry = canvasObj.height - rSize - rMargin;
            const rcx = rx + rSize/2, rcy = ry + rSize/2;

            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(rx, ry, rSize, rSize);
            ctx.strokeStyle = "white"; ctx.strokeRect(rx, ry, rSize, rSize);
            
            // ズレ（スウェイ）の計算
            let dx = (normPos.x - c.baseHipX) * (rSize / 100); // 拡大率
            let dy = (normPos.y - c.baseHipY) * (rSize / 100);
            
            c.swayHistory.push({x: dx, y: dy});
            if (c.swayHistory.length > 50) c.swayHistory.shift();

            // 軌跡描画
            ctx.beginPath(); ctx.strokeStyle = "#00ffff";
            c.swayHistory.forEach((p, i) => {
                let px = rcx + p.x, py = rcy + p.y;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            });
            ctx.stroke();

            // 現在点
            ctx.fillStyle = "red"; ctx.beginPath(); 
            ctx.arc(rcx + dx, rcy + dy, 5, 0, 2*Math.PI); ctx.fill();

            // 判定表示
            let pErr = Math.abs(pelvicTilt - c.baseP);
            let sErr = Math.abs(shoulderTilt - c.baseS);
            let sway = Math.sqrt(dx*dx + dy*dy);

            ctx.font = "16px sans-serif";
            if (pErr < 7 && sErr < 7 && sway < 15) {
                ctx.fillStyle = "#00ff00"; ctx.fillText("✅ 姿勢安定 (OK)", 10, 60);
                // 画面中央に大きなOK
                ctx.font = "bold 80px sans-serif"; ctx.globalAlpha = 0.3;
                ctx.fillText("OK", canvasObj.width/2 - 60, canvasObj.height/2);
                ctx.globalAlpha = 1.0;
            } else {
                ctx.fillStyle = "orange"; ctx.fillText("⚠️ 補正動作あり", 10, 60);
            }
        }
    }

    initModels();
</script>
</body>
</html>
