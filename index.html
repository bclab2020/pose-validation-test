<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNECT AI - Master Evaluation Engine V60 (Stable / No AR)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        .controls { padding: 12px 15px; background: #1a1a1a; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; align-items: center; border-bottom: 2px solid #333; }
        button, select, input { padding: 8px 12px; font-size: 14px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; outline: none; }
        
        .mode-dropdown { background: #333; color: #deff9a; border: 1px solid #555; padding: 8px; font-size: 14px; }
        .mode-dropdown optgroup { color: #aaa; background: #222; }
        #durationSelect { background: #1976d2; color: #fff; border: 1px solid #0d47a1; }
        
        #startBtn { background: #1976d2; color: white; }
        #startBtn:disabled { background: #555; cursor: not-allowed; }
        #recBtn { background: #d32f2f; color: white; min-width: 150px; }
        #downloadCsvBtn { background: #2e7d32; color: white; }
        #printReportBtn { background: #ff9100; color: #000; box-shadow: 0 0 10px rgba(255,145,0,0.3); }
        
        .toggle-label { color: #00bfff; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px; background: #222; padding: 6px 10px; border-radius: 6px; border: 1px solid #00bfff; }

        .input-group { display: flex; align-items: center; gap: 5px; background: #333; padding: 4px 10px; border-radius: 6px; border: 1px solid #555; }
        .input-group input[type="number"] { width: 60px; background: #222; color: #00bfff; text-align: right; border: 1px solid #444; font-weight: bold; }
        
        #calibrateMatBtn { background: #673ab7; color: white; }
        #calibrateMatBtn.active { background: #ffeb3b; color: black; box-shadow: 0 0 15px rgba(255,235,59,0.8); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .info-panel { position: absolute; top: 55px; left: 15px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px; color: #fff; font-size: 12px; z-index: 10; border-left: 3px solid #673ab7; pointer-events: none; }
        
        #tiltPanel { display: none; position: absolute; top: 120px; left: 15px; background: rgba(15,15,15,0.9); border: 2px solid #ff9100; border-radius: 12px; padding: 15px; z-index: 500; box-shadow: 0 5px 20px rgba(255,145,0,0.3); }
        .tilt-header { color: #ff9100; font-size: 14px; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .tilt-slider { width: 200px; cursor: pointer; }
        .tilt-val { display: block; text-align: center; color: white; font-size: 16px; font-weight: bold; margin-top: 5px; }

        .playback-controls { display: none; padding: 12px 15px; background: #002233; justify-content: center; gap: 15px; align-items: center; border-bottom: 2px solid #00bfff; width: 100%; box-sizing: border-box; }
        #timelineSlider { flex: 1; max-width: 500px; cursor: pointer; }
        #playPauseBtn { background: #00bfff; color: #000; min-width: 90px; }
        #backToCamBtn { background: #555; color: white; }
        #editFrameBtn { background: #ff9100; color: #000; font-weight: bold; }
        
        /* Androidナビゲーションバー対応 (100dvh) */
        .container { display: flex; width: 100vw; height: calc(100dvh - 70px); position: relative; background: #000; justify-content: center; align-items: center; }
        .view-port { width: 100%; height: 100%; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; touch-action: none; -webkit-user-select: none; user-select: none; }
        
        .label { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 4px; font-size: 14px; color: #deff9a; border: 1px solid #deff9a; z-index: 10; font-weight: bold; pointer-events: none; }
        .timer-display { position: absolute; top: 15px; right: 15px; background: rgba(211, 47, 47, 0.9); color: white; padding: 8px 18px; font-size: 20px; font-weight: bold; border-radius: 6px; display: none; z-index: 100; pointer-events: none; }
        
        /* レーダー配置 (右上) */
        .radar-wrapper { position: absolute; top: 60px; right: 15px; width: 150px; height: 150px; z-index: 200; touch-action: none; cursor: grab; transition: transform 0.2s, opacity 0.2s; }
        .radar-wrapper.dragging { cursor: grabbing; transform: scale(1.1); opacity: 0.8; z-index: 999; box-shadow: 0 10px 25px rgba(0,0,0,0.8); border-radius: 50%; transition: none; }
        .radar-box { width: 150px; height: 150px; background: rgba(0, 0, 0, 0.85); border-radius: 50%; box-shadow: 0 0 15px rgba(255,82,82,0.5); border: 2px solid #ff5252; pointer-events: none; }
        .radar-title { position: absolute; top: -20px; left: 15px; font-size: 12px; background: rgba(0,0,0,0.8); padding: 3px 8px; border-radius: 4px; font-weight: bold; white-space: nowrap; pointer-events: none; color: #ff5252; border: 1px solid #ff5252; }

        /* D-Pad 配置 (右上) */
        #dpadPanel { position: absolute; top: 30px; right: 30px; background: rgba(15, 15, 15, 0.95); border: 2px solid #00bfff; border-radius: 16px; padding: 15px 25px; z-index: 1000; display: none; flex-direction: column; align-items: center; box-shadow: 0 5px 20px rgba(0, 191, 255, 0.3); }
        .dpad-header { color: #00bfff; font-size: 14px; font-weight: bold; margin-bottom: 12px; }
        .dpad-row { display: flex; justify-content: center; gap: 8px; margin: 4px 0; }
        .dpad-btn { width: 55px; height: 55px; border-radius: 12px; background: #2a2a2a; color: white; font-size: 24px; border: 1px solid #444; cursor: pointer; }
        .dpad-btn:active { background: #00bfff; color: black; }
        .dpad-step-btn { font-size: 14px; background: #1976d2; border: none; font-weight: bold; }
        .dpad-close { position: absolute; right: -10px; top: -10px; width: 32px; height: 32px; border-radius: 50%; background: #ff5252; color: white; border: none; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        @media print { body { background: white; color: black; overflow: visible; } .controls, .playback-controls, .container, #tiltPanel, #dpadPanel { display: none !important; } }
    </style>
</head>
<body>

<div class="controls" id="mainControls">
    <select id="videoSource" style="background:#fff; color:#000;"><option value="">カメラ検索中...</option></select>
    <button id="startBtn" disabled>⏳ 起動準備中...</button>
    
    <div class="input-group">
        <span style="color:#aaa; font-size:12px;">身長</span>
        <input type="number" id="patientHeight" value="170" min="100" max="220">
        <span style="color:#aaa; font-size:12px;">cm</span>
    </div>
    
    <button id="calibrateMatBtn">📏 手動マット校正(45cm)</button>

    <select id="modeSelect" class="mode-dropdown" onchange="switchReportTab(this.value)">
        <optgroup label="■ 静止姿勢アライメント">
            <option value="front" selected>🧍 前面</option>
            <option value="back">🧍 後面</option>
            <option value="l_side">🧍 左側面</option>
            <option value="r_side">🧍 右側面</option>
        </optgroup>
        <optgroup label="■ 動的機能評価">
            <option value="dyn_overhead">🏋️ OHS [前面]</option>
            <option value="dyn_overhead_side">🏋️ OHS [側面]</option>
            <option value="dyn_single_r">🦵 片脚バランス [右軸]</option>
            <option value="dyn_single_l">🦵 片脚バランス [左軸]</option>
            <option value="dyn_flex_fwd">🙇 立位体前屈</option>
            <option value="dyn_flex_bwd">🤸 立位体後屈</option>
            <option value="dyn_shoulder_r">👐 肩複合可動性 [右上]</option>
            <option value="dyn_shoulder_l">👐 肩複合可動性 [左上]</option>
        </optgroup>
    </select>
    
    <select id="durationSelect">
        <option value="5000">⏱️ 5秒間</option>
        <option value="10000" selected>⏱️ 10秒間</option>
        <option value="15000">⏱️ 15秒間</option>
        <option value="20000">⏱️ 20秒間</option>
        <option value="30000">⏱️ 30秒間</option>
    </select>
    
    <label class="toggle-label"><input type="checkbox" id="showSwayAlert" checked> 警告表示</label>
    <button id="recBtn" disabled>🔴 録画スタート</button>
    <button id="downloadCsvBtn" disabled>📊 CSV出力</button>
    <button id="printReportBtn" onclick="prepareAndPrintReport()">📄 PDFレポート</button>
</div>

<div class="playback-controls" id="playbackControls">
    <button id="backToCamBtn">🔙 再測定へ</button>
    <button id="playPauseBtn">▶ 再生</button>
    <input type="range" id="timelineSlider" min="0" max="100" value="0">
    <span id="frameCounter" style="color:#00bfff; font-weight:bold; font-size:14px;">0 / 0</span>
    <button id="editFrameBtn">✂️ このフレームを微調整</button>
</div>

<div class="container">
    <div id="timerDisplay" class="timer-display">REC 10.0s</div>
    
    <div id="dpadPanel">
        <div class="dpad-header">🎯 ポイント微調整 <button class="dpad-close" id="dpadClose">✖</button></div>
        <div class="dpad-row"><button class="dpad-btn" id="dpadUp">▲</button></div>
        <div class="dpad-row">
            <button class="dpad-btn" id="dpadLeft">◀</button>
            <button class="dpad-btn dpad-step-btn" id="dpadStep">1px</button>
            <button class="dpad-btn" id="dpadRight">▶</button>
        </div>
        <div class="dpad-row"><button class="dpad-btn" id="dpadDown">▼</button></div>
    </div>

    <div id="tiltPanel">
        <div class="tilt-header">📐 骨盤傾斜角 (目視補正)</div>
        <div style="display:flex; justify-content:space-between; color:#aaa; font-size:10px;"><span>後傾 (-20°)</span><span>前傾 (+30°)</span></div>
        <input type="range" id="pelvicTiltSlider" class="tilt-slider" min="-20" max="30" value="0">
        <div class="tilt-val" id="tiltValDisplay">0° (ニュートラル)</div>
    </div>

    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="label">CONNECT AI - V60 Stable Edition</div>
        <div class="info-panel" id="infoPanel">スケール未校正<br>骨盤傾斜: 0°</div>
        
        <div id="radarWrapperMP" class="radar-wrapper">
            <div class="radar-title">COP RADAR</div>
            <canvas id="canvasRadarMP" class="radar-box" width="150" height="150"></canvas>
        </div>
    </div>
</div>

<canvas id="canvasCombined" style="display:none;"></canvas>
<video id="video" autoplay playsinline muted></video>
<video id="playbackVideo" playsinline muted style="display:none;"></video>

<script>
    const video = document.getElementById('video');
    const playbackVideo = document.getElementById('playbackVideo'); 
    const canvasMP = document.getElementById('canvasMP');
    const ctxMP = canvasMP.getContext('2d');
    const canvasComb = document.getElementById('canvasCombined');
    const ctxComb = canvasComb.getContext('2d');
    
    const radarWrapperMP = document.getElementById('radarWrapperMP');
    const canvasRadarMP = document.getElementById('canvasRadarMP');
    const ctxRadarMP = canvasRadarMP.getContext('2d');
    
    const startBtn = document.getElementById('startBtn');
    const recBtn = document.getElementById('recBtn');
    const durationSelect = document.getElementById('durationSelect'); 
    const timerDisplay = document.getElementById('timerDisplay');
    const downloadCsvBtn = document.getElementById('downloadCsvBtn');
    const showSwayAlertCheckbox = document.getElementById('showSwayAlert');
    const videoSource = document.getElementById('videoSource');

    const heightInput = document.getElementById('patientHeight');
    const calibrateMatBtn = document.getElementById('calibrateMatBtn');
    const infoPanel = document.getElementById('infoPanel');
    const tiltPanel = document.getElementById('tiltPanel');
    const pelvicTiltSlider = document.getElementById('pelvicTiltSlider');
    const tiltValDisplay = document.getElementById('tiltValDisplay');

    let detectors = []; 
    let isRunning = false, isRecording = false, isPausedForEdit = false; 
    let currentTab = "front", currentStream = null, appMode = "camera", isPlaying = false;
    let playbackDataMP = [], mainRenderId = null, recordingDuration = 10000; 
    let coordinateBufferMP = [], poseDataLog = [], recorder, recordedChunks = [];
    let selectedJointIndex = null, dpadStepVal = 1, isEditingPlaybackFrame = false, swayHistoryMP = [];
    let activeRadarDrag = null, isRadarMovedManually = false, longPressTimer = null, initialTouch = null;

    let pxToCmRatio = null; 
    let estimatedPelvicTilt = 0; 
    let calibState = "idle";
    let calibrationPoints = [];
    let staticBackgroundData = null; 

    window.currentAnchorPos = null; window.customOriginMarkers = {}; window.anchorStatus = "unlocked";
    const DURATION_MAP = { 'front': 10000, 'back': 5000, 'l_side': 5000, 'r_side': 5000, 'dyn_overhead': 15000, 'dyn_overhead_side': 15000, 'dyn_single_r': 15000, 'dyn_single_l': 15000, 'dyn_flex_fwd': 10000, 'dyn_flex_bwd': 10000, 'dyn_shoulder_r': 10000, 'dyn_shoulder_l': 10000 };
    window.reportDataStore = {};
    ['front', 'back', 'l_side', 'r_side', 'dyn_overhead', 'dyn_overhead_side', 'dyn_single_r', 'dyn_single_l', 'dyn_flex_fwd', 'dyn_flex_bwd', 'dyn_shoulder_r', 'dyn_shoulder_l'].forEach(dir => { window.reportDataStore[dir] = null; window.customOriginMarkers[dir] = null; });

    async function init() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
            videoSource.innerHTML = '<option value="">⚠️ セキュリティ制限 (HTTPS必須)</option>';
            startBtn.innerText = "❌ 起動不可";
            alert("カメラAPIがブロックされています。HTTPS環境で実行してください。");
            return;
        }

        try { const tempStream = await navigator.mediaDevices.getUserMedia({ video: true }); tempStream.getTracks().forEach(t => t.stop()); } catch(e) { console.warn("初期カメラ許可スキップ"); }
        
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            videoSource.innerHTML = ''; let camCount = 1, hasCam = false;
            devices.forEach(function(d) { 
                if(d.kind==='videoinput') { 
                    const label = d.label || "カメラ " + camCount++; 
                    videoSource.appendChild(new Option(label, d.deviceId)); 
                    hasCam = true;
                } 
            });
            if(!hasCam) videoSource.innerHTML = '<option value="">カメラが見つかりません</option>';
            
            startBtn.innerText = "⏳ AIモデル読込中...";
            startBtn.disabled = true;

            await tf.setBackend('webgl'); await tf.ready();
            detectors[0] = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' });
            
            startBtn.innerText = "📷 フルHD起動";
            startBtn.disabled = false;
            updateInfoPanel();
            
        } catch (e) { 
            startBtn.innerText = "❌ 起動エラー"; 
            console.error(e); 
        }
    }

    function updateInfoPanel() {
        let scaleText = pxToCmRatio ? "校正済 (1px = " + pxToCmRatio.toFixed(3) + "cm)" : "⚠️ スケール未校正";
        infoPanel.innerHTML = scaleText + "<br>記録された骨盤傾斜: " + (estimatedPelvicTilt > 0 ? '+' : '') + estimatedPelvicTilt + "°";
    }

    calibrateMatBtn.onclick = function() {
        if (calibState === "idle") {
            calibState = "wait_left"; calibrationPoints = [];
            calibrateMatBtn.classList.add('active'); calibrateMatBtn.innerText = "📍 左端をタップ";
        } else if (calibState === "adjust_left") {
            calibState = "wait_right"; document.getElementById('dpadPanel').style.display = 'none';
            calibrateMatBtn.innerText = "📍 右端をタップ";
        } else if (calibState === "adjust_right") {
            let distPx = Math.hypot(calibrationPoints[1].x - calibrationPoints[0].x, calibrationPoints[1].y - calibrationPoints[0].y);
            if(distPx > 10) pxToCmRatio = 45.0 / distPx; 
            calibState = "idle"; calibrateMatBtn.classList.remove('active'); document.getElementById('dpadPanel').style.display = 'none';
            calibrateMatBtn.innerText = "✅ 校正完了"; updateInfoPanel();
            setTimeout(function() { if(calibState==="idle") calibrateMatBtn.innerText = "📏 手動マット校正(45cm)"; }, 2000);
        } else {
            calibState = "idle"; calibrationPoints = []; calibrateMatBtn.classList.remove('active');
            document.getElementById('dpadPanel').style.display = 'none'; calibrateMatBtn.innerText = "📏 手動マット校正(45cm)";
        }
    };

    pelvicTiltSlider.oninput = function(e) {
        let val = parseInt(e.target.value);
        tiltValDisplay.innerText = val === 0 ? "0° (ニュートラル)" : (val > 0 ? "+" + val + "° (前傾)" : val + "° (後傾)");
        estimatedPelvicTilt = val;
        updateInfoPanel();
    };

    function generateVirtualASIS(kps) {
        if(!kps) return kps;
        let height = parseFloat(heightInput.value) || 170;
        let distanceCm = height * 0.085; 
        let ratio = pxToCmRatio || 0.15; 
        let distancePx = distanceCm / ratio;
        
        let angleRad = (45 - estimatedPelvicTilt) * (Math.PI / 180);
        let upwardOffsetPx = distancePx * Math.sin(angleRad);
        let forwardOffsetPx = distancePx * Math.cos(angleRad);
        
        let lHip = null; let rHip = null;
        for(let i=0; i<kps.length; i++){
            if(kps[i].name === 'left_hip' || kps[i].name === '23') lHip = kps[i];
            if(kps[i].name === 'right_hip' || kps[i].name === '24') rHip = kps[i];
        }
        
        if (lHip && rHip && lHip.score > 0.5 && rHip.score > 0.5) {
            let asisL = { x: lHip.x, y: lHip.y - upwardOffsetPx, score: 1.0, name: 'virtual_asis_l' };
            let asisR = { x: rHip.x, y: rHip.y - upwardOffsetPx, score: 1.0, name: 'virtual_asis_r' };
            if (currentTab === 'r_side') { asisL.x += forwardOffsetPx; asisR.x += forwardOffsetPx; } 
            else if (currentTab === 'l_side') { asisL.x -= forwardOffsetPx; asisR.x -= forwardOffsetPx; }
            let newKps = JSON.parse(JSON.stringify(kps));
            newKps.push(asisL); newKps.push(asisR); 
            return newKps;
        }
        return kps;
    }

    function updateRadar(kps, canvas) {
        const history = swayHistoryMP; const radarCtx = ctxRadarMP; const color = "#ff5252"; const nose = kps.find(k => k.name === 'nose');
        let originX = window.currentAnchorPos ? window.currentAnchorPos.x : canvas.width/2; let originY = window.currentAnchorPos ? window.currentAnchorPos.y : canvas.height;
        if (nose) {
            let copX = nose.x - originX; let hDist = originY - nose.y;
            if (history.length === 0 || history.baseHDist === undefined) history.baseHDist = hDist;
            let copY = history.baseHDist - hDist;
            if (currentTab.includes("side")) { const shoulder = kps.find(k => k.name === 'left_shoulder') || kps.find(k => k.name === 'right_shoulder'); if (shoulder) copX = nose.x - shoulder.x; }
            history.push({ x: copX, y: copY }); if (history.length > 150) history.shift(); drawSpecificRadar(radarCtx, history, color);
        }
    }

    function drawPlaybackRadar(dataArray, currentFrameIdx, canvas) {
        const radarCtx = ctxRadarMP; const color = "#ff5252"; clearRadar(radarCtx, color); let history = []; let baseHDist = null;
        for (let i = 0; i <= currentFrameIdx; i++) {
            const frameData = dataArray[i]; if (!frameData) continue;
            const kps = frameData.keypoints; const nose = kps.find(k => k.name === 'nose');
            let originX = window.currentAnchorPos ? window.currentAnchorPos.x : canvas.width/2; let originY = window.currentAnchorPos ? window.currentAnchorPos.y : canvas.height;
            if (nose) {
                let copX = nose.x - originX; let hDist = originY - nose.y;
                if (baseHDist === null) baseHDist = hDist; let copY = baseHDist - hDist;
                if (currentTab.includes("side")) { const shoulder = kps.find(k => k.name === 'left_shoulder') || kps.find(k => k.name === 'right_shoulder'); if (shoulder) copX = nose.x - shoulder.x; }
                history.push({ x: copX, y: copY });
            }
        }
        if (history.length > 0) drawSpecificRadar(radarCtx, history, color);
    }

    function drawSpecificRadar(ctx, history, color) {
        clearRadar(ctx, color); if (history.length < 2) return;
        const scale = 0.5; const maxRadius = 65; 
        ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
        history.forEach(function(pt, idx) { 
            let rX = 75 + (pt.x * scale); let rY = 75 + (pt.y * scale); 
            let dist = Math.hypot(rX - 75, rY - 75);
            if (dist > maxRadius) { rX = 75 + ((rX - 75) * maxRadius / dist); rY = 75 + ((rY - 75) * maxRadius / dist); }
            if (idx === 0) ctx.moveTo(rX, rY); else ctx.lineTo(rX, rY); 
        });
        ctx.stroke(); 
        const lastPt = history[history.length - 1]; 
        let lastRX = 75 + (lastPt.x * scale); let lastRY = 75 + (lastPt.y * scale);
        let lastDist = Math.hypot(lastRX - 75, lastRY - 75);
        if (lastDist > maxRadius) { lastRX = 75 + ((lastRX - 75) * maxRadius / lastDist); lastRY = 75 + ((lastRY - 75) * maxRadius / lastDist); }
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(lastRX, lastRY, 4, 0, 2*Math.PI); ctx.fill(); ctx.restore();
    }

    function clearRadar(ctx, color) {
        if (!ctx) return; ctx.clearRect(0, 0, 150, 150); ctx.strokeStyle = color + "44"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(75, 75, 30, 0, 2*Math.PI); ctx.stroke(); ctx.beginPath(); ctx.arc(75, 75, 60, 0, 2*Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(75, 10); ctx.lineTo(75, 140); ctx.moveTo(10, 75); ctx.lineTo(140, 75); ctx.stroke(); 
    }

    radarWrapperMP.style.touchAction = "none"; 
    radarWrapperMP.addEventListener('pointerdown', function(e) {
        e.stopPropagation(); 
        if (activeRadarDrag) return;
        initialTouch = { x: e.clientX, y: e.clientY };
        longPressTimer = setTimeout(function() {
            const rect = radarWrapperMP.getBoundingClientRect();

    function drawSkeleton(ctx, kps, color) {
        ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 4;
        let pairs = [[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],[23,25],[25,27],[24,26],[26,28]];
        
        if (currentTab === 'r_side') {
            pairs = pairs.filter(p => ![[11,13],[13,15],[23,25],[25,27]].some(exclude => exclude[0] === p[0] && exclude[1] === p[1]));
        } else if (currentTab === 'l_side') {
            pairs = pairs.filter(p => ![[12,14],[14,16],[24,26],[26,28]].some(exclude => exclude[0] === p[0] && exclude[1] === p[1]));
        }

        pairs.forEach(function([s,e]){ 
            const p1=kps[s], p2=kps[e]; 
            if(p1 && p2 && p1.score > 0.0 && p2.score > 0.0){ ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
        });
        
        kps.forEach(function(k, i){ 
            if(k && k.score > 0.0 && !k.name?.includes('virtual')){ 
                let shouldDraw = true;
                if (currentTab === 'r_side' && [11,13,15,23,25,27,29,31].includes(i)) shouldDraw = false; 
                if (currentTab === 'l_side' && [12,14,16,24,26,28,30,32].includes(i)) shouldDraw = false; 
                if (shouldDraw) { ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(k.x,k.y,4,0,2*Math.PI); ctx.fill(); }
            }
        }); 

        let asisL = null, asisR = null, lHip = null, rHip = null;
        for(let i=0; i<kps.length; i++){
            if(kps[i].name === 'virtual_asis_l') asisL = kps[i];
            if(kps[i].name === 'virtual_asis_r') asisR = kps[i];
            if(kps[i].name === 'left_hip' || kps[i].name === '23') lHip = kps[i];
            if(kps[i].name === 'right_hip' || kps[i].name === '24') rHip = kps[i];
        }

        if(asisL && lHip) { ctx.strokeStyle="#39ff14"; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(lHip.x, lHip.y); ctx.lineTo(asisL.x, asisL.y); ctx.stroke(); ctx.fillStyle="#39ff14"; ctx.beginPath(); ctx.arc(asisL.x, asisL.y, 8, 0, 2*Math.PI); ctx.fill(); }
        if(asisR && rHip) { ctx.strokeStyle="#39ff14"; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(rHip.x, rHip.y); ctx.lineTo(asisR.x, asisR.y); ctx.stroke(); ctx.fillStyle="#39ff14"; ctx.beginPath(); ctx.arc(asisR.x, asisR.y, 8, 0, 2*Math.PI); ctx.fill(); }
        
        if((currentTab === 'front' || currentTab === 'back') && asisL && asisR) {
            ctx.strokeStyle="rgba(57, 255, 20, 0.5)"; ctx.setLineDash([]); ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(asisL.x, asisL.y); ctx.lineTo(asisR.x, asisR.y); ctx.stroke();
            if(pxToCmRatio) {
                let diffCm = Math.abs(asisL.y - asisR.y) * pxToCmRatio;
                ctx.fillStyle="#39ff14"; ctx.font="bold 16px sans-serif";
                ctx.fillText("骨盤左右高低差: " + diffCm.toFixed(1) + "cm", Math.min(asisL.x, asisR.x), Math.min(asisL.y, asisR.y) - 20);
            }
        }
        ctx.restore();
    }

    function drawCrosshair(ctx, kp, canvas) {
        if(!kp) return;
        ctx.save(); ctx.strokeStyle = "rgba(0, 191, 255, 0.7)"; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(0, kp.y); ctx.lineTo(canvas.width, kp.y); ctx.moveTo(kp.x, 0); ctx.lineTo(kp.x, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.arc(kp.x, kp.y, 14, 0, 2*Math.PI); ctx.strokeStyle = "#00bfff"; ctx.lineWidth = 3; ctx.setLineDash([]); ctx.stroke();
        ctx.fillStyle = "rgba(0, 191, 255, 0.3)"; ctx.fill(); ctx.restore();
    }

    function runReviewLogic(ctx, getK, canvas) {
        ctx.fillStyle = "#deff9a"; ctx.font = "bold 24px sans-serif"; const nose = getK('nose'); let originX, originY;
        if (currentTab === "front" || currentTab === "back" || currentTab === "dyn_overhead" || currentTab.startsWith("dyn_single")) {
            if (window.customOriginMarkers[currentTab]) { originX = window.customOriginMarkers[currentTab].x; originY = window.customOriginMarkers[currentTab].y; } else {
                let footPtsX = [], footPtsY = []; ['left_ankle', 'right_ankle', 'left_heel', 'right_heel', 'left_foot_index', 'right_foot_index'].forEach(function(name) { let p = getK(name); if (p && p.score > 0.1) { footPtsX.push(p.x); footPtsY.push(p.y); } });
                if (footPtsX.length >= 2) { originX = (Math.min(...footPtsX) + Math.max(...footPtsX)) / 2; originY = Math.max(...footPtsY); }
            }
        }
        if (originX !== undefined && originY !== undefined) {
            window.currentAnchorPos = { x: originX, y: originY };
            let anchorColor = window.anchorStatus === "dragging" ? "rgba(255, 165, 0, 0.8)" : "rgba(0, 191, 255, 0.8)";
            ctx.save(); ctx.fillStyle = anchorColor; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(originX, originY, 20, 0, 2*Math.PI); ctx.fill(); ctx.stroke(); 
            if (showSwayAlertCheckbox.checked) {
                ctx.strokeStyle = anchorColor; ctx.lineWidth = 3; ctx.setLineDash([6, 6]); ctx.beginPath(); ctx.moveTo(originX, originY); ctx.lineTo(originX, 0); ctx.stroke(); 
                let sway = nose ? (nose.x - originX) : 0; let corridorColor = Math.abs(sway) > 30 ? "rgba(255, 0, 0, 0.15)" : "rgba(0, 255, 0, 0.1)";
                ctx.fillStyle = corridorColor; ctx.fillRect(originX - 30, 0, 60, originY);
            }
            ctx.restore();
        }
    }

    function getEventPos(canvas, e) {
        const rect = canvas.getBoundingClientRect(); let clientX, clientY;
        if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; } else if (e.changedTouches && e.changedTouches.length > 0) { clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY; } else { clientX = e.clientX; clientY = e.clientY; }
        if (clientX === undefined) return null;
        const videoRatio = canvas.width / canvas.height, containerRatio = rect.width / rect.height; let renderWidth, renderHeight, offsetX, offsetY;
        if (containerRatio > videoRatio) { renderHeight = rect.height; renderWidth = rect.height * videoRatio; offsetX = (rect.width - renderWidth) / 2; offsetY = 0; } else { renderWidth = rect.width; renderHeight = rect.width / videoRatio; offsetX = 0; offsetY = (rect.height - renderHeight) / 2; }
        const scaleX = canvas.width / renderWidth, scaleY = canvas.height / renderHeight; return { x: (clientX - rect.left - offsetX) * scaleX, y: (clientY - rect.top - offsetY) * scaleY, renderScale: scaleX };
    }

    canvasMP.addEventListener('pointerdown', function(e) {

        if (calibState !== "idle") {

            else if (calibState === "wait_right" || calibState === "adjust_right") { calibrationPoints[1] = pos; calibState = "adjust_right"; calibrateMatBtn.innerText = "✅ 右端を確定"; document.getElementById('dpadPanel').style.display = 'flex'; }
            if (isPausedForEdit) refreshReportView();
            return; 
        }

        const hitRadius = 80 * pos.renderScale; 
        if ((currentTab === "front" || currentTab === "back" || currentTab === "dyn_overhead" || currentTab.startsWith("dyn_single")) && window.currentAnchorPos && !isRecording && appMode !== 'playback') {
            if (Math.hypot(window.currentAnchorPos.x - pos.x, window.currentAnchorPos.y - pos.y) < hitRadius * 1.5) { dragTarget = { type: 'anchor' }; window.anchorStatus = "dragging"; closeDpad(); return; }
        }
        
        let kpsToSearch = null;
        if (appMode === 'playback' && isEditingPlaybackFrame) { const fIdx = parseInt(document.getElementById('timelineSlider').value); if (playbackDataMP[fIdx]) kpsToSearch = playbackDataMP[fIdx].keypoints; }

            if (closestIdx !== -1) { selectedJointIndex = closestIdx; document.getElementById('dpadPanel').style.display = 'flex'; } else { closeDpad(); }
            if (appMode === 'playback') renderPlaybackFrame(parseInt(document.getElementById('timelineSlider').value)); else refreshReportView();
        }
    });

    async function render() {
        if (!isRunning || appMode === 'playback' || isPausedForEdit) { if(isRunning) mainRenderId = requestAnimationFrame(render); return; }
        if (video.readyState < 2) { mainRenderId = requestAnimationFrame(render); return; }
        const w = video.videoWidth, h = video.videoHeight;
        
        ctxMP.drawImage(video, 0, 0, w, h); 
        drawCenterGrid(ctxMP, canvasMP);

        if (calibState !== "idle") {
            ctxMP.fillStyle = "#ffeb3b";
            if (calibrationPoints[0]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[0].x, calibrationPoints[0].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_left") drawCrosshair(ctxMP, calibrationPoints[0], canvasMP); }
            if (calibrationPoints[1]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[1].x, calibrationPoints[1].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_right") drawCrosshair(ctxMP, calibrationPoints[1], canvasMP); }
        }
        
        const poses = await detectors[0].estimatePoses(video);
        if (poses.length > 0) {
            let kps = poses[0].keypoints; 
            kps = generateVirtualASIS(kps); 
            window.reportDataStore[currentTab] = kps;
            if (isRecording) { if (!coordinateBufferMP) coordinateBufferMP = []; coordinateBufferMP.push(kps); poseDataLog.push({ time: Date.now(), mode: currentTab, keypoints: JSON.parse(JSON.stringify(kps)) }); }
            drawSkeleton(ctxMP, kps, currentTab.startsWith('dyn_') ? '#ffffff' : '#ff5252'); 
            runReviewLogic(ctxMP, (n) => { for(let i=0;i<kps.length;i++){ if(kps[i].name===n) return kps[i]; } return null; }, canvasMP);
            updateRadar(kps, canvasMP); 
        }
        ctxComb.drawImage(canvasMP, 0, 0, w, h);
        mainRenderId = requestAnimationFrame(render);
    }
    
    function prepareAndPrintReport() { window.print(); }
    downloadCsvBtn.onclick = function() { 
        let c="Timestamp,Mode,PointID,PointName,X,Y\n"; 
        poseDataLog.forEach(function(d){ d.keypoints.forEach(function(kp, idx){ if(kp) c+=d.time + "," + d.mode + "," + idx + "," + kp.name + "," + kp.x.toFixed(1) + "," + kp.y.toFixed(1) + "\n"; }); }); 
        const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([c],{type:'text/csv'})); a.download="connect_ai_data_" + Date.now() + ".csv"; a.click(); 
    };
</script>
