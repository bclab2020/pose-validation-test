<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿勢検証ツール Pro - 重心レーダー優先版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://unpkg.com/js-aruco@0.0.1/src/cv.js"></script>
    <script src="https://unpkg.com/js-aruco@0.0.1/src/aruco.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
        .controls { padding: 10px; text-align: center; background: #333; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: center; }
        button, select { padding: 10px 14px; font-size: 14px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        #startCamBtn { background: #1976d2; color: white; min-width: 250px; }
        #resetEvalBtn { background: #f57c00; color: white; display: none; }
        button:disabled { opacity: 0.6; cursor: wait; }
        .container { display: flex; width: 100vw; height: calc(100vh - 120px); }
        .view-port { flex: 1; position: relative; border-right: 1px solid #444; overflow: hidden; background: #000; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .calib-status { position: absolute; bottom: 10px; left: 10px; font-size: 12px; padding: 5px 12px; border-radius: 20px; z-index: 20; font-weight: bold; }
        .scanning { background: #ffab00; color: black; }
        .locked { background: #00c853; color: white; }
    </style>
</head>
<body>

<div class="controls">
    <button id="startCamBtn" disabled>1/3 システム準備中...</button>
    <button id="resetEvalBtn" disabled>🔄 測定リセット</button>
    <select id="modeSelect">
        <option value="single_leg" selected>重心動揺測定モード</option>
    </select>
</div>

<div class="container">
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div id="statusMP" class="calib-status"></div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div id="statusMN" class="calib-status"></div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('video');
    const canvasMP = document.getElementById('canvasMP');
    const canvasMN = document.getElementById('canvasMN');
    const ctxMP = canvasMP.getContext('2d');
    const ctxMN = canvasMN.getContext('2d');
    const startCamBtn = document.getElementById('startCamBtn');
    
    let detectorMP, detectorMN, detectorAR;
    let isCameraRunning = false;
    let homographyMatrix = null;
    let markerCoords = { 0:null, 1:null, 2:null, 3:null };
    let calib = {};

    async function initSystem() {
        try {
            await tf.ready();
            startCamBtn.innerText = "2/3 姿勢解析モデル読込中...";
            detectorMP = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'lite' });
            detectorMN = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });
            
            startCamBtn.innerText = "3/3 ARライブラリ確認中...";
            for (let i = 0; i < 30; i++) {
                if (typeof AR !== 'undefined') { detectorAR = new AR.Detector(); break; }
                await new Promise(r => setTimeout(r, 100));
            }

            startCamBtn.innerText = "📷 カメラを起動（重心優先版）";
            startCamBtn.disabled = false;
            resetEvaluation();
        } catch (e) {
            startCamBtn.innerText = "❌ 読込エラー。再読込してください";
        }
    }

    function resetEvaluation() {
        ['MediaPipe', 'MoveNet'].forEach(m => {
            calib[m] = { state: 'waiting', countdownStart: 0, frames: 0, baseHipX: null, baseHipY: null, swayHistory: [] };
        });
    }

    startCamBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'environment' } });
            video.srcObject = stream;
            video.onloadeddata = () => {
                canvasMP.width = canvasMN.width = video.videoWidth; 
                canvasMP.height = canvasMN.height = video.videoHeight;
                isCameraRunning = true;
                startCamBtn.style.display = 'none';
                document.getElementById('resetEvalBtn').style.display = 'inline-block';
                document.getElementById('resetEvalBtn').disabled = false;
                document.getElementById('statusMP').innerText = document.getElementById('statusMN').innerText = "⌛ マーカーを探しています...";
                document.getElementById('statusMP').className = document.getElementById('statusMN').className = "calib-status scanning";
                processFrame();
            };
        } catch (e) { alert("カメラ起動に失敗しました。"); }
    });

    async function processFrame() {
        if (!isCameraRunning) return;
        ctxMP.drawImage(video, 0, 0, canvasMP.width, canvasMP.height);
        ctxMN.drawImage(video, 0, 0, canvasMN.width, canvasMN.height);

        // AR認識（バックグラウンドで継続）
        if (detectorAR && !homographyMatrix) {
            let markers = detectorAR.detect(ctxMP.getImageData(0,0,canvasMP.width, canvasMP.height));
            markers.forEach(m => {
                if (m.id >= 0 && m.id <= 3) {
                    let cx = 0, cy = 0; m.corners.forEach(c => { cx+=c.x; cy+=c.y; });
                    markerCoords[m.id] = { x: cx/4, y: cy/4 };
                    ctxMP.fillStyle = "#00ff00"; ctxMP.fillRect(cx/4-5, cy/4-5, 10, 10);
                }
            });
            if (markerCoords[0] && markerCoords[1] && markerCoords[2] && markerCoords[3]) {
                applyHomography([markerCoords[0], markerCoords[1], markerCoords[2], markerCoords[3]]);
            }
        }

        const posesMP = await detectorMP.estimatePoses(video);
        const posesMN = await detectorMN.estimatePoses(video);

        drawPoseWithRadar(posesMP, ctxMP, 'red', 'MediaPipe', canvasMP);
        drawPoseWithRadar(posesMN, ctxMN, 'cyan', 'MoveNet', canvasMN);

        requestAnimationFrame(processFrame);
    }

    function drawPoseWithRadar(poses, ctx, color, modelName, canvasObj) {
        if (poses.length === 0) return;
        const kps = poses[0].keypoints;
        const getK = (n) => kps.find(k => k.name === n && k.score > 0.3);

        // 1. 全身のドットを必ず描画（AIが生きていれば必ず出る）
        kps.forEach(k => {
            if (k.score > 0.3) {
                ctx.fillStyle = color; ctx.beginPath(); ctx.arc(k.x, k.y, 4, 0, 2*Math.PI); ctx.fill();
            }
        });

        // 2. 腰のデータを取得
        const lH = getK('left_hip'), rH = getK('right_hip');
        if (!lH || !rH) return;

        let rawHipX = (lH.x + rH.x) / 2;
        let rawHipY = (lH.y + rH.y) / 2;

        // 腰の中央に大きな重心マーク（生存確認）
        ctx.strokeStyle = "white"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(rawHipX, rawHipY, 15, 0, 2*Math.PI); ctx.stroke();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(rawHipX, rawHipY, 5, 0, 2*Math.PI); ctx.fill();

        // 3. レーダー表示ロジック（校正前は生データ、校正後は補正データ）
        let targetX = rawHipX, targetY = rawHipY;
        if (homographyMatrix) {
            let m = homographyMatrix;
            let w = m[6]*rawHipX + m[7]*rawHipY + m[8];
            targetX = (m[0]*rawHipX + m[1]*rawHipY + m[2])/w;
            targetY = (m[3]*rawHipX + m[4]*rawHipY + m[5])/w;
        }

        const c = calib[modelName];
        if (c.state === 'waiting') {
            c.state = 'countdown'; c.countdownStart = performance.now();
        } else if (c.state === 'countdown') {
            let rem = Math.ceil(4 - (performance.now() - c.countdownStart)/1000);
            ctx.fillStyle = "yellow"; ctx.font = "bold 30px sans-serif";
            ctx.fillText(`重心計測開始まで... ${rem}`, 20, 100);
            if (rem <= 0) c.state = 'calibrating';
        } else if (c.state === 'calibrating') {
            c.baseHipX = (c.baseHipX || 0) + targetX; c.baseHipY = (c.baseHipY || 0) + targetY;
            if (++c.frames >= 20) { c.baseHipX /= 20; c.baseHipY /= 20; c.state = 'done'; }
        } else if (c.state === 'done') {
            // レーダー描画
            const rSize = 250, rx = canvasObj.width - rSize - 20, ry = canvasObj.height - rSize - 20;
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(rx, ry, rSize, rSize);
            ctx.strokeStyle = "white"; ctx.strokeRect(rx, ry, rSize, rSize);
            
            // 十字線
            ctx.beginPath(); ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.moveTo(rx+rSize/2, ry); ctx.lineTo(rx+rSize/2, ry+rSize);
            ctx.moveTo(rx, ry+rSize/2); ctx.lineTo(rx+rSize, ry+rSize/2); ctx.stroke();

            // 揺れの計算（倍率：2.5倍）
            let dx = (targetX - c.baseHipX) * 2.5;
            let dy = (targetY - c.baseHipY) * 2.5;

            c.swayHistory.push({x: dx, y: dy});
            if (c.swayHistory.length > 100) c.swayHistory.shift();

            // 軌跡
            ctx.beginPath(); ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 2;
            c.swayHistory.forEach((p, i) => {
                let px = rx + rSize/2 + p.x, py = ry + rSize/2 + p.y;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            });
            ctx.stroke();

            // 重心点（赤）
            ctx.fillStyle = "red"; ctx.beginPath();
            ctx.arc(rx + rSize/2 + dx, ry + rSize/2 + dy, 8, 0, 2*Math.PI); ctx.fill();
        }
    }

    function applyHomography(pts) {
        let x0 = pts[0].x, y0 = pts[0].y, x1 = pts[1].x, y1 = pts[1].y;
        let x2 = pts[2].x, y2 = pts[2].y, x3 = pts[3].x, y3 = pts[3].y;
        let dx1 = x1 - x2, dx2 = x3 - x2, sx = x0 - x1 + x2 - x3;
        let dy1 = y1 - y2, dy2 = y3 - y2, sy = y0 - y1 + y2 - y3;
        let det = dx1 * dy2 - dy1 * dx2;
        if (Math.abs(det) < 0.1) return;
        let g = (sx * dy2 - sy * dx2) / det, h = (dx1 * sy - dy1 * sx) / det;
        let a = x1-x0+g*x1, b = x3-x0+h*x3, c = x0, d = y1-y0+g*y1, e = y3-y0+h*y3, f = y0;
        let detH = a*(e-f*h) - b*(d-f*g) + c*(d*h-e*g);
        let i = 1/detH;
        let inv = [ (e-f*h)*i, (c*h-b)*i, (b*f-c*e)*i, (g*f-d)*i, (a-c*g)*i, (d*c-a*f)*i, (d*h-e*g)*i, (b*g-a*h)*i, (a*e-b*d)*i ];
        homographyMatrix = [inv[0]*500, inv[1]*500, inv[2]*500, inv[3]*500, inv[4]*500, inv[5]*500, inv[6], inv[7], inv[8]];
        document.getElementById('statusMP').innerText = document.getElementById('statusMN').innerText = "✅ マット校正完了（精密モード）";
        document.getElementById('statusMP').className = document.getElementById('statusMN').className = "calib-status locked";
    }

    initSystem();
    document.getElementById('resetEvalBtn').onclick = () => { resetEvaluation(); homographyMatrix = null; markerCoords = {0:null,1:null,2:null,3:null}; };
</script>
</body>
</html>
