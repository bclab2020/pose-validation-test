<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿勢検証ツール Pro - 自動認識プロトタイプ</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-aruco@0.0.1/src/aruco.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-aruco@0.0.1/src/cv.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
        .controls { padding: 10px; text-align: center; background: #333; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: center; }
        button, select { padding: 10px 14px; font-size: 14px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        #startCamBtn { background: #4a4a4a; color: white; }
        #recordBtn { background: #d32f2f; color: white; }
        #stopRecBtn { background: #1976d2; color: white; }
        #switchBtn { background: #616161; color: white; }
        #resetEvalBtn { background: #f57c00; color: white; display: none; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .container { display: flex; width: 100vw; height: calc(100vh - 120px); }
        .view-port { flex: 1; position: relative; border-right: 1px solid #444; overflow: hidden; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .stats { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 8px; font-size: 12px; border-radius: 4px; z-index: 10; }
        /* 初期状態は非表示 */
        .calib-status { position: absolute; bottom: 10px; left: 10px; font-size: 12px; padding: 5px 12px; border-radius: 20px; z-index: 20; display: none; font-weight: bold; }
        .locked { background: #00c853; color: white; display: block; }
        .scanning { background: #ffab00; color: black; display: block; }
    </style>
</head>
<body>

<div class="controls">
    <button id="startCamBtn" disabled>モデル読込中...</button>
    <button id="switchBtn" disabled>🔄 カメラ</button>
    <button id="resetEvalBtn" disabled>🔄 測定リセット</button>
    <select id="modeSelect">
        <option value="none">可視化オフ</option>
        <option value="squat_side">スクワット側面</option>
        <option value="squat_front">スクワット正面</option>
        <option value="single_leg" selected>片足立ち正面 (重心レーダー)</option>
    </select>
    <button id="recordBtn" disabled>🔴 計測開始</button>
    <button id="stopRecBtn" disabled>⏹️ 保存</button>
</div>

<div class="container">
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="stats" id="statsMP">MediaPipe</div>
        <div id="statusMP" class="calib-status">⌛ マーカー走査中...</div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div class="stats" id="statsMN">MoveNet</div>
        <div id="statusMN" class="calib-status">⌛ マーカー走査中...</div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('video');
    const canvasMP = document.getElementById('canvasMP');
    const canvasMN = document.getElementById('canvasMN');
    const ctxMP = canvasMP.getContext('2d');
    const ctxMN = canvasMN.getContext('2d');
    const modeSelect = document.getElementById('modeSelect');
    const resetEvalBtn = document.getElementById('resetEvalBtn');
    const startCamBtn = document.getElementById('startCamBtn');
    
    let detectorMP, detectorMN;
    let isCameraRunning = false;
    let homographyMatrix = null;
    let detectorAR = new AR.Detector();
    let markerCoords = { 0:null, 1:null, 2:null, 3:null };
    let calib = {};

    function resetEvaluation() {
        ['MediaPipe', 'MoveNet'].forEach(m => {
            calib[m] = { state: 'waiting', countdownStart: 0, frames: 0, sumP: 0, sumS: 0, baseP: 0, baseS: 0, sumHipX: 0, sumHipY: 0, baseHipX: 0, baseHipY: 0, swayHistory: [] };
        });
    }
    resetEvaluation();

    function getHomography(pts) {
        let x0 = pts[0].x, y0 = pts[0].y, x1 = pts[1].x, y1 = pts[1].y;
        let x2 = pts[2].x, y2 = pts[2].y, x3 = pts[3].x, y3 = pts[3].y;
        let dx1 = x1 - x2, dx2 = x3 - x2, sx = x0 - x1 + x2 - x3;
        let dy1 = y1 - y2, dy2 = y3 - y2, sy = y0 - y1 + y2 - y3;
        let det = dx1 * dy2 - dy1 * dx2;
        if (Math.abs(det) < 0.1) return null;
        let g = (sx * dy2 - sy * dx2) / det, h = (dx1 * sy - dy1 * sx) / det;
        let a = x1-x0+g*x1, b = x3-x0+h*x3, c = x0, d = y1-y0+g*y1, e = y3-y0+h*y3, f = y0;
        let detH = a*(e*1 - f*h) - b*(d*1 - f*g) + c*(d*h - e*g);
        let i = 1/detH;
        let inv = [ (e-f*h)*i, (c*h-b)*i, (b*f-c*e)*i, (g*f-d)*i, (a-c*g)*i, (d*c-a*f)*i, (d*h-e*g)*i, (b*g-a*h)*i, (a*e-b*d)*i ];
        return [inv[0]*500, inv[1]*500, inv[2]*500, inv[3]*500, inv[4]*500, inv[5]*500, inv[6], inv[7], inv[8]];
    }

    async function initModels() {
        await tf.ready();
        detectorMP = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' });
        detectorMN = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });
        startCamBtn.innerText = "📷 カメラ起動"; 
        startCamBtn.disabled = false;
    }

    startCamBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'environment' } });
            video.srcObject = stream;
            video.onloadeddata = () => {
                canvasMP.width = canvasMN.width = video.videoWidth; 
                canvasMP.height = canvasMN.height = video.videoHeight;
                isCameraRunning = true;
                startCamBtn.disabled = true;
                document.getElementById('switchBtn').disabled = false;
                document.getElementById('recordBtn').disabled = false;
                resetEvalBtn.style.display = 'inline-block';
                resetEvalBtn.disabled = false;
                
                // カメラ起動後にスキャン中を表示
                document.getElementById('statusMP').classList.add('scanning');
                document.getElementById('statusMN').classList.add('scanning');
                
                processFrame();
            };
        } catch (e) {
            alert("カメラの起動に失敗しました。許可設定を確認してください。");
        }
    });

    resetEvalBtn.addEventListener('click', resetEvaluation);

    function processFrame() {
        if (!isCameraRunning) return;
        ctxMP.drawImage(video, 0, 0, canvasMP.width, canvasMP.height);
        
        let imageData = ctxMP.getImageData(0, 0, canvasMP.width, canvasMP.height);
        let markers = detectorAR.detect(imageData);
        
        markers.forEach(m => {
            if (m.id >= 0 && m.id <= 3) {
                let center = { x: 0, y: 0 };
                m.corners.forEach(c => { center.x += c.x; center.y += c.y; });
                markerCoords[m.id] = { x: center.x / 4, y: center.y / 4 };
            }
        });

        if (markerCoords[0] && markerCoords[1] && markerCoords[2] && markerCoords[3]) {
            let h = getHomography([markerCoords[0], markerCoords[1], markerCoords[2], markerCoords[3]]);
            if (h) {
                homographyMatrix = h;
                const sMP = document.getElementById('statusMP');
                const sMN = document.getElementById('statusMN');
                sMP.innerText = sMN.innerText = "✅ マットロック完了";
                sMP.className = sMN.className = "calib-status locked";
            }
        }

        runPose(detectorMP, ctxMP, 'red', 'MediaPipe', canvasMP);
        runPose(detectorMN, ctxMN, 'cyan', 'MoveNet', canvasMN);
        
        requestAnimationFrame(processFrame);
    }

    async function runPose(detector, ctx, color, modelName, canvasObj) {
        if (ctx !== ctxMP) ctx.drawImage(video, 0, 0, canvasObj.width, canvasObj.height);
        const poses = await detector.estimatePoses(video);
        if (poses.length === 0) return;
        const kps = poses[0].keypoints;
        const getK = (n) => kps.find(k => k.name === n && k.score > 0.3);

        if (markerCoords[0]) {
            ctx.strokeStyle = "rgba(0, 255, 0, 0.5)"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(markerCoords[0].x, markerCoords[0].y);
            [1, 2, 3].forEach(i => { if(markerCoords[i]) ctx.lineTo(markerCoords[i].x, markerCoords[i].y); });
            ctx.closePath(); ctx.stroke();
        }

        if (modeSelect.value !== 'single_leg' || !homographyMatrix) return;

        let lH = getK('left_hip'), rH = getK('right_hip'), lS = getK('left_shoulder'), rS = getK('right_shoulder');
        if (!lH || !rH || !lS || !rS) return;

        let hipX = (lH.x + rH.x) / 2, hipY = (lH.y + rH.y) / 2;
        let m = homographyMatrix;
        let w = m[6]*hipX + m[7]*hipY + m[8];
        let normX = (m[0]*hipX + m[1]*hipY + m[2])/w, normY = (m[3]*hipX + m[4]*hipY + m[5])/w;
        
        let c = calib[modelName];
        if (c.state === 'waiting') {
            c.state = 'countdown'; c.countdownStart = performance.now();
        } else if (c.state === 'countdown') {
            let rem = Math.ceil(4 - (performance.now() - c.countdownStart)/1000);
            ctx.fillStyle = "yellow"; ctx.font = "20px sans-serif"; ctx.fillText(`⏳ 静止してください... ${rem}`, 10, 60);
            if (rem <= 0) c.state = 'calibrating';
        } else if (c.state === 'calibrating') {
            c.sumHipX += normX; c.sumHipY += normY;
            if (++c.frames >= 20) {
                c.baseHipX = c.sumHipX / 20; c.baseHipY = c.sumHipY / 20;
                c.baseP = Math.atan2(rH.y-lH.y, rH.x-lH.x)*180/Math.PI;
                c.baseS = Math.atan2(rS.y-lS.y, rS.x-lS.x)*180/Math.PI;
                c.state = 'done';
            }
        } else if (c.state === 'done') {
            const rSize = 140, rx = canvasObj.width - rSize - 10, ry = canvasObj.height - rSize - 10;
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(rx, ry, rSize, rSize);
            let dx = (normX - c.baseHipX) * 0.5, dy = (normY - c.baseHipY) * 0.5;
            c.swayHistory.push({x: dx, y: dy}); if (c.swayHistory.length > 50) c.swayHistory.shift();
            ctx.beginPath(); ctx.strokeStyle = "#00ffff";
            c.swayHistory.forEach((p, i) => {
                let px = rx + rSize/2 + p.x, py = ry + rSize/2 + p.y;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            });
            ctx.stroke();
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(rx+rSize/2+dx, ry+rSize/2+dy, 4, 0, 2*Math.PI); ctx.fill();
            
            let pTilt = Math.atan2(rH.y-lH.y, rH.x-lH.x)*180/Math.PI;
            if (Math.abs(pTilt - c.baseP) < 8 && Math.sqrt(dx*dx+dy*dy) < 15) {
                ctx.fillStyle = "#00ff00"; ctx.font = "bold 80px sans-serif"; ctx.globalAlpha = 0.3;
                ctx.fillText("OK", canvasObj.width/2-60, canvasObj.height/2); ctx.globalAlpha = 1.0;
            }
        }
    }

    initModels();
</script>
</body>
</html>
