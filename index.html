<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNECT AI - Academic Master V76 (iOS Stable Edition)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body { margin: 0; font-family: 'Noto Sans JP', sans-serif; background: #000; color: white; overflow: hidden; }
        
        .view-port { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 1; display: flex; align-items: center; justify-content: center; background: #050505; }
        canvas { width: 100%; height: 100%; object-fit: contain; touch-action: none; -webkit-user-select: none; user-select: none; }
        video { display: none; }

        #uiFloatingLayer { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 96%; max-width: 1200px; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        
        .ui-top-buttons { display: flex; gap: 15px; margin-bottom: 10px; }
        .ui-top-btn { background: rgba(0, 191, 255, 0.15); color: #00bfff; border: 1px solid #00bfff; border-radius: 20px; padding: 6px 20px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.2s; }
        .ui-top-btn:hover { background: rgba(0, 191, 255, 0.3); }
        .dash-top-btn { background: rgba(255, 145, 0, 0.15); color: #ff9100; border: 1px solid #ff9100; }
        .dash-top-btn:hover { background: rgba(255, 145, 0, 0.3); }

        #controlsBox { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .controls { background: rgba(20, 22, 26, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.8); box-sizing: border-box; }
        button, select, input { padding: 8px 12px; font-size: 14px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; outline: none; }
        .mode-dropdown { background: #333; color: #deff9a; border: 1px solid #555; padding: 8px; border-radius: 4px; }
        .mode-dropdown optgroup { color: #aaa; background: #222; }
        
        #startBtn { background: #1976d2; color: white; }
        #startBtn:disabled { background: #555; cursor: not-allowed; }
        #recBtn { background: #d32f2f; color: white; min-width: 150px; font-size: 15px; box-shadow: 0 0 10px rgba(211,47,47,0.5); }
        #calibrateMatBtn { background: #673ab7; color: white; }
        #calibrateMatBtn.active { background: #ffeb3b; color: black; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .info-panel { position: absolute; top: 55px; left: 15px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px; color: #fff; font-size: 12px; z-index: 10; border-left: 3px solid #673ab7; pointer-events: none; }
        #tiltPanel { display: none; position: absolute; top: 120px; left: 15px; background: rgba(15,15,15,0.9); border: 2px solid #ff9100; border-radius: 12px; padding: 15px; z-index: 500; }
        .tilt-header { color: #ff9100; font-size: 14px; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .tilt-slider { width: 200px; cursor: pointer; }
        .tilt-val { display: block; text-align: center; color: white; font-size: 16px; font-weight: bold; margin-top: 5px; }

        #timelineSlider { flex: 1; max-width: 500px; cursor: pointer; }
        #playPauseBtn { background: #00bfff; color: #000; min-width: 90px; }
        #backToCamBtn { background: #555; color: white; }
        #editFrameBtn { background: #ff9100; color: #000; font-weight: bold; }
        #exportVideoBtn { background: #1976d2; color: white; }
        
        .label { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 4px; font-size: 14px; color: #deff9a; border: 1px solid #deff9a; z-index: 10; font-weight: bold; }
        .timer-display { position: absolute; top: 15px; right: 15px; background: rgba(211, 47, 47, 0.9); color: white; padding: 8px 18px; font-size: 20px; font-weight: bold; border-radius: 6px; display: none; z-index: 100; }
        
        .radar-wrapper { position: absolute; top: 60px; right: 15px; width: 150px; height: 150px; z-index: 200; touch-action: none; cursor: grab; }
        .radar-wrapper.dragging { cursor: grabbing; transform: scale(1.1); opacity: 0.8; z-index: 999; border-radius: 50%; }
        .radar-box { width: 150px; height: 150px; background: rgba(0, 0, 0, 0.85); border-radius: 50%; box-shadow: 0 0 15px rgba(255,82,82,0.5); border: 2px solid #ff5252; pointer-events: none; }
        .radar-title { position: absolute; top: -20px; left: 15px; font-size: 12px; background: rgba(0,0,0,0.8); padding: 3px 8px; border-radius: 4px; font-weight: bold; color: #ff5252; border: 1px solid #ff5252; }

        #dpadPanel { position: absolute; top: 30px; right: 30px; background: rgba(15, 15, 15, 0.95); border: 2px solid #00bfff; border-radius: 16px; padding: 15px 25px; z-index: 1000; display: none; flex-direction: column; align-items: center; }
        .dpad-header { color: #00bfff; font-size: 14px; font-weight: bold; margin-bottom: 12px; }
        .dpad-row { display: flex; justify-content: center; gap: 8px; margin: 4px 0; }
        .dpad-btn { width: 55px; height: 55px; border-radius: 12px; background: #2a2a2a; color: white; font-size: 24px; border: 1px solid #444; cursor: pointer; }
        .dpad-btn:active { background: #00bfff; color: black; }
        .dpad-close { position: absolute; right: -10px; top: -10px; width: 32px; height: 32px; border-radius: 50%; background: #ff5252; color: white; border: none; font-size: 14px; font-weight: bold; cursor: pointer; }

        #historyPanel { position: absolute; top: 50px; right: 50px; background: rgba(20, 22, 26, 0.95); border: 2px solid #00bfff; border-radius: 16px; padding: 20px; z-index: 1500; display: none; flex-direction: column; width: 380px; max-height: 80vh; backdrop-filter: blur(10px); }
        .history-header { color: #00bfff; font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .history-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .history-item { background: #2a2a2a; border-left: 4px solid #00bfff; padding: 10px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .history-mode { color: #fff; font-size: 14px; font-weight: bold; }
        .history-actions { display: flex; gap: 5px; }
        .history-action-btn { background: #444; color: white; border-radius: 4px; padding: 4px 8px; font-size: 12px; border: none; cursor: pointer; }
        .history-action-btn.del { background: #d32f2f; }
        .history-action-btn.vid { background: #1976d2; }
        #closeHistoryBtn { background: transparent; border: none; color: #aaa; font-size: 20px; cursor: pointer; padding: 0; }

        /* 統合ダッシュボード */
        #dashboardOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(5,5,5,0.98); z-index: 3000; display: none; overflow-y: auto; padding: 40px; box-sizing: border-box; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00bfff; padding-bottom: 20px; margin-bottom: 30px; }
        .dash-title { color: #00bfff; font-size: 32px; font-weight: bold; margin: 0; display: flex; align-items: center; gap: 10px; }
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .dash-card { background: #111; border: 1px solid #333; border-radius: 16px; padding: 25px; }
        .dash-card h3 { color: #deff9a; border-bottom: 1px solid #333; padding-bottom: 15px; font-size: 18px; margin-bottom: 20px; }
        .dash-metric { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 15px; background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 8px; }
        .dash-metric span:first-child { color: #aaa; }
        .dash-metric .val { font-weight: bold; color: #fff; font-size: 16px; }
        .dash-metric .val.warn { color: #ff5252; }
        .dash-metric .val.good { color: #39ff14; }
        .dash-close, .dash-print { background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; border:none;}
        .dash-print { background: #ff9100; color: #000; margin-right: 10px; }
        .dash-close:hover { background: #555; }
        .dash-print:hover { filter: brightness(1.1); }

        /* インラインモーダルダイアログ */
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #1a1c20; border: 2px solid #00bfff; border-radius: 16px; padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,191,255,0.2); }
        .modal-title { margin-top: 0; color: #00bfff; font-size: 20px; font-weight: bold; }
        .modal-body { color: #daffde; font-size: 15px; line-height: 1.6; margin: 20px 0; white-space: pre-wrap; word-wrap: break-word; max-height: 50vh; overflow-y: auto;}
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; }
        .modal-btn { padding: 8px 20px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; border:none; }
        .modal-ok { background: #00bfff; color: #000; }
        .modal-cancel { background: #444; color: #fff; }
        .modal-btn:hover { filter: brightness(1.1); }

        @media print {
            body { background: white; color: black; overflow: visible; }
            #uiFloatingLayer, #tiltPanel, #dpadPanel, #historyPanel, .view-port { display: none !important; }
            #dashboardOverlay { display: block !important; position: static; background: white; color: black; overflow: visible; padding: 0; }
            .dash-card { background: #fff; border: 1px solid #ddd; box-shadow: none; break-inside: avoid; }
            .dash-card h3 { color: #000; border-bottom: 2px solid #000; }
            .dash-metric { background: #f9f9f9; border: 1px solid #eee; }
            .dash-metric span:first-child { color: #333; }
            .dash-metric .val { color: #000; }
            .dash-metric .val.warn { color: #d32f2f; }
            .dash-metric .val.good { color: #2e7d32; }
            .dash-title { color: #000; border-bottom: none; }
            .dash-header { border-bottom: 3px solid #000; }
            .dash-close, .dash-print { display: none; }
            #aiEvalCard { grid-column: 1 / -1; margin-top: 20px; break-inside: avoid; }
            #aiEvalContent { background: #f0f8ff !important; color: #000 !important; border-left: 4px solid #1976d2 !important; }
            #generateAiEvalBtn { display: none; }
        }
    </style>
</head>
<body>

<div class="view-port">
    <canvas id="canvasMP"></canvas>
    <div class="label">CONNECT AI - V76 iOS Stable Base</div>
    <div class="info-panel" id="infoPanel">スケール未校正<br>骨盤傾斜: 0°</div>
    <div id="timerDisplay" class="timer-display">REC 10.0s</div>
    <div id="radarWrapperMP" class="radar-wrapper">
        <div class="radar-title">COP RADAR</div>
        <canvas id="canvasRadarMP" class="radar-box" width="150" height="150"></canvas>
    </div>
</div>

<div id="tiltPanel">
    <div class="tilt-header">📐 骨盤傾斜角 (目視補正)</div>
    <div style="display:flex; justify-content:space-between; color:#aaa; font-size:10px;"><span>後傾 (-20°)</span><span>前傾 (+30°)</span></div>
    <input type="range" id="pelvicTiltSlider" class="tilt-slider" min="-20" max="30" value="0">
    <div class="tilt-val" id="tiltValDisplay">0° (ニュートラル)</div>
</div>

<div id="dpadPanel">
    <div class="dpad-header">🎯 ポイント微調整 <button class="dpad-close" id="dpadClose">✖</button></div>
    <div class="dpad-row"><button class="dpad-btn" id="dpadUp">▲</button></div>
    <div class="dpad-row">
        <button class="dpad-btn" id="dpadLeft">◀</button>
        <button class="dpad-btn" id="dpadStep" style="font-size:14px; background:#1976d2;">1px</button>
        <button class="dpad-btn" id="dpadRight">▶</button>
    </div>
    <div class="dpad-row"><button class="dpad-btn" id="dpadDown">▼</button></div>
</div>

<div id="historyPanel">
    <div class="history-header">📂 保存データ（履歴） <button id="closeHistoryBtn">✖</button></div>
    <div class="history-list" id="historyListContainer"></div>
</div>

<div id="dashboardOverlay">
    <div class="dash-header">
        <div>
            <h2 class="dash-title">📊 統合バイオメカニクス評価レポート</h2>
            <div style="color:#aaa; font-size: 14px; margin-top:5px;">CONNECT AI Posture & Movement Analytics</div>
        </div>
        <div>
            <button class="dash-print" onclick="window.print()">📄 PDF保存・印刷</button>
            <button class="dash-close" onclick="document.getElementById('dashboardOverlay').style.display='none'">✖ 閉じる</button>
        </div>
    </div>
    <div class="dash-grid" id="dashGrid"></div>
</div>

<div id="customModal">
    <div class="modal-box">
        <h3 id="modalTitle" class="modal-title"></h3>
        <p id="modalMessage" class="modal-body"></p>
        <div class="modal-footer">
            <button id="modalCancelBtn" class="modal-btn modal-cancel">キャンセル</button>
            <button id="modalOkBtn" class="modal-btn modal-ok">OK</button>
        </div>
    </div>
</div>

<div id="uiFloatingLayer">
    <div class="ui-top-buttons">
        <button id="toggleUiBtn" class="ui-top-btn">🔽 UIを隠す</button>
        <button id="showHistoryBtn" class="ui-top-btn">📂 履歴を開く</button>
        <button id="showDashboardBtn" class="ui-top-btn dash-top-btn" onclick="window.prepareAndPrintReport()">📊 ダッシュボード</button>
    </div>
    
    <div id="controlsBox">
        <div class="controls" id="mainControls">
            <select id="videoSource" style="background:#fff; color:#000; border-radius:4px; padding:4px;">
                <option value="">カメラ検索中...</option>
            </select>

            <button id="startBtn" disabled>⏳ 起動準備中...</button>
            
            <div style="display:flex; gap:5px; background:rgba(0,0,0,0.5); padding:4px 10px; border-radius:6px; border:1px solid #555;">
                <span style="color:#aaa; font-size:12px;">身長</span>
                <input type="number" id="patientHeight" value="170" style="width:40px; background:transparent; color:#00bfff; border:none; border-bottom:1px solid #444;">
            </div>
            
            <button id="calibrateMatBtn">📏 マット校正</button>

            <select id="modeSelect" class="mode-dropdown" onchange="window.switchReportTab(this.value)">
                <optgroup label="■ 静止姿勢アライメント">
                    <option value="front" selected>🧍 前面</option><option value="back">🧍 後面</option><option value="l_side">🧍 左側面</option><option value="r_side">🧍 右側面</option>
                </optgroup>
                <optgroup label="■ 動的機能評価">
                    <option value="dyn_overhead">🏋️ OHS [前面]</option><option value="dyn_overhead_side">🏋️ OHS [側面]</option>
                    <option value="dyn_single_r">🦵 片脚バランス [右軸]</option><option value="dyn_single_l">🦵 片脚バランス [左軸]</option>
                    <option value="dyn_flex_fwd">🙇 立位体前屈</option><option value="dyn_flex_bwd">🤸 立位体後屈</option>
                    <option value="dyn_shoulder_r">👐 肩複合可動性 [右上]</option><option value="dyn_shoulder_l">👐 肩複合可動性 [左上]</option>
                </optgroup>
            </select>
            
            <select id="durationSelect">
                <option value="5000">⏱️ 5秒</option><option value="10000" selected>⏱️ 10秒</option><option value="15000">⏱️ 15秒</option>
            </select>
            
            <label class="toggle-label"><input type="checkbox" id="showSwayAlert" checked> 警告</label>
            <button id="recBtn" disabled>🔴 録画スタート</button>
        </div>

        <div class="controls" id="playbackControls" style="display:none;">
            <button id="backToCamBtn">🔙 再測定へ</button>
            <button id="playPauseBtn">▶ 再生</button>
            <input type="range" id="timelineSlider" min="0" max="100" value="0">
            <span id="frameCounter" style="color:#00bfff; font-weight:bold;">0 / 0</span>
            <button id="editFrameBtn">✂️ 微調整</button>
            <button id="exportVideoBtn" style="margin-left:auto;">🎥 動画出力</button>
            <button id="printReportBtn" onclick="window.prepareAndPrintReport()">📄 レポート</button>
        </div>
    </div>
</div>

<canvas id="canvasCombined" style="display:none;"></canvas>
<video id="video" autoplay playsinline muted></video>

<script>
    // --- 1. グローバル定数と状態変数 ---
    var DURATION_MAP = { 
        'front': 10000, 'back': 5000, 'l_side': 5000, 'r_side': 5000, 
        'dyn_overhead': 15000, 'dyn_overhead_side': 15000, 
        'dyn_single_r': 15000, 'dyn_single_l': 15000, 
        'dyn_flex_fwd': 10000, 'dyn_flex_bwd': 10000, 
        'dyn_shoulder_r': 10000, 'dyn_shoulder_l': 10000
    };
    var MODE_NAMES = { 'front': '🧍 前面', 'back': '🧍 後面', 'l_side': '🧍 左側面', 'r_side': '🧍 右側面', 'dyn_overhead': '🏋️ OHS [前面]', 'dyn_overhead_side': '🏋️ OHS [側面]', 'dyn_single_r': '🦵 片脚 [右]', 'dyn_single_l': '🦵 片脚 [左]', 'dyn_flex_fwd': '🙇 立位前屈', 'dyn_flex_bwd': '🤸 立位後屈', 'dyn_shoulder_r': '👐 肩複合 [右上]', 'dyn_shoulder_l': '👐 肩複合 [左上]' };

    window.customOriginMarkers = {}; window.reportDataStore = {};
    Object.keys(DURATION_MAP).forEach(dir => { window.reportDataStore[dir] = null; window.customOriginMarkers[dir] = null; });

    var detectors = [], isRunning = false, isRecording = false, isPausedForEdit = false, currentTab = "front", appMode = "camera", isPlaying = false, currentStream = null;
    var playbackDataMP = [], mainRenderId = null, recordingDuration = 10000, coordinateBufferMP = [], poseDataLog = [], playbackRafId = null;
    var pxToCmRatio = null, estimatedPelvicTilt = 0, calibState = "idle", calibrationPoints = [];
    var exportRecorder = null, exportChunks = [], isExportingVideo = false, renderSessionId = 0, playbackStartTime = 0, playbackBaseTime = 0, playbackTotalDuration = 0;
    var selectedJointIndex = null, dpadStepVal = 1, isEditingPlaybackFrame = false, swayHistoryMP = [];
    var activeRadarDrag = null;

    var video = document.getElementById('video'), canvasMP = document.getElementById('canvasMP'), ctxMP = canvasMP.getContext('2d');
    var canvasComb = document.getElementById('canvasCombined'), ctxComb = canvasComb.getContext('2d');
    var ctxRadarMP = document.getElementById('canvasRadarMP').getContext('2d');
    var startBtn = document.getElementById('startBtn'), recBtn = document.getElementById('recBtn');

    // --- 2. データベース管理 (IndexedDB) ---
    var dbManager = {
        dbName: "ConnectAIDB", storeName: "sessions", db: null,
        init: function() {
            return new Promise((resolve) => {
                var req = indexedDB.open(this.dbName, 1);
                req.onupgradeneeded = e => { if(!e.target.result.objectStoreNames.contains(this.storeName)) e.target.result.createObjectStore(this.storeName, { keyPath: "id" }); };
                req.onsuccess = e => { this.db = e.target.result; resolve(); };
            });
        },
        saveSession: function(data) {
            return new Promise((resolve) => {
                var tx = this.db.transaction([this.storeName], "readwrite");
                tx.objectStore(this.storeName).put(data); tx.oncomplete = () => resolve();
            });
        },
        getAllSessions: function() {
            return new Promise((resolve) => {
                if(!this.db) { resolve([]); return; }
                var tx = this.db.transaction([this.storeName], "readonly");
                var req = tx.objectStore(this.storeName).getAll();
                req.onsuccess = e => resolve(e.target.result.sort((a,b)=>b.timestamp-a.timestamp));
            });
        },
        deleteSession: function(id) {
            return new Promise((resolve) => {
                var tx = this.db.transaction([this.storeName], "readwrite");
                tx.objectStore(this.storeName).delete(id).onsuccess = () => resolve();
            });
        }
    };

    // --- 3. UI コンポーネント制御 ---
    function customAlert(title, message) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMessage').innerText = message;
        document.getElementById('modalCancelBtn').style.display = 'none';
        document.getElementById('modalOkBtn').onclick = () => { document.getElementById('customModal').style.display = 'none'; };
        document.getElementById('customModal').style.display = 'flex';
    }

    function customConfirm(title, message, onConfirm) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMessage').innerText = message;
        document.getElementById('modalCancelBtn').style.display = 'block';
        document.getElementById('modalCancelBtn').onclick = () => { document.getElementById('customModal').style.display = 'none'; };
        document.getElementById('modalOkBtn').onclick = () => { document.getElementById('customModal').style.display = 'none'; if (onConfirm) onConfirm(); };
        document.getElementById('customModal').style.display = 'flex';
    }

    function updateInfoPanel() {
        var scaleText = pxToCmRatio ? "校正済 (1px = " + pxToCmRatio.toFixed(3) + "cm)" : "⚠️ スケール未校正";
        document.getElementById('infoPanel').innerHTML = scaleText + "<br>骨盤傾斜: " + (estimatedPelvicTilt > 0 ? '+' : '') + estimatedPelvicTilt + "°";
    }

    function drawCenterGrid(ctx, canvas) { 
        ctx.save(); ctx.strokeStyle="rgba(255,255,255,0.4)"; ctx.lineWidth=5; 
        ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke(); 
        ctx.restore(); 
    }

    function drawCrosshair(ctx, kp, canvas) {
        if(!kp) return; ctx.save(); ctx.strokeStyle = "rgba(0, 191, 255, 0.7)"; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(0, kp.y); ctx.lineTo(canvas.width, kp.y); ctx.moveTo(kp.x, 0); ctx.lineTo(kp.x, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.arc(kp.x, kp.y, 14, 0, 2*Math.PI); ctx.strokeStyle = "#00bfff"; ctx.lineWidth = 3; ctx.setLineDash([]); ctx.stroke();
        ctx.fillStyle = "rgba(0, 191, 255, 0.3)"; ctx.fill(); ctx.restore();
    }

    function clearRadar(ctx, color) {
        if (!ctx) return; ctx.clearRect(0, 0, 150, 150); ctx.strokeStyle = color + "44"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(75, 75, 30, 0, 2*Math.PI); ctx.stroke(); ctx.beginPath(); ctx.arc(75, 75, 60, 0, 2*Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(75, 10); ctx.lineTo(75, 140); ctx.moveTo(10, 75); ctx.lineTo(140, 75); ctx.stroke(); 
    }

    function drawSpecificRadar(ctx, history, color) {
        clearRadar(ctx, color); if (history.length < 2) return;
        ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
        history.forEach(function(pt, idx) { 
            var rX = 75 + (pt.x * 0.5), rY = 75 + (pt.y * 0.5), dist = Math.hypot(rX - 75, rY - 75);
            if (dist > 65) { rX = 75 + ((rX - 75) * 65 / dist); rY = 75 + ((rY - 75) * 65 / dist); }
            if (idx === 0) ctx.moveTo(rX, rY); else ctx.lineTo(rX, rY); 
        });
        ctx.stroke(); var lastPt = history[history.length - 1]; var lastRX = 75 + (lastPt.x * 0.5), lastRY = 75 + (lastPt.y * 0.5), lastDist = Math.hypot(lastRX - 75, lastRY - 75);
        if (lastDist > 65) { lastRX = 75 + ((lastRX - 75) * 65 / lastDist); lastRY = 75 + ((lastRY - 75) * 65 / lastDist); }
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(lastRX, lastRY, 4, 0, 2*Math.PI); ctx.fill(); ctx.restore();
    }

    function drawPlaybackRadar(dataArray, currentFrameIdx, canvas) {
        clearRadar(ctxRadarMP, "#ff5252"); var history = [], baseHDist = null;
        for (var i = 0; i <= currentFrameIdx; i++) {
            var frameData = dataArray[i]; if (!frameData) continue; var kps = frameData.keypoints, nose = kps.find(k => k.name === 'nose');
            var originX = window.currentAnchorPos ? window.currentAnchorPos.x : canvas.width/2, originY = window.currentAnchorPos ? window.currentAnchorPos.y : canvas.height;
            if (nose) {
                var copX = nose.x - originX, hDist = originY - nose.y; if (baseHDist === null) baseHDist = hDist; var copY = baseHDist - hDist;
                if (currentTab.includes("side") || currentTab.includes("overhead_side")) { var shoulder = kps.find(k => k.name === 'left_shoulder') || kps.find(k => k.name === 'right_shoulder'); if (shoulder) copX = nose.x - shoulder.x; }
                history.push({ x: copX, y: copY });
            }
        }
        if (history.length > 0) drawSpecificRadar(ctxRadarMP, history, "#ff5252");
    }

    function updateRadar(kps, canvas) {
        var history = swayHistoryMP; var nose = kps.find(k => k.name === 'nose');
        var originX = window.currentAnchorPos ? window.currentAnchorPos.x : canvas.width/2, originY = window.currentAnchorPos ? window.currentAnchorPos.y : canvas.height;
        if (nose) {
            var copX = nose.x - originX, hDist = originY - nose.y; if (history.length === 0 || history.baseHDist === undefined) history.baseHDist = hDist;
            var copY = history.baseHDist - hDist;
            if (currentTab.includes("side") || currentTab.includes("overhead_side")) { var shoulder = kps.find(k => k.name === 'left_shoulder') || kps.find(k => k.name === 'right_shoulder'); if (shoulder) copX = nose.x - shoulder.x; }
            history.push({ x: copX, y: copY }); if (history.length > 150) history.shift(); drawSpecificRadar(ctxRadarMP, history, "#ff5252");
        }
    }

    function getEventPos(canvas, e) {
        var rect = canvas.getBoundingClientRect(); var clientX, clientY;
        if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; } else if (e.changedTouches && e.changedTouches.length > 0) { clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY; } else { clientX = e.clientX; clientY = e.clientY; }
        if (clientX === undefined) return null;
        var videoRatio = canvas.width / canvas.height, containerRatio = rect.width / rect.height; var renderWidth, renderHeight, offsetX, offsetY;
        if (containerRatio > videoRatio) { renderHeight = rect.height; renderWidth = rect.height * videoRatio; offsetX = (rect.width - renderWidth) / 2; offsetY = 0; } else { renderWidth = rect.width; renderHeight = rect.width / videoRatio; offsetX = 0; offsetY = (rect.height - renderHeight) / 2; }
        var scaleX = canvas.width / renderWidth, scaleY = canvas.height / renderHeight; return { x: (clientX - rect.left - offsetX) * scaleX, y: (clientY - rect.top - offsetY) * scaleY, renderScale: scaleX };
    }

    function refreshReportView() {
        if(appMode === 'playback') return; var w = video.videoWidth, h = video.videoHeight;
        if (isPausedForEdit && staticBackgroundData) { ctxMP.drawImage(staticBackgroundData, 0, 0, w, h); } else { ctxMP.drawImage(video, 0, 0, w, h); }
        drawCenterGrid(ctxMP, canvasMP);

            if (calibrationPoints[1]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[1].x, calibrationPoints[1].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_right") drawCrosshair(ctxMP, calibrationPoints[1], canvasMP); }

    // --- 4. 解析＆描画モジュール (V76仕様) ---
    function generateVirtualASIS(kps) {
        if(!kps) return kps;
        var height = parseFloat(document.getElementById('patientHeight').value) || 170;
        var distanceCm = height * 0.085, ratio = pxToCmRatio || 0.15, distancePx = distanceCm / ratio;
        var angleRad = (45 - estimatedPelvicTilt) * (Math.PI / 180);
        var upwardOffsetPx = distancePx * Math.sin(angleRad), forwardOffsetPx = distancePx * Math.cos(angleRad);
        
        var lHip = kps.find(k=>k.name==='left_hip'||k.name==='23');
        var rHip = kps.find(k=>k.name==='right_hip'||k.name==='24');
        
        if (lHip && rHip && lHip.score > 0.5 && rHip.score > 0.5) {
            var asisL = { x: lHip.x, y: lHip.y - upwardOffsetPx, score: 1.0, name: 'virtual_asis_l' };
            var asisR = { x: rHip.x, y: rHip.y - upwardOffsetPx, score: 1.0, name: 'virtual_asis_r' };
            
            if (currentTab === 'r_side') { asisL.x += forwardOffsetPx; asisR.x += forwardOffsetPx; } 
            else if (currentTab === 'l_side') { asisL.x -= forwardOffsetPx; asisR.x -= forwardOffsetPx; }
            
            var newKps = JSON.parse(JSON.stringify(kps)); 
            newKps.push(asisL); 
            newKps.push(asisR); 
            return newKps;
        } 
        return kps;
    }

    function drawSkeleton(ctx, kps, color) {
        ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 4;
        
        var getK = name => kps.find(k => k.name === name);
        var connections = [
            ['left_shoulder','right_shoulder'], ['left_shoulder','left_hip'], ['right_shoulder','right_hip'], ['left_hip','right_hip'],
            ['left_shoulder','left_elbow'], ['left_elbow','left_wrist'], ['right_shoulder','right_elbow'], ['right_elbow','right_wrist'],
            ['left_hip','left_knee'], ['left_knee','left_ankle'], ['right_hip','right_knee'], ['right_knee','right_ankle']
        ];

        connections.forEach(function(pair) {
            var p1 = getK(pair[0]), p2 = getK(pair[1]);
            if(p1 && p2 && p1.score > 0.1 && p2.score > 0.1) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
        });
        
        kps.forEach(function(k){
            if(k && k.score > 0.1 && !k.name.includes('virtual')) { ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(k.x, k.y, 4, 0, 2*Math.PI); ctx.fill(); }
        });

        if (currentTab === 'front' || currentTab === 'dyn_overhead') {
            var earL = getK('left_ear'), earR = getK('right_ear'), nose = getK('nose'), shL = getK('left_shoulder'), shR = getK('right_shoulder');
            if (earL && earR && earL.score > 0.1 && earR.score > 0.1) {
                ctx.strokeStyle = "#deff9a"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(earL.x, earL.y); ctx.lineTo(earR.x, earR.y); ctx.stroke();
                if (nose && nose.score > 0.1) {
                    var r = Math.hypot(earL.x - earR.x, earL.y - earR.y) * 0.6;
                    ctx.beginPath(); ctx.arc(nose.x, nose.y, r, 0, 2*Math.PI); ctx.strokeStyle = "rgba(222, 255, 154, 0.8)"; ctx.stroke();
                }
            }
            if (nose && shL && shR && nose.score > 0.1 && shL.score > 0.1 && shR.score > 0.1) {
                ctx.strokeStyle = "#ff9100"; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo((shL.x + shR.x)/2, (shL.y + shR.y)/2); ctx.lineTo(nose.x, nose.y); ctx.stroke(); ctx.setLineDash([]);
            }
        }

        var asisL = kps.find(k=>k.name==='virtual_asis_l'), asisR = kps.find(k=>k.name==='virtual_asis_r');
        var lHip = getK('left_hip'), rHip = getK('right_hip');
        
        if (currentTab !== 'r_side' && currentTab !== 'dyn_overhead_side') {
            if(asisL && lHip) { 
                ctx.strokeStyle="#39ff14"; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(lHip.x, lHip.y); ctx.lineTo(asisL.x, asisL.y); ctx.stroke(); 
                ctx.fillStyle="#39ff14"; ctx.beginPath(); ctx.arc(asisL.x, asisL.y, 8, 0, 2*Math.PI); ctx.fill(); 
            }
        }
        if (currentTab !== 'l_side' && currentTab !== 'dyn_overhead_side') {
            if(asisR && rHip) { 
                ctx.strokeStyle="#39ff14"; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(rHip.x, rHip.y); ctx.lineTo(asisR.x, asisR.y); ctx.stroke(); 
                ctx.fillStyle="#39ff14"; ctx.beginPath(); ctx.arc(asisR.x, asisR.y, 8, 0, 2*Math.PI); ctx.fill(); 
            }
        }
        
        if((currentTab === 'front' || currentTab === 'back') && asisL && asisR) {
            ctx.strokeStyle="rgba(57, 255, 20, 0.5)"; ctx.setLineDash([]); ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(asisL.x, asisL.y); ctx.lineTo(asisR.x, asisR.y); ctx.stroke();
            if(pxToCmRatio) { var diffCm = Math.abs(asisL.y - asisR.y) * pxToCmRatio; ctx.fillStyle="#39ff14"; ctx.font="bold 16px sans-serif"; ctx.fillText("骨盤左右高低差: " + diffCm.toFixed(1) + "cm", Math.min(asisL.x, asisR.x), Math.min(asisL.y, asisR.y) - 20); }
        } 
        ctx.restore();
    }

    function calculateWeightBearing(ctx, kps) {
        if (currentTab !== 'front' && currentTab !== 'back' && currentTab !== 'dyn_overhead') return;
        var getK = name => kps.find(k => k.name === name);
        let lAnkle = getK('left_ankle'), rAnkle = getK('right_ankle'); 
        if (!lAnkle || !rAnkle || lAnkle.score < 0.3 || rAnkle.score < 0.3) return;
        let nose = getK('nose'), lSh = getK('left_shoulder'), rSh = getK('right_shoulder'), lHip = getK('left_hip'), rHip = getK('right_hip');
        if (!nose || !lSh || !rSh || !lHip || !rHip) return;

        let dPx = rAnkle.x - lAnkle.x; if (Math.abs(dPx) < 10) return;
        let centerX = (lAnkle.x + rAnkle.x) / 2;

        let upperComX = (nose.x * 0.20) + (((lSh.x + rSh.x) / 2) * 0.80);
        let lowerComX = (lHip.x + rHip.x) / 2;
        let totalComX = (upperComX * 0.6) + (lowerComX * 0.4);

        let calcRatio = (comX) => {
            let pctR = ((comX - lAnkle.x) / dPx) * 100, pctL = 100 - pctR;
            if(pctR < 0) { pctR = 0; pctL = 100; } if(pctR > 100) { pctR = 100; pctL = 0; }
            return { L: pctL, R: pctR };
        };

        let upperRatio = calcRatio(upperComX), lowerRatio = calcRatio(lowerComX), totalRatio = calcRatio(totalComX);

        ctx.save(); ctx.font = "bold 14px sans-serif"; ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(canvasMP.width/2 - 140, canvasMP.height - 210, 280, 85);
        ctx.textAlign = "center";
        ctx.fillStyle = Math.abs(totalRatio.L - 50) > 5 ? "#ff5252" : "#39ff14"; ctx.fillText(`【全身】 左: ${totalRatio.L.toFixed(1)}% | 右: ${totalRatio.R.toFixed(1)}%`, canvasMP.width/2, canvasMP.height - 185);
        ctx.fillStyle = Math.abs(upperRatio.L - 50) > 5 ? "#ff9100" : "#fff"; ctx.fillText(`上半身偏位 左: ${upperRatio.L.toFixed(1)}% | 右: ${upperRatio.R.toFixed(1)}%`, canvasMP.width/2, canvasMP.height - 160);
        ctx.fillStyle = Math.abs(lowerRatio.L - 50) > 5 ? "#ff9100" : "#fff"; ctx.fillText(`下半身偏位 左: ${lowerRatio.L.toFixed(1)}% | 右: ${lowerRatio.R.toFixed(1)}%`, canvasMP.width/2, canvasMP.height - 140);

        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.setLineDash([5,5]); ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvasMP.height); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = "#ff9100"; ctx.beginPath(); ctx.arc(upperComX, (lSh.y + rSh.y)/2, 6, 0, 2*Math.PI); ctx.fill();
        ctx.fillStyle = "#ff9100"; ctx.beginPath(); ctx.arc(lowerComX, (lHip.y + rHip.y)/2, 6, 0, 2*Math.PI); ctx.fill();
        ctx.fillStyle = "#ffeb3b"; ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(totalComX, (lAnkle.y + rAnkle.y)/2 - 10, 8, 0, 2*Math.PI); ctx.fill(); ctx.stroke(); 
        ctx.restore();
    }

    function drawOHSFrontAnalysis(ctx, kps) {
        if (currentTab !== 'dyn_overhead') return;
        var getK = name => kps.find(k => k.name === name);
        const evaluateSide = (h, k, a, label) => {
            if(!h||!k||!a||h.score<0.3||k.score<0.3||a.score<0.3) return;
            var refX = h.x + (a.x - h.x) * ((k.y - h.y) / (a.y - h.y));
            var angle = Math.abs(180 - Math.abs(Math.atan2(a.y-k.y, a.x-k.x) - Math.atan2(h.y-k.y, h.x-k.x)) * 180 / Math.PI);
            if(angle > 2.0) {
                var isIn = label==='R' ? k.x > refX : k.x < refX;
                ctx.fillStyle = isIn ? "#ff5252" : "#ff9100";
                ctx.fillText((isIn?"ニーイン ":"ニーアウト ") + angle.toFixed(1)+"°", k.x+(label==='R'?-120:20), k.y);
            }
        };
        ctx.save(); ctx.font="bold 16px sans-serif"; 
        evaluateSide(getK('right_hip'), getK('right_knee'), getK('right_ankle'), 'R'); 
        evaluateSide(getK('left_hip'), getK('left_knee'), getK('left_ankle'), 'L'); 
        ctx.restore();
    }

    function drawOHSSideAnalysis(ctx, kps) {
        if (currentTab !== 'dyn_overhead_side') return;
        var getK = name => kps.find(k => k.name === name);
        var lS = getK('left_shoulder'), lH = getK('left_hip'), lK = getK('left_knee'), lA = getK('left_ankle'), lW = getK('left_wrist');
        var rS = getK('right_shoulder'), rH = getK('right_hip'), rK = getK('right_knee'), rA = getK('right_ankle'), rW = getK('right_wrist');
        var isLeftActive = (lS && rS && lS.score > rS.score);
        var s = isLeftActive ? lS : rS, h = isLeftActive ? lH : rH, k = isLeftActive ? lK : rK, a = isLeftActive ? lA : rA, w = isLeftActive ? lW : rW;
        if (!s || !h || !k || !a || s.score < 0.3 || h.score < 0.3 || k.score < 0.3) return;

        var trunkLean = Math.abs(Math.atan2(s.x - h.x, h.y - s.y) * 180 / Math.PI);
        var kneeAng = Math.abs((Math.atan2(a.y-k.y, a.x-k.x) - Math.atan2(h.y-k.y, h.x-k.x)) * 180 / Math.PI);
        if(kneeAng > 180) kneeAng = 360 - kneeAng;
        var armAng = Math.abs((Math.atan2(w.y-s.y, w.x-s.x) - Math.atan2(h.y-s.y, h.x-s.x)) * 180 / Math.PI);
        if(armAng > 180) armAng = 360 - armAng;

        ctx.save(); ctx.font = "bold 16px sans-serif";
        ctx.fillStyle = trunkLean > 45 ? "#ff5252" : "#39ff14"; ctx.fillText("体幹前傾: " + trunkLean.toFixed(1) + "°", s.x - 30, s.y - 30);
        ctx.fillStyle = "#00bfff"; ctx.fillText("膝屈曲: " + kneeAng.toFixed(1) + "°", k.x + 20, k.y);
        if(w && w.score > 0.3) {
            ctx.fillStyle = armAng < 160 ? "#ff5252" : "#39ff14"; ctx.fillText("上腕アライメント: " + armAng.toFixed(1) + "°", s.x + 40, s.y + 20);
            ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(w.x, w.y); ctx.stroke();
        } ctx.restore();
    }

    function drawKendallAlignment(ctx, kps) {
        if (currentTab !== 'l_side' && currentTab !== 'r_side') return;
        var getK = name => kps.find(k => k.name === name);
        var isLeft = currentTab === 'l_side';
        var dir = isLeft ? -1 : 1; 

        var ear = isLeft ? getK('left_ear') : getK('right_ear');
        var sh = isLeft ? getK('left_shoulder') : getK('right_shoulder');
        var hip = isLeft ? getK('left_hip') : getK('right_hip');
        var ankle = isLeft ? getK('left_ankle') : getK('right_ankle');

        var targetAnkle = ankle && ankle.score > 0.1 ? ankle : null;
        if (!targetAnkle) {
            var heel = isLeft ? getK('left_heel') : getK('right_heel');
            if (heel && heel.score > 0.1) targetAnkle = heel;
        }
        
        if (!ear || !sh || !hip || !targetAnkle || ear.score < 0.1 || sh.score < 0.1 || hip.score < 0.1) return;

        var ratio = pxToCmRatio || 0.15;
        var footCm = parseFloat(document.getElementById('footSize').value) || 25;
        
        var plumbOffsetPx = (footCm * 0.15) / ratio;
        var plumbX = targetAnkle.x + (dir * plumbOffsetPx);

        ctx.save();
        ctx.strokeStyle = "rgba(57, 255, 20, 0.8)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(plumbX, 0); ctx.lineTo(plumbX, canvasMP.height); ctx.stroke();

        var c2 = { x: ear.x - (dir * (1.0 / ratio)), y: ear.y + (2.0 / ratio), name: "C2(頸椎)", d0: 1.5 };
        var th3 = { x: sh.x, y: sh.y, name: "Th3(胸椎)", d0: 1.0 };
        
        var tiltRad = estimatedPelvicTilt * (Math.PI / 180);
        var s2OffsetZ = 3.0 / ratio;
        var s2OffsetY = 2.0 / ratio;
        var s2X = hip.x - (dir * (s2OffsetZ * Math.cos(tiltRad) - s2OffsetY * Math.sin(tiltRad)));
        var s2Y = hip.y + (s2OffsetZ * Math.sin(tiltRad) + s2OffsetY * Math.cos(tiltRad));
        var s2 = { x: s2X, y: s2Y, name: "S2(仙骨)", d0: 1.0 };
        
        var lumbarDepth = (3.0 + (estimatedPelvicTilt * 0.1)) / ratio;
        var l3Y = s2.y - ((s2.y - sh.y) * 0.3);
        var l3X = s2.x + (dir * lumbarDepth);
        var l3 = { x: l3X, y: l3Y, name: "L3(腰椎)", d0: 2.0 };
        
        var th11Y = s2.y - ((s2.y - sh.y) * 0.6);
        var kyphosisDepth = (1.5 + (estimatedPelvicTilt * 0.05)) / ratio;
        var straightTh11X = l3.x + (th3.x - l3.x) * ((l3.y - th11Y) / (l3.y - th3.y));
        var th11X = straightTh11X - (dir * kyphosisDepth);
        var th11 = { x: th11X, y: th11Y, name: "Th11(胸腰)", d0: 1.0 };

        var pts = [c2, th3, th11, l3, s2];

        ctx.strokeStyle = "rgba(255, 145, 0, 1.0)"; 
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(c2.x, c2.y);
        ctx.bezierCurveTo(c2.x, th3.y, th3.x, c2.y, th3.x, th3.y);
        ctx.bezierCurveTo(th3.x, th11.y, th11.x, th3.y, th11.x, th11.y);
        ctx.bezierCurveTo(th11.x, l3.y, l3.x, th11.y, l3.x, l3.y);
        ctx.bezierCurveTo(l3.x, s2.y, s2.x, l3.y, s2.x, s2.y);
        ctx.stroke();

        ctx.font = "bold 13px sans-serif";
        pts.forEach(pt => {
            ctx.fillStyle = "#ff9100";
            ctx.beginPath(); ctx.arc(pt.x, pt.y, 6, 0, 2*Math.PI); ctx.fill();
            
            var devCm = (pt.x - plumbX) * ratio * dir;
            var stressPct = ((pt.d0 + Math.max(0, devCm)) / pt.d0) * 100;
            if (devCm < -pt.d0) stressPct = Math.abs((pt.d0 + devCm)/pt.d0) * 100;

            var color = Math.abs(devCm) <= 1.5 ? "#39ff14" : "#ff5252";
            var txt = `${pt.name} ${devCm > 0 ? "+" : ""}${devCm.toFixed(1)}cm (${stressPct.toFixed(0)}%)`;
            
            var tw = ctx.measureText(txt).width;
            var tx = pt.x + (dir === 1 ? -tw - 10 : 10);
            ctx.fillStyle = "rgba(0,0,0,0.85)";
            ctx.fillRect(tx - 5, pt.y - 12, tw + 10, 18);
            ctx.fillStyle = color;
            ctx.fillText(txt, tx, pt.y);

            ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.setLineDash([3, 3]);
            ctx.beginPath(); ctx.moveTo(pt.x, pt.y); ctx.lineTo(plumbX, pt.y); ctx.stroke(); ctx.setLineDash([]);
        });
        
        ctx.fillStyle = "#39ff14"; ctx.fillText("重力線 (Plumb Line)", plumbX + 10, 50);
        ctx.restore();
    }

    // --- 5. 録画と再生パイプライン ---
    window.refreshHistoryList = async function() {
        var sessions = await dbManager.getAllSessions(); historyListContainer.innerHTML = '';
        if(sessions.length === 0) { historyListContainer.innerHTML = '<div style="color:#aaa; text-align:center; padding:20px;">履歴なし</div>'; return; }
        sessions.forEach(s => {
            var item = document.createElement('div'); item.className = 'history-item';
            item.innerHTML = `<div onclick="window.loadSession('${s.id}')"><b>${MODE_NAMES[s.mode] || s.mode}</b><br><small>${new Date(s.timestamp).toLocaleString()}</small></div><button class="history-action-btn del" onclick="event.stopPropagation(); window.deleteSession('${s.id}')">削除</button>`;
            historyListContainer.appendChild(item);
        });
    };
    
    window.deleteSession = async function(id) { customConfirm("削除の確認", "データを削除しますか？", async () => { await dbManager.deleteSession(id); window.refreshHistoryList(); }); };
    window.loadSession = async function(id) {
        var sessions = await dbManager.getAllSessions(); var s = sessions.find(x=>x.id===id);
        if(s) { poseDataLog = s.poseData; currentTab = s.mode; document.getElementById('modeSelect').value = s.mode; document.getElementById('historyPanel').style.display='none'; enterPlaybackMode(); }
    };

    // 🌟 V82修正：iPhone（iOS）向けのアクセス許可＆デバイス解放機構
    async function init() {
        try { await dbManager.init(); } catch(e) { console.error("DB Init Error:", e); }
        try {
            // iOS対応：最初に仮のアクセスを求め、背面等のカメララベルと識別IDをご自身のiPhoneから強制解放させる
            try {
                var streamPermission = await navigator.mediaDevices.getUserMedia({ video: true });
                streamPermission.getTracks().forEach(t => t.stop());
            } catch(pErr) { console.log("iOS Permission Check:", pErr); }

            var devices = await navigator.mediaDevices.enumerateDevices();
            var vs = document.getElementById('videoSource');
            vs.innerHTML = ''; 
            var hasCam = false;
            devices.forEach(d => { 
                if(d.kind==='videoinput') {
                    var label = d.label || ("カメラ " + (vs.length + 1));
                    vs.appendChild(new Option(label, d.deviceId)); 
                    hasCam = true;
                } 
            });
            if(!hasCam) vs.innerHTML = '<option value="">カメラなし</option>';

            await tf.setBackend('webgl'); 
            await tf.ready();
            detectors[0] = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' });
            startBtn.innerText = "📷 システム起動"; startBtn.disabled = false; updateInfoPanel();
        } catch(e) { 
            startBtn.innerText = "❌ 起動エラー"; 
            customAlert("AI初期化エラー", "AIエンジンの準備中にエラーが発生しました。\n\n詳細: " + (e.message || e) + "\n\nネットワーク環境を確認し、ページをリロードしてください。");
        }
    }
    window.addEventListener('load', init); 

    // 🌟 V82修正：アウトカメラ優先＆理想値（ideal）指定による過剰制約フリーズ回避
    startBtn.onclick = async function() {
        renderSessionId++; var cur = renderSessionId;
        var vs = document.getElementById('videoSource').value;
        
        var constraints = { 
            video: { 
                width: { ideal: 1920 }, 
                height: { ideal: 1080 },
                facingMode: { ideal: "environment" } // デフォルトで背面を理想とする
            } 
        };
        if (vs) {
            constraints.video.deviceId = { ideal: vs };
            var selText = document.getElementById('videoSource').options[document.getElementById('videoSource').selectedIndex].text;
            if(/back|背面|environment|アウト/i.test(selText)) {
                constraints.video.facingMode = { ideal: "environment" };
            } else if(/front|前面|user|イン/i.test(selText)) {
                constraints.video.facingMode = { ideal: "user" };
            }
        } 

        try {
            if(currentStream) { currentStream.getTracks().forEach(t=>t.stop()); video.pause(); video.srcObject = null; }
            var stream = await navigator.mediaDevices.getUserMedia(constraints);
            startVideoStream(stream, cur);
        } catch(e) {
            console.warn("High-res camera request failed, trying fallback...", e);
            try {
                var fallbackConstraints = { video: { facingMode: { ideal: "environment" } } };
                if (vs) fallbackConstraints.video.deviceId = { ideal: vs };
                var streamFallback = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                startVideoStream(streamFallback, cur);
                customAlert("お知らせ", "指定解像度での起動に失敗したため、標準画質で起動しました。");
            } catch(fallbackErr) {
                customAlert("カメラ起動エラー", `カメラにアクセスできませんでした。\n\n【エラー詳細】\n${fallbackErr.message}\n\n・ブラウザの設定でカメラ許可がオンになっているか確認してください。\n・他のアプリがカメラを占有していないか確認してください。`);
            }
        }
    };

    function startVideoStream(stream, cur) {
        video.srcObject = stream; 
        currentStream = stream;
        video.onloadeddata = function() {
            canvasMP.width = video.videoWidth; canvasMP.height = video.videoHeight;
            canvasComb.width = video.videoWidth; canvasComb.height = video.videoHeight;
            isRunning = true; video.play(); render(cur); recBtn.disabled = false;
            video.onloadeddata = null; 
        };
    }

    async function render(sid) {
        if (sid !== renderSessionId || !isRunning || appMode === "playback") return;
        ctxMP.drawImage(video, 0, 0, canvasMP.width, canvasMP.height);
        var poses = await detectors[0].estimatePoses(video);
        if (poses.length > 0) {
            var kps = generateVirtualASIS(poses[0].keypoints); 
            window.reportDataStore[currentTab] = kps;
            if (isRecording) poseDataLog.push({ time: Date.now(), mode: currentTab, keypoints: kps });
            drawSkeleton(ctxMP, kps, "#ff5252");
            drawOHSFrontAnalysis(ctxMP, kps);
            drawOHSSideAnalysis(ctxMP, kps);
            drawKendallAlignment(ctxMP, kps);
            calculateWeightBearing(ctxMP, kps);
            runReviewLogic(ctxMP, (n) => kps.find(k => k.name === n), canvasMP);
            updateRadar(kps, canvasMP);
        }
        ctxComb.drawImage(canvasMP, 0, 0, canvasMP.width, canvasMP.height);
        requestAnimationFrame(() => render(sid));
    }

    // --- 7. ダッシュボード & LLM ---
    window.prepareAndPrintReport = function() {
        var grid = document.getElementById('dashGrid'); var html = '';
        
        html += '<div class="dash-card"><h3>🧍 前額面アライメント (Frontal)</h3>';
        var frontKps = window.reportDataStore['front'] || window.reportDataStore['back'];
        if(frontKps) {
             var wb = getWeightBearingData(frontKps);
             var pDiff = getPelvicDiff(frontKps);
             if(wb) {
                 html += `<div class="dash-metric"><span>全身荷重配分 (左/右)</span> <span class="val ${Math.abs(wb.total.L-50)>5?'warn':'good'}">${wb.total.L.toFixed(1)}% / ${wb.total.R.toFixed(1)}%</span></div>`;
                 html += `<div class="dash-metric"><span>上半身質量偏位 (左/右)</span> <span class="val">${wb.upper.L.toFixed(1)}% / ${wb.upper.R.toFixed(1)}%</span></div>`;
                 html += `<div class="dash-metric"><span>下半身質量偏位 (左/右)</span> <span class="val">${wb.lower.L.toFixed(1)}% / ${wb.lower.R.toFixed(1)}%</span></div>`;
             }
             if(pDiff !== null) html += `<div class="dash-metric"><span>骨盤高低差</span> <span class="val ${pDiff>1.5?'warn':'good'}">${pDiff.toFixed(1)} cm</span></div>`;
        } else { html += '<p style="color:#aaa; text-align:center; padding: 20px 0;">未測定</p>'; }
        html += '</div>';

        html += '<div class="dash-card"><h3>🧍 矢状面アライメント (Sagittal)</h3>';
        var sideKps = window.reportDataStore['l_side'] || window.reportDataStore['r_side'];
        if(sideKps) {
             var isLeft = !!window.reportDataStore['l_side'], stress = getKendallStressData(sideKps, isLeft);
             if(stress) { stress.forEach(s => { html += `<div class="dash-metric"><span>${s.name}</span> <span class="val ${s.pct>150?'warn':'good'}">${s.dev > 0 ? '+':''}${s.dev.toFixed(1)}cm (${s.pct.toFixed(0)}% 負荷)</span></div>`; }); }
        } else { html += '<p style="color:#aaa; text-align:center; padding: 20px 0;">未測定</p>'; }
        html += '</div>';

        html += '<div class="dash-card"><h3>🏋️ 動的機能: OHS (Dynamic)</h3>';
        var ohsF = window.reportDataStore['dyn_overhead'], ohsS = window.reportDataStore['dyn_overhead_side'];
        if(ohsF || ohsS) {
            if(ohsF) {
                var data = getOHSFrontData(ohsF);
                if(data.r) html += `<div class="dash-metric"><span>右膝挙動</span> <span class="val ${data.r.warn?'warn':'good'}">${data.r.text}</span></div>`;
                if(data.l) html += `<div class="dash-metric"><span>左膝挙動</span> <span class="val ${data.l.warn?'warn':'good'}">${data.l.text}</span></div>`;
            } else { html += `<div class="dash-metric"><span>前面 OHS</span> <span class="val">未測定</span></div>`; }
            if(ohsS) {
                var data = getOHSSideData(ohsS);
                if(data) {
                    html += `<div class="dash-metric"><span>最大体幹前傾角</span> <span class="val ${data.trunk>45?'warn':'good'}">${data.trunk.toFixed(1)}°</span></div>`;
                    html += `<div class="dash-metric"><span>最深膝屈曲角</span> <span class="val">${data.knee.toFixed(1)}°</span></div>`;
                    if(data.arm) html += `<div class="dash-metric"><span>上腕アライメント</span> <span class="val ${data.arm<160?'warn':'good'}">${data.arm.toFixed(1)}°</span></div>`;
                }
            } else { html += `<div class="dash-metric"><span>側面 OHS</span> <span class="val">未測定</span></div>`; }
        } else { html += '<p style="color:#aaa; text-align:center; padding: 20px 0;">未測定</p>'; }
        html += '</div>';

        html += '<div class="dash-card"><h3>⚡ バランス＆可動性 (Mobility)</h3>';
        var tests = [ { id: 'dyn_single_r', name: '片脚バランス (右)' }, { id: 'dyn_single_l', name: '片脚バランス (左)' }, { id: 'dyn_flex_fwd', name: '立位体前屈' }, { id: 'dyn_flex_bwd', name: '立位体後屈' }, { id: 'dyn_shoulder_r', name: '肩複合可動性 (右上)' }, { id: 'dyn_shoulder_l', name: '肩複合可動性 (左上)' } ];
        var hasOther = false;
        tests.forEach(t => { if(window.reportDataStore[t.id]) { hasOther = true; html += `<div class="dash-metric"><span>${t.name}</span> <span class="val good">データ取得済 ✅</span></div>`; } });
        if(!hasOther) html += '<p style="color:#aaa; text-align:center; padding: 20px 0;">未測定</p>';
        html += '</div>';

        html += `<div class="dash-card" id="aiEvalCard" style="grid-column: 1 / -1;">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px;">
                <h3 style="margin:0; border:none; padding:0; color:#00bfff;">🧠 AI 臨床評価 (LLM Insight)</h3>
                <div style="display:flex; gap:10px;">
                    <input type="password" id="geminiApiKeyInput" placeholder="Gemini API Key" style="background:#222; color:#fff; border:1px solid #555; padding:6px; border-radius:4px; font-size:12px; width:200px;">
                    <button onclick="window.generateAiInsights()" style="background:#00bfff; color:#000; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold;">評価を生成</button>
                </div>
            </div>
            <div id="aiEvalContent" style="color:#fff; line-height:1.6; font-size:15px; background:rgba(255,255,255,0.03); padding:20px; border-radius:8px; border-left:4px solid #00bfff;">
                <span>APIキーを入力して「評価を生成」ボタンを押してください。</span>
            </div>
        </div>`;
        grid.innerHTML = html; document.getElementById('dashboardOverlay').style.display = 'block';
    }

    window.generateAiInsights = async function() {
        const apiKey = document.getElementById('geminiApiKeyInput').value.trim();
        if (!apiKey) { document.getElementById('aiEvalContent').innerHTML = `<span style="color:#ff5252;">Google AI Studio で取得したAPIキーを入力欄に設定してください。</span>`; return; }

        document.getElementById('aiEvalContent').innerHTML = "<span style='color:#aaa;'>AIが分析中...</span>";
        
        let promptText = "【患者データ】\n";
        let frontKps = window.reportDataStore['front'] || window.reportDataStore['back'];
        if(frontKps) {
            let wb = getWeightBearingData(frontKps), pDiff = getPelvicDiff(frontKps);
            if(wb) promptText += `- 前額面荷重配分: 左 ${wb.total.L.toFixed(1)}% / 右 ${wb.total.R.toFixed(1)}%\n`;
            if(pDiff !== null) promptText += `- 骨盤高低差: ${pDiff.toFixed(1)} cm\n`;
        }
        let sideKps = window.reportDataStore['l_side'] || window.reportDataStore['r_side'];
        if(sideKps) {
            let isLeft = !!window.reportDataStore['l_side'], stress = getKendallStressData(sideKps, isLeft);
            if(stress) { promptText += "- 矢状面トルクストレス:\n"; stress.forEach(s => promptText += `  ${s.name}: 変位 ${s.dev.toFixed(1)}cm, 負荷 ${s.pct.toFixed(0)}%\n`); }
        }
        let ohsF = window.reportDataStore['dyn_overhead'];
        if(ohsF) {
            let data = getOHSFrontData(ohsF); promptText += "- OHS前面:\n";
            if(data.r && data.r.warn) promptText += `  右膝: ${data.r.text}\n`; if(data.l && data.l.warn) promptText += `  左膝: ${data.l.text}\n`;
        }
        let ohsS = window.reportDataStore['dyn_overhead_side'];
        if(ohsS) {
            let data = getOHSSideData(ohsS);
            if(data) { promptText += `- OHS側面: 体幹前傾 ${data.trunk.toFixed(1)}°, 膝屈曲 ${data.knee.toFixed(1)}°`; if(data.arm) promptText += `, 上腕 ${data.arm.toFixed(1)}°`; promptText += "\n"; }
        }

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }], systemInstruction: { parts: [{ text: "熟練したカイロプラクターとして、提供された数値から筋のアンバランスを150字で評価してください。" }] } })
            });
            if(!res.ok) throw new Error(`HTTP Error: ${res.status}`);
            const data = await res.json();
            document.getElementById('aiEvalContent').innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
        } catch(e) { document.getElementById('aiEvalContent').innerHTML = `<span style="color:#ff5252;">評価の生成に失敗しました。APIキーが間違っているか、通信エラーです。(${e.message})</span>`; }
    };
</script>
