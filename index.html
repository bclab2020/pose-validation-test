<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿勢推論モデル 60FPS Side-by-Side 検証</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
        .controls { padding: 15px; text-align: center; background: #333; }
        button { padding: 10px 15px; font-size: 14px; margin: 5px; cursor: pointer; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }
        .container { display: flex; width: 100vw; height: calc(100vh - 120px); }
        .view-port { flex: 1; position: relative; border-right: 1px solid #555; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .stats { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; font-size: 14px; line-height: 1.5; border-radius: 5px; }
    </style>
</head>
<body>

<div class="controls">
    <button id="startBtn" disabled>モデル読み込み中...</button>
    <button id="switchBtn" disabled>🔄 インカメラに切替</button>
    <button id="stopBtn" disabled>検証終了 ＆ CSVダウンロード</button>
</div>

<div class="container">
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="stats" id="statsMP">MediaPipe (BlazePose)<br>準備中...</div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div class="stats" id="statsMN">MoveNet (Lightning)<br>準備中...</div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('video');
    const canvasMP = document.getElementById('canvasMP');
    const canvasMN = document.getElementById('canvasMN');
    const ctxMP = canvasMP.getContext('2d');
    const ctxMN = canvasMN.getContext('2d');
    
    let detectorMP, detectorMN;
    let isRunning = false;
    let logData = [];
    let frameCount = 0;
    let currentFacingMode = 'environment'; 

    // 全33ポイントの名称リスト（番号と一致）
    const KEYPOINT_NAMES = [
        "nose", "left_eye_inner", "left_eye", "left_eye_outer", 
        "right_eye_inner", "right_eye", "right_eye_outer", 
        "left_ear", "right_ear", "mouth_left", "mouth_right", 
        "left_shoulder", "right_shoulder", "left_elbow", "right_elbow", 
        "left_wrist", "right_wrist", "left_pinky", "right_pinky", 
        "left_index", "right_index", "left_thumb", "right_thumb", 
        "left_hip", "right_hip", "left_knee", "right_knee", 
        "left_ankle", "right_ankle", "left_heel", "right_heel", 
        "left_foot_index", "right_foot_index"
    ];

    // CSVヘッダーの動的生成
    let csvHeaders = ["Frame", "Timestamp_ms", "Model", "InferenceTime_ms", "Score_Average"];
    KEYPOINT_NAMES.forEach((name, index) => {
        csvHeaders.push(`${index}_${name}_X`);
        csvHeaders.push(`${index}_${name}_Y`);
        csvHeaders.push(`${index}_${name}_Score`); // その関節が隠れていないかの信頼度
    });
    logData.push(csvHeaders);

    async function initModels() {
        await tf.ready();

        const modelMP = poseDetection.SupportedModels.BlazePose;
        const detectorConfigMP = { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' };
        detectorMP = await poseDetection.createDetector(modelMP, detectorConfigMP);

        const modelMN = poseDetection.SupportedModels.MoveNet;
        const detectorConfigMN = { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING };
        detectorMN = await poseDetection.createDetector(modelMN, detectorConfigMN);

        document.getElementById('startBtn').innerText = "▶️ カメラ起動(アウト)＆開始";
        document.getElementById('startBtn').disabled = false;
        document.getElementById('statsMP').innerHTML = "MediaPipe (BlazePose)<br>待機中";
        document.getElementById('statsMN').innerHTML = "MoveNet (Lightning)<br>待機中";
    }

    async function setupCamera() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
            video.srcObject = null; 
        }

        let videoConstraints = {
            width: { ideal: 640 },
            height: { ideal: 480 },
            facingMode: currentFacingMode
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints });
            video.srcObject = stream;
        } catch (err) {
            console.error("カメラの取得に失敗しました:", err);
            alert("カメラを起動できませんでした。");
            return Promise.reject(err);
        }

        return new Promise((resolve) => {
            video.onloadeddata = async () => {
                canvasMP.width = video.videoWidth || 640; 
                canvasMP.height = video.videoHeight || 480;
                canvasMN.width = video.videoWidth || 640; 
                canvasMN.height = video.videoHeight || 480;
                
                try {
                    await video.play();
                } catch (e) {
                    console.error("ビデオの再生に失敗:", e);
                }
                resolve();
            };
        });
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        try {
            await setupCamera();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('switchBtn').disabled = false;
            document.getElementById('stopBtn').disabled = false;
            
            if (!isRunning) {
                isRunning = true;
                processFrame();
            }
        } catch (err) {
            console.log("初期化エラー");
        }
    });

    document.getElementById('switchBtn').addEventListener('click', async () => {
        currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';
        document.getElementById('switchBtn').innerText = 
            (currentFacingMode === 'environment') ? "🔄 インカメラに切替" : "🔄 アウトカメラに切替";
        document.getElementById('switchBtn').disabled = true;
        
        try { await setupCamera(); } catch(e) { alert("切り替え失敗"); }
        
        document.getElementById('switchBtn').disabled = false;
    });

    async function processFrame() {
        if (!isRunning) return;
        frameCount++;
        const currentTimestamp = performance.now();

        ctxMP.clearRect(0, 0, canvasMP.width, canvasMP.height);
        ctxMP.drawImage(video, 0, 0, canvasMP.width, canvasMP.height);
        
        ctxMN.clearRect(0, 0, canvasMN.width, canvasMN.height);
        ctxMN.drawImage(video, 0, 0, canvasMN.width, canvasMN.height);

        const startMP = performance.now();
        const posesMP = await detectorMP.estimatePoses(video);
        const timeMP = performance.now() - startMP;
        drawPoses(posesMP, ctxMP, 'red');
        logResults(posesMP, "MediaPipe", timeMP, currentTimestamp);
        document.getElementById('statsMP').innerHTML = `MediaPipe (BlazePose)<br>推論: ${timeMP.toFixed(1)} ms<br>FPS: ${(1000/timeMP).toFixed(1)}`;

        const startMN = performance.now();
        const posesMN = await detectorMN.estimatePoses(video);
        const timeMN = performance.now() - startMN;
        drawPoses(posesMN, ctxMN, 'cyan');
        logResults(posesMN, "MoveNet", timeMN, currentTimestamp);
        document.getElementById('statsMN').innerHTML = `MoveNet (Lightning)<br>推論: ${timeMN.toFixed(1)} ms<br>FPS: ${(1000/timeMN).toFixed(1)}`;

        requestAnimationFrame(processFrame);
    }

    function drawPoses(poses, ctx, color) {
        if (poses.length > 0) {
            const keypoints = poses[0].keypoints;
            ctx.fillStyle = color;
            keypoints.forEach(keypoint => {
                if (keypoint.score > 0.3) {
                    ctx.beginPath();
                    ctx.arc(keypoint.x, keypoint.y, 4, 0, 2 * Math.PI);
                    ctx.fill();
                }
            });
        }
    }

    // 全ポイントのデータをCSV配列に格納する処理
    function logResults(poses, modelName, inferenceTime, timestamp) {
        let rowData = [frameCount, timestamp.toFixed(1), modelName, inferenceTime.toFixed(1)];
        
        if (poses.length > 0) {
            const keypoints = poses[0].keypoints;
            const totalScore = keypoints.reduce((sum, kp) => sum + (kp.score || 0), 0);
            const avgScore = totalScore / keypoints.length;
            rowData.push(avgScore.toFixed(3));

            // チャート名（KEYPOINT_NAMES）と照合してデータを挿入
            KEYPOINT_NAMES.forEach(targetName => {
                const kp = keypoints.find(k => k.name === targetName);
                if (kp) {
                    rowData.push(kp.x.toFixed(2), kp.y.toFixed(2), (kp.score || 0).toFixed(3));
                } else {
                    // そのモデルに該当部位が存在しない場合は空白セルにする
                    rowData.push("", "", ""); 
                }
            });
        } else {
            // 人物が未検出のフレーム
            rowData.push("0.000");
            KEYPOINT_NAMES.forEach(() => rowData.push("", "", ""));
        }
        
        logData.push(rowData);
    }

    document.getElementById('stopBtn').addEventListener('click', () => {
        isRunning = false;
        if(video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        
        let csvContent = "data:text/csv;charset=utf-8," + logData.map(e => e.join(",")).join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `pose_benchmark_log_${new Date().getTime()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        document.getElementById('startBtn').disabled = false;
        document.getElementById('switchBtn').disabled = true;
        document.getElementById('stopBtn').disabled = true;
    });

    window.onload = initModels;
</script>
</body>
</html>
