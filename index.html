<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿勢推論モデル 60FPS Side-by-Side 検証</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
        .controls { padding: 10px; text-align: center; background: #333; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center; }
        button, select { padding: 8px 12px; font-size: 14px; cursor: pointer; border-radius: 4px; border: 1px solid #555; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }
        select { background: #fff; color: #000; font-weight: bold; }
        .container { display: flex; width: 100vw; height: calc(100vh - 100px); }
        .view-port { flex: 1; position: relative; border-right: 1px solid #555; overflow: hidden; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .stats { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; font-size: 13px; line-height: 1.4; border-radius: 5px; z-index: 10; }
    </style>
</head>
<body>

<div class="controls">
    <button id="startBtn" disabled>モデル読み込み中...</button>
    <button id="switchBtn" disabled>🔄 カメラ切替</button>
    
    <select id="modeSelect">
        <option value="none">可視化オフ (骨格のみ)</option>
        <option value="squat">スクワット測定 (膝/股関節角度)</option>
        <option value="single_leg">片足立ち測定 (骨盤/肩の傾き)</option>
    </select>

    <button id="stopBtn" disabled>検証終了 ＆ CSV保存</button>
</div>

<div class="container">
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div class="stats" id="statsMP">MediaPipe<br>準備中...</div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div class="stats" id="statsMN">MoveNet<br>準備中...</div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('video');
    const canvasMP = document.getElementById('canvasMP');
    const canvasMN = document.getElementById('canvasMN');
    const ctxMP = canvasMP.getContext('2d');
    const ctxMN = canvasMN.getContext('2d');
    const modeSelect = document.getElementById('modeSelect');
    
    let detectorMP, detectorMN;
    let isRunning = false;
    let logData = [];
    let frameCount = 0;
    let currentFacingMode = 'environment'; 

    const KEYPOINT_NAMES = [
        "nose", "left_eye_inner", "left_eye", "left_eye_outer", "right_eye_inner", "right_eye", "right_eye_outer", 
        "left_ear", "right_ear", "mouth_left", "mouth_right", "left_shoulder", "right_shoulder", "left_elbow", "right_elbow", 
        "left_wrist", "right_wrist", "left_pinky", "right_pinky", "left_index", "right_index", "left_thumb", "right_thumb", 
        "left_hip", "right_hip", "left_knee", "right_knee", "left_ankle", "right_ankle", "left_heel", "right_heel", 
        "left_foot_index", "right_foot_index"
    ];

    let csvHeaders = ["Frame", "Timestamp_ms", "Model", "InferenceTime_ms", "Score_Average"];
    KEYPOINT_NAMES.forEach((name, index) => {
        csvHeaders.push(`${index}_${name}_X`, `${index}_${name}_Y`, `${index}_${name}_Score`);
    });
    logData.push(csvHeaders);

    // 【数学関数】3点から角度を計算する (A-B-C の Bを頂点とした角度)
    function calculateAngle(A, B, C) {
        if (!A || !B || !C || A.score < 0.3 || B.score < 0.3 || C.score < 0.3) return null;
        let radians = Math.atan2(C.y - B.y, C.x - B.x) - Math.atan2(A.y - B.y, A.x - B.x);
        let angle = Math.abs(radians * 180.0 / Math.PI);
        if (angle > 180.0) angle = 360.0 - angle;
        return angle;
    }

    // 【数学関数】2点を結ぶ線の「水平」からの傾き角度を計算する
    function calculateHorizontalTilt(left, right) {
        if (!left || !right || left.score < 0.3 || right.score < 0.3) return null;
        let dy = right.y - left.y;
        let dx = right.x - left.x;
        let angle = Math.abs(Math.atan2(dy, dx) * 180.0 / Math.PI);
        if (angle > 90) angle = 180 - angle; // 常に0〜90度で傾きを表現
        return angle;
    }

    async function initModels() {
        await tf.ready();
        detectorMP = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' });
        detectorMN = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });

        document.getElementById('startBtn').innerText = "▶️ カメラ起動";
        document.getElementById('startBtn').disabled = false;
        document.getElementById('statsMP').innerHTML = "MediaPipe<br>待機中";
        document.getElementById('statsMN').innerHTML = "MoveNet<br>待機中";
    }

    async function setupCamera() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
            video.srcObject = null; 
        }
        let videoConstraints = { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: currentFacingMode };
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints });
            video.srcObject = stream;
        } catch (err) {
            alert("カメラを起動できませんでした。");
            return Promise.reject(err);
        }
        return new Promise((resolve) => {
            video.onloadeddata = async () => {
                canvasMP.width = video.videoWidth || 640; canvasMP.height = video.videoHeight || 480;
                canvasMN.width = video.videoWidth || 640; canvasMN.height = video.videoHeight || 480;
                try { await video.play(); } catch (e) {}
                resolve();
            };
        });
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        await setupCamera();
        document.getElementById('startBtn').disabled = true;
        document.getElementById('switchBtn').disabled = false;
        document.getElementById('stopBtn').disabled = false;
        if (!isRunning) { isRunning = true; processFrame(); }
    });

    document.getElementById('switchBtn').addEventListener('click', async () => {
        currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';
        document.getElementById('switchBtn').disabled = true;
        try { await setupCamera(); } catch(e) {}
        document.getElementById('switchBtn').disabled = false;
    });

    async function processFrame() {
        if (!isRunning) return;
        frameCount++;
        const currentTimestamp = performance.now();
        const currentMode = modeSelect.value; // 現在のドロップダウンの選択値を取得

        ctxMP.clearRect(0, 0, canvasMP.width, canvasMP.height);
        ctxMP.drawImage(video, 0, 0, canvasMP.width, canvasMP.height);
        ctxMN.clearRect(0, 0, canvasMN.width, canvasMN.height);
        ctxMN.drawImage(video, 0, 0, canvasMN.width, canvasMN.height);

        const startMP = performance.now();
        const posesMP = await detectorMP.estimatePoses(video);
        const timeMP = performance.now() - startMP;
        drawPosesWithAnalysis(posesMP, ctxMP, 'red', KEYPOINT_NAMES, currentMode);
        logResults(posesMP, "MediaPipe", timeMP, currentTimestamp);
        document.getElementById('statsMP').innerHTML = `MediaPipe<br>推論: ${timeMP.toFixed(1)}ms<br>FPS: ${(1000/timeMP).toFixed(1)}`;

        const startMN = performance.now();
        const posesMN = await detectorMN.estimatePoses(video);
        const timeMN = performance.now() - startMN;
        drawPosesWithAnalysis(posesMN, ctxMN, 'cyan', KEYPOINT_NAMES, currentMode);
        logResults(posesMN, "MoveNet", timeMN, currentTimestamp);
        document.getElementById('statsMN').innerHTML = `MoveNet<br>推論: ${timeMN.toFixed(1)}ms<br>FPS: ${(1000/timeMN).toFixed(1)}`;

        requestAnimationFrame(processFrame);
    }

    const POSE_CONNECTIONS = [
        [0, 1], [0, 4], [1, 2], [2, 3], [4, 5], [5, 6], [3, 7], [6, 8], [9, 10], 
        [11, 12], [11, 23], [12, 24], [23, 24],
        [12, 14], [14, 16], [16, 18], [16, 20], [16, 22], [18, 20],
        [11, 13], [13, 15], [15, 17], [15, 19], [15, 21], [17, 19],
        [24, 26], [26, 28], [28, 30], [28, 32], [30, 32],
        [23, 25], [25, 27], [27, 29], [27, 31], [29, 31]
    ];

    // 【機能追加】骨格描画と同時に、指定モードに応じた角度分析を画面に描画する関数
    function drawPosesWithAnalysis(poses, ctx, color, keypointNameList, mode) {
        if (poses.length === 0) return;
        
        const keypoints = poses[0].keypoints;
        
        // 1. 基本の骨格描画
        ctx.fillStyle = color;
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        POSE_CONNECTIONS.forEach(conn => {
            const k1 = keypoints.find(kp => kp.name === keypointNameList[conn[0]]);
            const k2 = keypoints.find(kp => kp.name === keypointNameList[conn[1]]);
            if (k1 && k2 && k1.score > 0.3 && k2.score > 0.3) {
                ctx.beginPath(); ctx.moveTo(k1.x, k1.y); ctx.lineTo(k2.x, k2.y); ctx.stroke();
            }
        });
        keypoints.forEach(kp => {
            if (kp.score > 0.3) {
                ctx.beginPath(); ctx.arc(kp.x, kp.y, 5, 0, 2 * Math.PI); ctx.fill();
            }
        });

        // 2. モードに応じたバイオメカニクス分析とテキスト描画
        ctx.font = "bold 24px sans-serif";
        ctx.fillStyle = "#FFFF00"; // 角度の文字は黄色で目立たせる
        ctx.strokeStyle = "black";
        ctx.lineWidth = 4;

        // 関節データの取得
        const getKP = (name) => keypoints.find(kp => kp.name === name);
        const lShoulder = getKP('left_shoulder'); const rShoulder = getKP('right_shoulder');
        const lHip = getKP('left_hip'); const rHip = getKP('right_hip');
        const lKnee = getKP('left_knee'); const rKnee = getKP('right_knee');
        const lAnkle = getKP('left_ankle'); const rAnkle = getKP('right_ankle');

        if (mode === 'squat') {
            // スクワット：右半身の角度を計算して表示（横向き撮影を想定）
            const kneeAngle = calculateAngle(rHip, rKnee, rAnkle);
            const hipAngle = calculateAngle(rShoulder, rHip, rKnee); // 代償動作チェック用
            
            if (kneeAngle !== null) {
                const text = `膝角度: ${kneeAngle.toFixed(0)}°`;
                ctx.strokeText(text, rKnee.x + 20, rKnee.y);
                ctx.fillText(text, rKnee.x + 20, rKnee.y);
            }
            if (hipAngle !== null) {
                const text = `股関節角: ${hipAngle.toFixed(0)}°`;
                // 股関節が鋭角になりすぎる（例えば60度以下）と代償動作として赤色に
                ctx.fillStyle = hipAngle < 60 ? "#FF4444" : "#FFFF00"; 
                ctx.strokeText(text, rHip.x + 20, rHip.y);
                ctx.fillText(text, rHip.x + 20, rHip.y);
            }
        } 
        else if (mode === 'single_leg') {
            // 片足立ち：骨盤と肩の水平からの傾き（代償動作）を表示
            const pelvicTilt = calculateHorizontalTilt(lHip, rHip);
            const shoulderTilt = calculateHorizontalTilt(lShoulder, rShoulder);

            if (pelvicTilt !== null) {
                const text = `骨盤傾斜: ${pelvicTilt.toFixed(1)}°`;
                // 骨盤が5度以上傾いたら代償（トレンデレンブルグ等）として赤色に
                ctx.fillStyle = pelvicTilt > 5.0 ? "#FF4444" : "#FFFF00";
                ctx.strokeText(text, lHip.x - 50, lHip.y - 30);
                ctx.fillText(text, lHip.x - 50, lHip.y - 30);
            }
            if (shoulderTilt !== null) {
                const text = `肩の傾斜: ${shoulderTilt.toFixed(1)}°`;
                ctx.fillStyle = shoulderTilt > 5.0 ? "#FF4444" : "#FFFF00";
                ctx.strokeText(text, lShoulder.x - 50, lShoulder.y - 30);
                ctx.fillText(text, lShoulder.x - 50, lShoulder.y - 30);
            }
        }
    }

    function logResults(poses, modelName, inferenceTime, timestamp) {
        let rowData = [frameCount, timestamp.toFixed(1), modelName, inferenceTime.toFixed(1)];
        if (poses.length > 0) {
            const keypoints = poses[0].keypoints;
            const totalScore = keypoints.reduce((sum, kp) => sum + (kp.score || 0), 0);
            rowData.push((totalScore / keypoints.length).toFixed(3));
            KEYPOINT_NAMES.forEach(targetName => {
                const kp = keypoints.find(k => k.name === targetName);
                if (kp) rowData.push(kp.x.toFixed(2), kp.y.toFixed(2), (kp.score || 0).toFixed(3));
                else rowData.push("", "", ""); 
            });
        } else {
            rowData.push("0.000"); KEYPOINT_NAMES.forEach(() => rowData.push("", "", ""));
        }
        logData.push(rowData);
    }

    document.getElementById('stopBtn').addEventListener('click', () => {
        isRunning = false;
        if(video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
        
        let csvContent = "data:text/csv;charset=utf-8," + logData.map(e => e.join(",")).join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `pose_benchmark_log_${new Date().getTime()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        document.getElementById('startBtn').disabled = false;
        document.getElementById('switchBtn').disabled = true;
        document.getElementById('stopBtn').disabled = true;
    });

    window.onload = initModels;
</script>
</body>
</html>
