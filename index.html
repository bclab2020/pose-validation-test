<html lang="ja">
<head>

    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; overflow: hidden; }
        
        .view-port { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 1; display: flex; align-items: center; justify-content: center; background: #050505; }
        canvas { width: 100%; height: 100%; object-fit: contain; touch-action: none; -webkit-user-select: none; user-select: none; }

        .ui-top-btn:hover { background: rgba(0, 191, 255, 0.3); }

        .controls { background: rgba(20, 22, 26, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.8); box-sizing: border-box; align-items: center; }
        
        button, select, input { padding: 8px 12px; font-size: 14px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; outline: none; }
        .mode-dropdown { background: #333; color: #deff9a; border: 1px solid #555; padding: 8px; font-size: 14px; }
        .mode-dropdown optgroup { color: #aaa; background: #222; }
        #durationSelect { background: #1976d2; color: #fff; border: 1px solid #0d47a1; }
        #startBtn { background: #1976d2; color: white; }
        #startBtn:disabled { background: #555; cursor: not-allowed; }
        #recBtn { background: #d32f2f; color: white; min-width: 150px; font-size: 15px; box-shadow: 0 0 10px rgba(211,47,47,0.5); }

        .toggle-label { color: #00bfff; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 6px; border: 1px solid #00bfff; }
        .input-group { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 6px; border: 1px solid #555; }
        .input-group input[type="number"] { width: 55px; background: transparent; color: #00bfff; text-align: right; border: none; font-weight: bold; border-bottom: 1px solid #444; border-radius: 0; padding: 2px; }
        
        #calibrateMatBtn { background: #673ab7; color: white; }
        #calibrateMatBtn.active { background: #ffeb3b; color: black; box-shadow: 0 0 15px rgba(255,235,59,0.8); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .info-panel { position: absolute; top: 55px; left: 15px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px; color: #fff; font-size: 12px; z-index: 10; border-left: 3px solid #673ab7; pointer-events: none; }

        .timer-display { position: absolute; top: 15px; right: 15px; background: rgba(211, 47, 47, 0.9); color: white; padding: 8px 18px; font-size: 20px; font-weight: bold; border-radius: 6px; display: none; z-index: 100; pointer-events: none; }
        
        .radar-wrapper { position: absolute; top: 60px; right: 15px; width: 150px; height: 150px; z-index: 200; touch-action: none; cursor: grab; transition: transform 0.2s, opacity 0.2s; }
        .radar-wrapper.dragging { cursor: grabbing; transform: scale(1.1); opacity: 0.8; z-index: 999; box-shadow: 0 10px 25px rgba(0,0,0,0.8); border-radius: 50%; transition: none; }
        .radar-box { width: 150px; height: 150px; background: rgba(0, 0, 0, 0.85); border-radius: 50%; box-shadow: 0 0 15px rgba(255,82,82,0.5); border: 2px solid #ff5252; pointer-events: none; }
        .radar-title { position: absolute; top: -20px; left: 15px; font-size: 12px; background: rgba(0,0,0,0.8); padding: 3px 8px; border-radius: 4px; font-weight: bold; white-space: nowrap; pointer-events: none; color: #ff5252; border: 1px solid #ff5252; }

        #dpadPanel { position: absolute; top: 30px; right: 30px; background: rgba(15, 15, 15, 0.95); border: 2px solid #00bfff; border-radius: 16px; padding: 15px 25px; z-index: 1000; display: none; flex-direction: column; align-items: center; box-shadow: 0 5px 20px rgba(0, 191, 255, 0.3); }
        .dpad-header { color: #00bfff; font-size: 14px; font-weight: bold; margin-bottom: 12px; }
        .dpad-row { display: flex; justify-content: center; gap: 8px; margin: 4px 0; }
        .dpad-btn { width: 55px; height: 55px; border-radius: 12px; background: #2a2a2a; color: white; font-size: 24px; border: 1px solid #444; cursor: pointer; }
        .dpad-btn:active { background: #00bfff; color: black; }
        .dpad-step-btn { font-size: 14px; background: #1976d2; border: none; font-weight: bold; }
        .dpad-close { position: absolute; right: -10px; top: -10px; width: 32px; height: 32px; border-radius: 50%; background: #ff5252; color: white; border: none; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* 🌟 V69: 履歴管理パネル用スタイル */
        #historyPanel { position: absolute; top: 50px; right: 50px; background: rgba(20, 22, 26, 0.95); border: 2px solid #00bfff; border-radius: 16px; padding: 20px; z-index: 1500; display: none; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 350px; max-height: 80vh; backdrop-filter: blur(10px); }
        .history-header { color: #00bfff; font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .history-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .history-item { background: #2a2a2a; border-left: 4px solid #00bfff; padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .history-item:hover { background: #333; transform: translateX(2px); }
        .history-info { display: flex; flex-direction: column; gap: 3px; }
        .history-date { color: #aaa; font-size: 11px; }
        .history-mode { color: #fff; font-size: 14px; font-weight: bold; }
        .history-actions { display: flex; gap: 5px; }
        .history-action-btn { background: #444; color: white; border-radius: 4px; padding: 4px 8px; font-size: 12px; border: none; cursor: pointer; }
        .history-action-btn.del { background: #d32f2f; }
        .history-action-btn:hover { filter: brightness(1.2); }
        #closeHistoryBtn { background: transparent; border: none; color: #aaa; font-size: 20px; cursor: pointer; padding: 0; }
        #closeHistoryBtn:hover { color: white; }

        @media print { body { background: white; color: black; overflow: visible; } #uiFloatingLayer, #tiltPanel, #dpadPanel, #historyPanel { display: none !important; } .view-port { position: static; width: 100%; height: auto; display: block; } }
    </style>
</head>

                </optgroup>

                    <option value="dyn_overhead">🏋️ OHS [前面]</option><option value="dyn_overhead_side">🏋️ OHS [側面]</option><option value="dyn_single_r">🦵 片脚バランス [右軸]</option><option value="dyn_single_l">🦵 片脚バランス [左軸]</option><option value="dyn_flex_fwd">🙇 立位体前屈</option><option value="dyn_flex_bwd">🤸 立位体後屈</option><option value="dyn_shoulder_r">👐 肩複合可動性 [右上]</option><option value="dyn_shoulder_l">👐 肩複合可動性 [左上]</option>

<canvas id="canvasCombined" style="display:none;"></canvas>
<video id="video" autoplay playsinline muted></video>
<video id="playbackVideo" playsinline muted style="display:none;"></video>

<script>
    // 🌟 V69: IndexedDB データベースマネージャー
    const dbManager = {
        dbName: "ConnectAIDB",
        storeName: "sessions",
        db: null,
        init: function() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(this.dbName, 1);
                request.onupgradeneeded = function(event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(dbManager.storeName)) {
                        db.createObjectStore(dbManager.storeName, { keyPath: "id" });
                    }
                };
                request.onsuccess = function(event) { dbManager.db = event.target.result; resolve(); };
                request.onerror = function(event) { reject("IndexedDB error: " + event.target.errorCode); };
            });
        },
        saveSession: function(sessionData) {
            return new Promise((resolve, reject) => {
                if (!this.db) { reject("DB not initialized"); return; }
                const transaction = this.db.transaction([this.storeName], "readwrite");
                const store = transaction.objectStore(this.storeName);
                const request = store.put(sessionData);
                request.onsuccess = function() { resolve(); };
                request.onerror = function(e) { reject("Error saving session"); };
            });
        },
        getAllSessions: function() {
            return new Promise((resolve, reject) => {
                if (!this.db) { reject("DB not initialized"); return; }
                const transaction = this.db.transaction([this.storeName], "readonly");
                const store = transaction.objectStore(this.storeName);
                const request = store.getAll();
                request.onsuccess = function(event) {
                    // 日付の降順（新しい順）にソート
                    const results = event.target.result.sort((a, b) => b.timestamp - a.timestamp);
                    resolve(results);
                };
                request.onerror = function(e) { reject("Error fetching sessions"); };
            });
        },
        deleteSession: function(id) {
            return new Promise((resolve, reject) => {
                if (!this.db) { reject("DB not initialized"); return; }
                const transaction = this.db.transaction([this.storeName], "readwrite");
                const store = transaction.objectStore(this.storeName);
                const request = store.delete(id);
                request.onsuccess = function() { resolve(); };
                request.onerror = function(e) { reject("Error deleting session"); };
            });
        }
    };

    // 🌟 V69: 履歴UIの制御
    const historyPanel = document.getElementById('historyPanel');
    const historyListContainer = document.getElementById('historyListContainer');
    const showHistoryBtn = document.getElementById('showHistoryBtn');
    const closeHistoryBtn = document.getElementById('closeHistoryBtn');

    showHistoryBtn.onclick = async function() {
        if(historyPanel.style.display === 'flex') {
            historyPanel.style.display = 'none';
        } else {
            await refreshHistoryList();
            historyPanel.style.display = 'flex';
        }
    };
    closeHistoryBtn.onclick = function() { historyPanel.style.display = 'none'; };

    const MODE_NAMES = { 'front': '🧍 前面', 'back': '🧍 後面', 'l_side': '🧍 左側面', 'r_side': '🧍 右側面', 'dyn_overhead': '🏋️ OHS [前面]', 'dyn_overhead_side': '🏋️ OHS [側面]', 'dyn_single_r': '🦵 片脚 [右]', 'dyn_single_l': '🦵 片脚 [左]', 'dyn_flex_fwd': '🙇 立位前屈', 'dyn_flex_bwd': '🤸 立位後屈', 'dyn_shoulder_r': '👐 肩複合 [右上]', 'dyn_shoulder_l': '👐 肩複合 [左上]' };

    async function refreshHistoryList() {
        historyListContainer.innerHTML = '<div style="color:#aaa; text-align:center; margin-top:20px;">読込中...</div>';
        try {
            const sessions = await dbManager.getAllSessions();
            historyListContainer.innerHTML = '';
            if(sessions.length === 0) {
                historyListContainer.innerHTML = '<div style="color:#aaa; text-align:center; margin-top:20px;">保存データがありません。</div>';
                return;
            }
            sessions.forEach(session => {
                const date = new Date(session.timestamp);
                const dateStr = `${date.getFullYear()}/${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getDate().toString().padStart(2,'0')} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                const modeName = MODE_NAMES[session.mode] || session.mode;

                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div class="history-info" onclick="loadSession('${session.id}')">
                        <span class="history-mode">${modeName}</span>
                        <span class="history-date">${dateStr}</span>
                    </div>
                    <div class="history-actions">
                        <button class="history-action-btn" onclick="exportSessionVid('${session.id}')">📼 MP4</button>
                        <button class="history-action-btn del" onclick="deleteSessionFromList('${session.id}')">削除</button>
                    </div>
                `;
                historyListContainer.appendChild(item);
            });
        } catch(e) {
            console.error(e);
            historyListContainer.innerHTML = '<div style="color:#ff5252; text-align:center; margin-top:20px;">エラーが発生しました。</div>';
        }
    }

    async function deleteSessionFromList(id) {
        if(confirm("このデータを削除しますか？")) {
            await dbManager.deleteSession(id);
            refreshHistoryList();
        }
    }

    async function exportSessionVid(id) {
        try {
            const sessions = await dbManager.getAllSessions();
            const session = sessions.find(s => s.id === id);
            if(session && session.videoBlob) {
                const url = URL.createObjectURL(session.videoBlob);
                const a = document.createElement('a'); a.href = url; a.download = `connect_ai_${session.mode}_${session.timestamp}.webm`; a.click();
            } else { alert("動画データが見つかりません。"); }
        } catch(e) { console.error(e); }
    }

    async function loadSession(id) {
        try {
            const sessions = await dbManager.getAllSessions();
            const session = sessions.find(s => s.id === id);
            if(session) {
                // UIとモードの切り替え
                document.getElementById('modeSelect').value = session.mode;
                currentTab = session.mode;
                
                // データの復元
                poseDataLog = session.poseData;
                playbackDataMP = poseDataLog;
                
                if(session.videoBlob) {
                    const videoUrl = URL.createObjectURL(session.videoBlob);
                    playbackVideo.src = videoUrl;
                    
                    // プレイバックモードへ移行
                    historyPanel.style.display = 'none';
                    if (playbackDataMP.length > 1) { playbackBaseTime = playbackDataMP[0].time; playbackTotalDuration = playbackDataMP[playbackDataMP.length - 1].time - playbackBaseTime; } else { playbackBaseTime = 0; playbackTotalDuration = 0; }
                    const maxFrames = playbackDataMP.length - 1; 
                    document.getElementById('timelineSlider').max = maxFrames > 0 ? maxFrames : 0; 
                    document.getElementById('timelineSlider').value = 0; 
                    
                    appMode = 'playback'; 
                    document.getElementById('mainControls').style.display = 'none'; 
                    document.getElementById('playbackControls').style.display = 'flex';
                    
                    // 再生準備完了を待つ
                    playbackVideo.oncanplay = () => {
                        playbackVideo.pause(); playbackVideo.currentTime = 0; 
                        renderPlaybackFrame(0); 
                        togglePlay(true);
                        playbackVideo.oncanplay = null; // リスナー解除
                    };
                }
            }
        } catch(e) { console.error("Load session error", e); alert("データの読み込みに失敗しました。"); }
    }


    const video = document.getElementById('video'), playbackVideo = document.getElementById('playbackVideo'); 
    const canvasMP = document.getElementById('canvasMP'), ctxMP = canvasMP.getContext('2d');
    const canvasComb = document.getElementById('canvasCombined'), ctxComb = canvasComb.getContext('2d');
    const radarWrapperMP = document.getElementById('radarWrapperMP'), canvasRadarMP = document.getElementById('canvasRadarMP'), ctxRadarMP = canvasRadarMP.getContext('2d');
    const startBtn = document.getElementById('startBtn'), recBtn = document.getElementById('recBtn'), durationSelect = document.getElementById('durationSelect'), timerDisplay = document.getElementById('timerDisplay'), downloadCsvBtn = document.getElementById('downloadCsvBtn'), showSwayAlertCheckbox = document.getElementById('showSwayAlert'), videoSource = document.getElementById('videoSource');
    const heightInput = document.getElementById('patientHeight'), footSizeInput = document.getElementById('footSize'), calibrateMatBtn = document.getElementById('calibrateMatBtn'), infoPanel = document.getElementById('infoPanel'), tiltPanel = document.getElementById('tiltPanel'), pelvicTiltSlider = document.getElementById('pelvicTiltSlider'), tiltValDisplay = document.getElementById('tiltValDisplay');
    
    const toggleUiBtn = document.getElementById('toggleUiBtn');
    const controlsBox = document.getElementById('controlsBox');
    toggleUiBtn.onclick = function() {
        if (controlsBox.style.display === 'none') { controlsBox.style.display = 'flex'; toggleUiBtn.innerText = '🔽 UIを隠す'; } 
        else { controlsBox.style.display = 'none'; toggleUiBtn.innerText = '🔼 UIを表示'; }
    };

    function generateVirtualASIS(kps) {
        if(!kps) return kps;
        let height = parseFloat(heightInput.value) || 170, distanceCm = height * 0.085, ratio = pxToCmRatio || 0.15, distancePx = distanceCm / ratio;
        let angleRad = (45 - estimatedPelvicTilt) * (Math.PI / 180), upwardOffsetPx = distancePx * Math.sin(angleRad), forwardOffsetPx = distancePx * Math.cos(angleRad);
        let lHip = kps.find(k=>k.name==='left_hip'||k.name==='23'), rHip = kps.find(k=>k.name==='right_hip'||k.name==='24');
        if (lHip && rHip && lHip.score > 0.5 && rHip.score > 0.5) {
            let asisL = { x: lHip.x, y: lHip.y - upwardOffsetPx, score: 1.0, name: 'virtual_asis_l' }, asisR = { x: rHip.x, y: rHip.y - upwardOffsetPx, score: 1.0, name: 'virtual_asis_r' };
            if (currentTab === 'r_side') { asisL.x += forwardOffsetPx; asisR.x += forwardOffsetPx; } else if (currentTab === 'l_side') { asisL.x -= forwardOffsetPx; asisR.x -= forwardOffsetPx; }
            let newKps = JSON.parse(JSON.stringify(kps)); newKps.push(asisL); newKps.push(asisR); return newKps;
        } return kps;
    }

    function calculateWeightBearing(ctx, kps) {
        if (currentTab !== 'front' && currentTab !== 'back' && currentTab !== 'dyn_overhead') return;
        let lAnkle = kps[27], rAnkle = kps[28]; if (!lAnkle || !rAnkle || lAnkle.score < 0.3 || rAnkle.score < 0.3) return;
        let nose = kps[0], lSh = kps[11], rSh = kps[12], lHip = kps[23], rHip = kps[24];
        let comX = (nose.x * 0.10) + (((lSh.x + rSh.x) / 2) * 0.50) + (((lHip.x + rHip.x) / 2) * 0.40);
        let dPx = rAnkle.x - lAnkle.x; if (Math.abs(dPx) < 10) return;
        let pctR = ((comX - lAnkle.x) / dPx) * 100, pctL = 100 - pctR;
        if(pctR < 0) { pctR = 0; pctL = 100; } if(pctR > 100) { pctR = 100; pctL = 0; }

        ctx.save(); ctx.font = "bold 16px sans-serif"; ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(canvasMP.width/2 - 120, canvasMP.height - 180, 240, 35);
        ctx.fillStyle = Math.abs(pctL - 50) > 8 ? "#ff5252" : "#39ff14"; ctx.textAlign = "center";
        ctx.fillText(`荷重比率 左: ${pctL.toFixed(1)}% | 右: ${pctR.toFixed(1)}%`, canvasMP.width/2, canvasMP.height - 158);
        ctx.fillStyle = "#ffeb3b"; ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(comX, (lAnkle.y + rAnkle.y)/2 - 10, 8, 0, 2*Math.PI); ctx.fill(); ctx.stroke(); ctx.restore();
    }

    function drawKendallAlignment(ctx, kps) {
        if (currentTab !== 'l_side' && currentTab !== 'r_side') return;
        let isLeft = currentTab === 'l_side';
        let dir = isLeft ? -1 : 1; 

        let ear = isLeft ? kps[7] : kps[8];
        let sh = isLeft ? kps[11] : kps[12];
        let hip = isLeft ? kps[23] : kps[24];
        let ankle = isLeft ? kps[27] : kps[28];

        let targetAnkle = ankle && ankle.score > 0.1 ? ankle : null;
        if (!targetAnkle) {
            let heel = isLeft ? kps[29] : kps[30];
            if (heel && heel.score > 0.1) targetAnkle = heel;
        }
        
        if (!ear || !sh || !hip || !targetAnkle || ear.score < 0.1 || sh.score < 0.1 || hip.score < 0.1) return;

        let ratio = pxToCmRatio || 0.15;
        let footCm = parseFloat(footSizeInput.value) || 25;
        
        let plumbOffsetPx = (footCm * 0.15) / ratio;
        let plumbX = targetAnkle.x + (dir * plumbOffsetPx);

        ctx.save();
        ctx.strokeStyle = "rgba(57, 255, 20, 0.8)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(plumbX, 0); ctx.lineTo(plumbX, canvasMP.height); ctx.stroke();

        let c2 = { x: ear.x - (dir * (1.0 / ratio)), y: ear.y + (2.0 / ratio), name: "C2(頸椎)", d0: 1.5 };
        let th3 = { x: sh.x, y: sh.y, name: "Th3(胸椎)", d0: 1.0 };
        
        let tiltRad = estimatedPelvicTilt * (Math.PI / 180);
        let s2OffsetZ = 3.0 / ratio;
        let s2OffsetY = 2.0 / ratio;
        let s2X = hip.x - (dir * (s2OffsetZ * Math.cos(tiltRad) - s2OffsetY * Math.sin(tiltRad)));
        let s2Y = hip.y + (s2OffsetZ * Math.sin(tiltRad) + s2OffsetY * Math.cos(tiltRad));
        let s2 = { x: s2X, y: s2Y, name: "S2(仙骨)", d0: 1.0 };
        
        let lumbarDepth = (3.0 + (estimatedPelvicTilt * 0.1)) / ratio;
        let l3Y = s2.y - ((s2.y - sh.y) * 0.3);
        let l3X = s2.x + (dir * lumbarDepth);
        let l3 = { x: l3X, y: l3Y, name: "L3(腰椎)", d0: 2.0 };
        
        let th11Y = s2.y - ((s2.y - sh.y) * 0.6);
        let kyphosisDepth = (1.5 + (estimatedPelvicTilt * 0.05)) / ratio;
        let straightTh11X = l3.x + (th3.x - l3.x) * ((l3.y - th11Y) / (l3.y - th3.y));
        let th11X = straightTh11X - (dir * kyphosisDepth);
        let th11 = { x: th11X, y: th11Y, name: "Th11(胸腰)", d0: 1.0 };

        let pts = [c2, th3, th11, l3, s2];

        ctx.strokeStyle = "rgba(255, 145, 0, 1.0)"; 
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(c2.x, c2.y);
        ctx.bezierCurveTo(c2.x, th3.y, th3.x, c2.y, th3.x, th3.y);
        ctx.bezierCurveTo(th3.x, th11.y, th11.x, th3.y, th11.x, th11.y);
        ctx.bezierCurveTo(th11.x, l3.y, l3.x, th11.y, l3.x, l3.y);
        ctx.bezierCurveTo(l3.x, s2.y, s2.x, l3.y, s2.x, s2.y);
        ctx.stroke();

        ctx.font = "bold 13px sans-serif";
        pts.forEach(pt => {
            ctx.fillStyle = "#ff9100";
            ctx.beginPath(); ctx.arc(pt.x, pt.y, 6, 0, 2*Math.PI); ctx.fill();
            
            let devCm = (pt.x - plumbX) * ratio * dir;
            let stressPct = ((pt.d0 + Math.max(0, devCm)) / pt.d0) * 100;
            if (devCm < -pt.d0) stressPct = Math.abs((pt.d0 + devCm)/pt.d0) * 100;

            let color = Math.abs(devCm) <= 1.5 ? "#39ff14" : "#ff5252";
            let txt = `${pt.name} ${devCm > 0 ? "+" : ""}${devCm.toFixed(1)}cm (${stressPct.toFixed(0)}%)`;
            
            let tw = ctx.measureText(txt).width;
            let tx = pt.x + (dir === 1 ? -tw - 10 : 10);
            ctx.fillStyle = "rgba(0,0,0,0.85)";
            ctx.fillRect(tx - 5, pt.y - 12, tw + 10, 18);
            ctx.fillStyle = color;
            ctx.fillText(txt, tx, pt.y);

            ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.setLineDash([3, 3]);
            ctx.beginPath(); ctx.moveTo(pt.x, pt.y); ctx.lineTo(plumbX, pt.y); ctx.stroke(); ctx.setLineDash([]);
        });
        
        ctx.fillStyle = "#39ff14"; ctx.fillText("重力線 (Plumb Line)", plumbX + 10, 50);
        ctx.restore();
    }

    function updateRadar(kps, canvas) {

    function drawPlaybackRadar(dataArray, currentFrameIdx, canvas) {
        clearRadar(ctxRadarMP, "#ff5252"); let history = [], baseHDist = null;
        for (let i = 0; i <= currentFrameIdx; i++) {
            const frameData = dataArray[i]; if (!frameData) continue; const kps = frameData.keypoints, nose = kps.find(k => k.name === 'nose');

            if (nose) {

                if (currentTab.includes("side") || currentTab.includes("overhead_side")) { const shoulder = kps.find(k => k.name === 'left_shoulder') || kps.find(k => k.name === 'right_shoulder'); if (shoulder) copX = nose.x - shoulder.x; }
                history.push({ x: copX, y: copY });

        if (history.length > 0) drawSpecificRadar(ctxRadarMP, history, "#ff5252");

    function drawSpecificRadar(ctx, history, color) {
        clearRadar(ctx, color); if (history.length < 2) return;
        ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
        history.forEach(function(pt, idx) { 
            let rX = 75 + (pt.x * 0.5), rY = 75 + (pt.y * 0.5), dist = Math.hypot(rX - 75, rY - 75);
            if (dist > 65) { rX = 75 + ((rX - 75) * 65 / dist); rY = 75 + ((rY - 75) * 65 / dist); }
            if (idx === 0) ctx.moveTo(rX, rY); else ctx.lineTo(rX, rY); 
        });
        ctx.stroke(); const lastPt = history[history.length - 1]; let lastRX = 75 + (lastPt.x * 0.5), lastRY = 75 + (lastPt.y * 0.5), lastDist = Math.hypot(lastRX - 75, lastRY - 75);
        if (lastDist > 65) { lastRX = 75 + ((lastRX - 75) * 65 / lastDist); lastRY = 75 + ((lastRY - 75) * 65 / lastDist); }
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(lastRX, lastRY, 4, 0, 2*Math.PI); ctx.fill(); ctx.restore();
    }

    function clearRadar(ctx, color) {

        ctx.beginPath(); ctx.moveTo(75, 10); ctx.lineTo(75, 140); ctx.moveTo(10, 75); ctx.lineTo(140, 75); ctx.stroke(); 
    }

    function drawSkeleton(ctx, kps, color) {
        ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 4;
        
        let pairs = [];
        let drawIndices = [];

        if (currentTab === 'l_side') {
            pairs = [[11,13],[13,15],[23,25],[25,27],[11,23]];
            drawIndices = [0,1,2,3,7,11,13,15,23,25,27,29,31];
        } else if (currentTab === 'r_side') {
            pairs = [[12,14],[14,16],[24,26],[26,28],[12,24]];
            drawIndices = [0,4,5,6,8,12,14,16,24,26,28,30,32];
        } else if (currentTab === 'dyn_overhead_side') {
            let isFacingRight = kps[12] && kps[11] && kps[12].score >= kps[11].score;
            if (isFacingRight) {
                pairs = [[12,14],[14,16],[24,26],[26,28],[12,24]];
                drawIndices = [0,4,5,6,8,12,14,16,24,26,28,30,32];
            } else {
                pairs = [[11,13],[13,15],[23,25],[25,27],[11,23]];
                drawIndices = [0,1,2,3,7,11,13,15,23,25,27,29,31];
            }
        } else {
            pairs = [[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],[23,25],[25,27],[24,26],[26,28]];
            drawIndices = Array.from({length: 33}, (_, i) => i);
        }

        pairs.forEach(function([s,e]){ 
            const p1 = kps[s], p2 = kps[e]; 
            if(p1 && p2 && p1.score > 0.1 && p2.score > 0.1){ 
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); 
            }
        });
        
        kps.forEach(function(k, i){ 
            if(k && k.score > 0.1 && !k.name?.includes('virtual')){ 
                if (drawIndices.includes(i)) { 
                    ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(k.x, k.y, 4, 0, 2*Math.PI); ctx.fill(); 
                } 
            }
        }); 

        let asisL = kps.find(k=>k.name==='virtual_asis_l'), asisR = kps.find(k=>k.name==='virtual_asis_r');
        let lHip = kps.find(k=>k.name==='left_hip'||k.name==='23'), rHip = kps.find(k=>k.name==='right_hip'||k.name==='24');
        
        if (currentTab !== 'r_side' && currentTab !== 'dyn_overhead_side') {
            if(asisL && lHip) { 
                ctx.strokeStyle="#39ff14"; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(lHip.x, lHip.y); ctx.lineTo(asisL.x, asisL.y); ctx.stroke(); 
                ctx.fillStyle="#39ff14"; ctx.beginPath(); ctx.arc(asisL.x, asisL.y, 8, 0, 2*Math.PI); ctx.fill(); 
            }
        }
        if (currentTab !== 'l_side' && currentTab !== 'dyn_overhead_side') {
            if(asisR && rHip) { 
                ctx.strokeStyle="#39ff14"; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(rHip.x, rHip.y); ctx.lineTo(asisR.x, asisR.y); ctx.stroke(); 
                ctx.fillStyle="#39ff14"; ctx.beginPath(); ctx.arc(asisR.x, asisR.y, 8, 0, 2*Math.PI); ctx.fill(); 
            }
        }
        
        if((currentTab === 'front' || currentTab === 'back') && asisL && asisR) {
            ctx.strokeStyle="rgba(57, 255, 20, 0.5)"; ctx.setLineDash([]); ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(asisL.x, asisL.y); ctx.lineTo(asisR.x, asisR.y); ctx.stroke();
            if(pxToCmRatio) { let diffCm = Math.abs(asisL.y - asisR.y) * pxToCmRatio; ctx.fillStyle="#39ff14"; ctx.font="bold 16px sans-serif"; ctx.fillText("骨盤左右高低差: " + diffCm.toFixed(1) + "cm", Math.min(asisL.x, asisR.x), Math.min(asisL.y, asisR.y) - 20); }
        } 
        ctx.restore();
    }

    function drawCrosshair(ctx, kp, canvas) {
        if(!kp) return; ctx.save(); ctx.strokeStyle = "rgba(0, 191, 255, 0.7)"; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(0, kp.y); ctx.lineTo(canvas.width, kp.y); ctx.moveTo(kp.x, 0); ctx.lineTo(kp.x, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.arc(kp.x, kp.y, 14, 0, 2*Math.PI); ctx.strokeStyle = "#00bfff"; ctx.lineWidth = 3; ctx.setLineDash([]); ctx.stroke();
        ctx.fillStyle = "rgba(0, 191, 255, 0.3)"; ctx.fill(); ctx.restore();
    }

    function runReviewLogic(ctx, getK, canvas) {
        const nose = getK('nose'); let originX, originY;
        if (currentTab === "front" || currentTab === "back" || currentTab === "dyn_overhead" || currentTab.startsWith("dyn_single")) {
            if (window.customOriginMarkers[currentTab]) { originX = window.customOriginMarkers[currentTab].x; originY = window.customOriginMarkers[currentTab].y; } else {
                let footPtsX = [], footPtsY = []; ['left_ankle', 'right_ankle', 'left_heel', 'right_heel', 'left_foot_index', 'right_foot_index'].forEach(function(name) { let p = getK(name); if (p && p.score > 0.1) { footPtsX.push(p.x); footPtsY.push(p.y); } });
                if (footPtsX.length >= 2) { originX = (Math.min(...footPtsX) + Math.max(...footPtsX)) / 2; originY = Math.max(...footPtsY); }
            }
        }
        if (originX !== undefined && originY !== undefined) {
            window.currentAnchorPos = { x: originX, y: originY };
            let anchorColor = window.anchorStatus === "dragging" ? "rgba(255, 165, 0, 0.8)" : "rgba(0, 191, 255, 0.8)";
            ctx.save(); ctx.fillStyle = anchorColor; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(originX, originY, 20, 0, 2*Math.PI); ctx.fill(); ctx.stroke(); 
            if (showSwayAlertCheckbox.checked) {
                ctx.strokeStyle = anchorColor; ctx.lineWidth = 3; ctx.setLineDash([6, 6]); ctx.beginPath(); ctx.moveTo(originX, originY); ctx.lineTo(originX, 0); ctx.stroke(); 
                let sway = nose ? (nose.x - originX) : 0; let corridorColor = Math.abs(sway) > 30 ? "rgba(255, 0, 0, 0.15)" : "rgba(0, 255, 0, 0.1)";
                ctx.fillStyle = corridorColor; ctx.fillRect(originX - 30, 0, 60, originY);
            } ctx.restore();
        }
    }

    recBtn.onclick = function() {
        controlsBox.style.display = 'none';
        toggleUiBtn.innerText = '🔼 UIを表示';
        
        isPausedForEdit = false; staticBackgroundData = null; isRecording = true; closeDpad(); coordinateBufferMP = []; poseDataLog = poseDataLog.filter(d => d.mode !== currentTab);
        recordingDuration = parseInt(durationSelect.value); recordingStartTime = Date.now(); swayHistoryMP = []; 
        timerDisplay.style.display = "block"; recBtn.disabled = true; downloadCsvBtn.disabled = true; recordedChunks = [];
        try { 
            const stream = canvasComb.captureStream(30); recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' }); 
            recorder.ondataavailable = function(e) { if (e.data.size > 0) recordedChunks.push(e.data); }; 
            recorder.onstop = async function() { 
                const b = new Blob(recordedChunks, { type: 'video/webm' }); 
                // 🌟 V69: 録画終了時に IndexedDB へ自動保存
                const sessionData = {
                    id: 'session_' + Date.now(),
                    timestamp: Date.now(),
                    mode: currentTab,
                    videoBlob: b,
                    poseData: JSON.parse(JSON.stringify(poseDataLog))
                };
                try {
                    await dbManager.saveSession(sessionData);
                    console.log("Session Auto-Saved to IndexedDB");
                    // 履歴リストを開いている場合は更新
                    if(historyPanel.style.display === 'flex') refreshHistoryList();
                } catch(err) { console.error("Auto-save failed", err); }

                const videoUrl = URL.createObjectURL(b); playbackVideo.src = videoUrl;
            }; recorder.start(); 
        } catch (e) { console.error(e); }
        const timerInterval = setInterval(function() {
            const elapsed = Date.now() - recordingStartTime; timerDisplay.innerText = "REC " + Math.max(0, (recordingDuration - elapsed) / 1000).toFixed(1) + "s";
            if (elapsed >= recordingDuration) { clearInterval(timerInterval); executePostProcessingStop(); }
        }, 100);
    };

    function executePostProcessingStop() {
        controlsBox.style.display = 'flex';
        toggleUiBtn.innerText = '🔽 UIを隠す';
        
        isRecording = false; timerDisplay.style.display = "none"; if (recorder && recorder.state !== "inactive") recorder.stop(); 
        if (currentTab.startsWith("dyn_")) { enterPlaybackMode(); } 
        else {
            isPausedForEdit = true; const bgCanvas = document.createElement('canvas'); bgCanvas.width = canvasMP.width; bgCanvas.height = canvasMP.height;
            bgCanvas.getContext('2d').drawImage(video, 0, 0, canvasMP.width, canvasMP.height); staticBackgroundData = bgCanvas;
            if (coordinateBufferMP.length > 0) {
                const totalFrames = coordinateBufferMP.length; let avgKeypoints = JSON.parse(JSON.stringify(coordinateBufferMP[0]));
                avgKeypoints.forEach(function(kp, kpIdx) { let sumX = 0, sumY = 0; for (let f = 0; f < totalFrames; f++) { if(coordinateBufferMP[f][kpIdx]) { sumX += coordinateBufferMP[f][kpIdx].x; sumY += coordinateBufferMP[f][kpIdx].y; } } kp.x = sumX / totalFrames; kp.y = sumY / totalFrames; kp.score = 1.00; });
                window.reportDataStore[currentTab] = avgKeypoints;
            } recBtn.disabled = false; downloadCsvBtn.disabled = false; refreshReportView(); 
        }
    }

    function enterPlaybackMode() {
        appMode = 'playback'; document.getElementById('mainControls').style.display = 'none'; document.getElementById('playbackControls').style.display = 'flex';
        playbackDataMP = poseDataLog.filter(d => d.mode === currentTab);
        if (playbackDataMP.length > 1) { playbackBaseTime = playbackDataMP[0].time; playbackTotalDuration = playbackDataMP[playbackDataMP.length - 1].time - playbackBaseTime; } else { playbackBaseTime = 0; playbackTotalDuration = 0; }
        const maxFrames = playbackDataMP.length - 1; document.getElementById('timelineSlider').max = maxFrames > 0 ? maxFrames : 0; document.getElementById('timelineSlider').value = 0; document.getElementById('frameCounter').innerText = "0 / " + document.getElementById('timelineSlider').max;
        playbackVideo.pause(); playbackVideo.currentTime = 0; renderPlaybackFrame(0); togglePlay(true);
    }
    
    function exitPlaybackMode() { appMode = 'camera'; togglePlay(false); document.getElementById('playbackControls').style.display = 'none'; document.getElementById('mainControls').style.display = 'flex'; isPausedForEdit = false; closeDpad(); isEditingPlaybackFrame=false; document.getElementById('editFrameBtn').innerText = "✂️ このフレームを微調整"; document.getElementById('editFrameBtn').style.background = "#ff9100"; }
    
    function togglePlay(forcePlay) {
        if(isEditingPlaybackFrame && forcePlay !== false) return; 
        if (forcePlay === true || !isPlaying) {
            isPlaying = true; document.getElementById('playPauseBtn').innerText = "⏸ 停止";
            if (playbackDataMP.length > 1) { let currentIdx = parseInt(document.getElementById('timelineSlider').value); if(currentIdx >= playbackDataMP.length) currentIdx = 0; playbackStartTime = Date.now() - (playbackDataMP[currentIdx].time - playbackBaseTime); playbackVideo.currentTime = (playbackDataMP[currentIdx].time - playbackBaseTime) / 1000.0; } else { playbackStartTime = Date.now(); }
            playbackVideo.play(); playbackLoop();
        } else { isPlaying = false; document.getElementById('playPauseBtn').innerText = "▶ 再生"; playbackVideo.pause(); cancelAnimationFrame(playbackRafId); }
    }
    
    function playbackLoop() {
        if (!isPlaying) return; let now = Date.now(), elapsed = now - playbackStartTime; if (elapsed > playbackTotalDuration) { playbackStartTime = now; elapsed = 0; }
        let targetTime = playbackBaseTime + elapsed, targetIdx = playbackDataMP.length - 1;
        for (let i = 0; i < playbackDataMP.length; i++) { if (playbackDataMP[i].time >= targetTime) { targetIdx = i; break; } }
        document.getElementById('timelineSlider').value = targetIdx; renderPlaybackFrame(targetIdx); playbackRafId = requestAnimationFrame(playbackLoop);
    }

    document.getElementById('playPauseBtn').onclick = function() { togglePlay(); }; document.getElementById('backToCamBtn').onclick = function() { exitPlaybackMode(); };
    document.getElementById('timelineSlider').oninput = function() { togglePlay(false); const fIdx = parseInt(document.getElementById('timelineSlider').value); if (playbackDataMP[fIdx]) { playbackVideo.currentTime = (playbackDataMP[fIdx].time - playbackBaseTime) / 1000.0; } renderPlaybackFrame(fIdx); };
    playbackVideo.addEventListener('seeked', function() { if (!isPlaying && appMode === 'playback') { renderPlaybackFrame(parseInt(document.getElementById('timelineSlider').value)); } });

    function renderPlaybackFrame(frameIdx) {
        document.getElementById('frameCounter').innerText = frameIdx + " / " + document.getElementById('timelineSlider').max; const w = canvasMP.width, h = canvasMP.height;
        ctxMP.clearRect(0, 0, w, h); if (playbackVideo.readyState >= 2) { ctxMP.drawImage(playbackVideo, 0, 0, w, h); } else { ctxMP.fillStyle = "#111"; ctxMP.fillRect(0, 0, w, h); }
        drawCenterGrid(ctxMP, canvasMP);
        if (playbackDataMP[frameIdx]) {
            const actualKps = playbackDataMP[frameIdx].keypoints; drawSkeleton(ctxMP, actualKps, '#ffffff'); 
            drawKendallAlignment(ctxMP, actualKps); calculateWeightBearing(ctxMP, actualKps); 
            runReviewLogic(ctxMP, (n) => actualKps.find(k => k.name === n), canvasMP);
            if (selectedJointIndex !== null && isEditingPlaybackFrame) { drawCrosshair(ctxMP, actualKps[selectedJointIndex], canvasMP); }
            drawPlaybackRadar(playbackDataMP, frameIdx, canvasMP);
        } ctxComb.drawImage(canvasMP, 0, 0, w, h);
    }

    function getEventPos(canvas, e) {
        const rect = canvas.getBoundingClientRect(); let clientX, clientY;
        if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; } else if (e.changedTouches && e.changedTouches.length > 0) { clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY; } else { clientX = e.clientX; clientY = e.clientY; }
        if (clientX === undefined) return null;
        const videoRatio = canvas.width / canvas.height, containerRatio = rect.width / rect.height; let renderWidth, renderHeight, offsetX, offsetY;
        if (containerRatio > videoRatio) { renderHeight = rect.height; renderWidth = rect.height * videoRatio; offsetX = (rect.width - renderWidth) / 2; offsetY = 0; } else { renderWidth = rect.width; renderHeight = rect.width / videoRatio; offsetX = 0; offsetY = (rect.height - renderHeight) / 2; }
        const scaleX = canvas.width / renderWidth, scaleY = canvas.height / renderHeight; return { x: (clientX - rect.left - offsetX) * scaleX, y: (clientY - rect.top - offsetY) * scaleY, renderScale: scaleX };
    }

    canvasMP.addEventListener('pointerdown', function(e) {
        const pos = getEventPos(canvasMP, e); if (!pos) return;
        if (calibState !== "idle") {
            if (calibState === "wait_left" || calibState === "adjust_left") { calibrationPoints[0] = pos; calibState = "adjust_left"; calibrateMatBtn.innerText = "✅ 左端を確定"; document.getElementById('dpadPanel').style.display = 'flex'; } 
            else if (calibState === "wait_right" || calibState === "adjust_right") { calibrationPoints[1] = pos; calibState = "adjust_right"; calibrateMatBtn.innerText = "✅ 右端を確定"; document.getElementById('dpadPanel').style.display = 'flex'; }
            if (isPausedForEdit) refreshReportView(); return; 
        }
        const hitRadius = 80 * pos.renderScale; 
        if ((currentTab === "front" || currentTab === "back" || currentTab === "dyn_overhead" || currentTab.startsWith("dyn_single")) && window.currentAnchorPos && !isRecording && appMode !== 'playback') {
            if (Math.hypot(window.currentAnchorPos.x - pos.x, window.currentAnchorPos.y - pos.y) < hitRadius * 1.5) { dragTarget = { type: 'anchor' }; window.anchorStatus = "dragging"; closeDpad(); return; }
        }
        let kpsToSearch = null; if (appMode === 'playback' && isEditingPlaybackFrame) { const fIdx = parseInt(document.getElementById('timelineSlider').value); if (playbackDataMP[fIdx]) kpsToSearch = playbackDataMP[fIdx].keypoints; } else if (isPausedForEdit && appMode !== 'playback') { kpsToSearch = window.reportDataStore[currentTab]; }
        if (kpsToSearch) {
            let closestIdx = -1, minDist = hitRadius; kpsToSearch.forEach(function(kp, idx) { if (kp && kp.score > 0.0) { const dist = Math.hypot(kp.x - pos.x, kp.y - pos.y); if (dist < minDist) { minDist = dist; closestIdx = idx; } } });
            if (closestIdx !== -1) { selectedJointIndex = closestIdx; document.getElementById('dpadPanel').style.display = 'flex'; } else { closeDpad(); }
            if (appMode === 'playback') renderPlaybackFrame(parseInt(document.getElementById('timelineSlider').value)); else refreshReportView();
        }
    });

    canvasMP.addEventListener('pointermove', function(e) { if (dragTarget && dragTarget.type === 'anchor') { if(e.cancelable) e.preventDefault(); const pos = getEventPos(canvasMP, e); if (!pos) return; const safeX = Math.max(0, Math.min(pos.x, canvasMP.width)), safeY = Math.max(0, Math.min(pos.y, canvasMP.height)); window.customOriginMarkers[currentTab] = { x: safeX, y: safeY }; window.currentAnchorPos = { x: safeX, y: safeY }; if (isPausedForEdit) refreshReportView(); } });
    const handleEnd = function() { if (dragTarget && dragTarget.type === 'anchor') { window.anchorStatus = "locked"; dragTarget = null; canvasMP.style.cursor = 'default'; } };
    canvasMP.addEventListener('pointerup', handleEnd); canvasMP.addEventListener('pointercancel', handleEnd);

    function refreshReportView() {
        if(appMode === 'playback') return; const w = video.videoWidth, h = video.videoHeight;
        if (isPausedForEdit && staticBackgroundData) { ctxMP.drawImage(staticBackgroundData, 0, 0, w, h); } else { ctxMP.drawImage(video, 0, 0, w, h); }
        drawCenterGrid(ctxMP, canvasMP);

        if (calibState !== "idle") {
            ctxMP.fillStyle = "#ffeb3b";
            if (calibrationPoints[0]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[0].x, calibrationPoints[0].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_left") drawCrosshair(ctxMP, calibrationPoints[0], canvasMP); }
            if (calibrationPoints[1]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[1].x, calibrationPoints[1].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_right") drawCrosshair(ctxMP, calibrationPoints[1], canvasMP); }
        }

        if (window.reportDataStore[currentTab]) {
            const kps = window.reportDataStore[currentTab]; drawSkeleton(ctxMP, kps, '#ff5252'); 
            drawKendallAlignment(ctxMP, kps); calculateWeightBearing(ctxMP, kps); 
            runReviewLogic(ctxMP, (n) => kps.find(k => k.name === n), canvasMP);
            if (selectedJointIndex !== null) drawCrosshair(ctxMP, kps[selectedJointIndex], canvasMP); 
        } ctxComb.drawImage(canvasMP, 0, 0, w, h);
    }

    window.addEventListener('load', init); 
    startBtn.onclick = async function() {
        if (mainRenderId) { cancelAnimationFrame(mainRenderId); mainRenderId = null; }
        if(currentStream) { currentStream.getTracks().forEach(t=>t.stop()); video.pause(); video.srcObject = null; }
        swayHistoryMP = []; window.currentAnchorPos = null; window.customOriginMarkers = {}; selectedJointIndex = null; clearRadar(ctxRadarMP, "#ff5252"); 
        try {
            const constraints = { video: { width: { ideal: 1920 }, height: { ideal: 1080 } } };
            if (videoSource.value) { constraints.video.deviceId = { exact: videoSource.value }; } else { constraints.video.facingMode = "environment"; }
            currentStream = await navigator.mediaDevices.getUserMedia(constraints); video.srcObject = currentStream;
            video.onloadeddata = function() { canvasMP.width=video.videoWidth; canvasMP.height=video.videoHeight; canvasComb.width=video.videoWidth; canvasComb.height=video.videoHeight; isPausedForEdit = false; staticBackgroundData = null; isRunning=true; video.play(); render(); recBtn.disabled=false; };
        } catch(e){ alert("カメラの起動に失敗しました。"); }
    };

    async function render() {
        if (!isRunning || appMode === 'playback' || isPausedForEdit) { if(isRunning) mainRenderId = requestAnimationFrame(render); return; }
        if (video.readyState < 2) { mainRenderId = requestAnimationFrame(render); return; }
        const w = video.videoWidth, h = video.videoHeight; ctxMP.drawImage(video, 0, 0, w, h); drawCenterGrid(ctxMP, canvasMP);

        if (calibState !== "idle") {
            ctxMP.fillStyle = "#ffeb3b";
            if (calibrationPoints[0]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[0].x, calibrationPoints[0].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_left") drawCrosshair(ctxMP, calibrationPoints[0], canvasMP); }
            if (calibrationPoints[1]) { ctxMP.beginPath(); ctxMP.arc(calibrationPoints[1].x, calibrationPoints[1].y, 8, 0, 2*Math.PI); ctxMP.fill(); if(calibState==="adjust_right") drawCrosshair(ctxMP, calibrationPoints[1], canvasMP); }
        }
        const poses = await detectors[0].estimatePoses(video);
        if (poses.length > 0) {
            let kps = poses[0].keypoints; kps = generateVirtualASIS(kps); window.reportDataStore[currentTab] = kps;
            if (isRecording) { if (!coordinateBufferMP) coordinateBufferMP = []; coordinateBufferMP.push(kps); poseDataLog.push({ time: Date.now(), mode: currentTab, keypoints: JSON.parse(JSON.stringify(kps)) }); }
            drawSkeleton(ctxMP, kps, currentTab.startsWith('dyn_') ? '#ffffff' : '#ff5252'); 
            drawKendallAlignment(ctxMP, kps); calculateWeightBearing(ctxMP, kps); 
            runReviewLogic(ctxMP, (n) => { for(let i=0;i<kps.length;i++){ if(kps[i].name===n) return kps[i]; } return null; }, canvasMP); updateRadar(kps, canvasMP); 
        } ctxComb.drawImage(canvasMP, 0, 0, w, h); mainRenderId = requestAnimationFrame(render);
    }
    
    function prepareAndPrintReport() { window.print(); }
    downloadCsvBtn.onclick = function() { 
        let c="Timestamp,Mode,PointID,PointName,X,Y\n"; 
        poseDataLog.forEach(function(d){ d.keypoints.forEach(function(kp, idx){ if(kp) c+=d.time + "," + d.mode + "," + idx + "," + kp.name + "," + kp.x.toFixed(1) + "," + kp.y.toFixed(1) + "\n"; }); }); 
        const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([c],{type:'text/csv'})); a.download="connect_ai_data_" + Date.now() + ".csv"; a.click(); 
    };
</script>
