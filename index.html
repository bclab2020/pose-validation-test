<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿勢検証ツール Pro - 最終安定統合版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://unpkg.com/js-aruco@0.0.1/src/cv.js"></script>
    <script src="https://unpkg.com/js-aruco@0.0.1/src/aruco.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        .controls { padding: 10px; text-align: center; background: #333; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: center; }
        button, select { padding: 10px 14px; font-size: 14px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        #startCamBtn { background: #1976d2; color: white; min-width: 250px; }
        #resetEvalBtn { background: #f57c00; color: white; display: none; }
        .container { display: flex; width: 100vw; height: calc(100vh - 120px); }
        .view-port { flex: 1; position: relative; border-right: 1px solid #444; overflow: hidden; background: #000; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .status-badge { position: absolute; bottom: 10px; left: 10px; font-size: 12px; padding: 5px 12px; border-radius: 20px; z-index: 20; font-weight: bold; background: #555; }
        .active { background: #00c853; color: white; }
    </style>
</head>
<body>

<div class="controls">
    <button id="startCamBtn" disabled>システム初期化中...</button>
    <button id="resetEvalBtn">🔄 測定リセット</button>
    <select id="modeSelect">
        <option value="squat_side">スクワット側面 (モビリティ評価)</option>
        <option value="squat_front">スクワット正面 (ニーイン評価)</option>
        <option value="single_leg" selected>片足立ち正面 (重心レーダー)</option>
    </select>
    <button id="recordBtn" disabled>🔴 記録</button>
</div>

<div class="container">
    <div class="view-port">
        <canvas id="canvasMP"></canvas>
        <div id="badgeMP" class="status-badge">MediaPipe: 準備中</div>
    </div>
    <div class="view-port">
        <canvas id="canvasMN"></canvas>
        <div id="badgeMN" class="status-badge">MoveNet: 準備中</div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('video');
    const canvasMP = document.getElementById('canvasMP');
    const canvasMN = document.getElementById('canvasMN');
    const ctxMP = canvasMP.getContext('2d');
    const ctxMN = canvasMN.getContext('2d');
    const modeSelect = document.getElementById('modeSelect');
    const startCamBtn = document.getElementById('startCamBtn');
    
    let detectorMP, detectorMN, detectorAR;
    let isCameraRunning = false;
    let homographyMatrix = null;
    let markerCoords = { 0:null, 1:null, 2:null, 3:null };
    let calib = {};

    async function init() {
        try {
            startCamBtn.innerText = "⏳ ステップ 1/3: AI起動中...";
            await tf.setBackend('webgl');
            await tf.ready();

            startCamBtn.innerText = "⏳ ステップ 2/3: モデル読込中...";
            // 並列で読み込まず、一つずつ確実に
            detectorMP = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'lite' });
            detectorMN = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });

            startCamBtn.innerText = "⏳ ステップ 3/3: AR準備中...";
            if (typeof AR !== 'undefined') detectorAR = new AR.Detector();

            startCamBtn.innerText = "📷 カメラを開始";
            startCamBtn.disabled = false;
            resetEvaluation();
        } catch (e) {
            startCamBtn.innerText = "❌ 読込エラー。再読込してください";
            console.error(e);
        }
    }

    function resetEvaluation() {
        ['MediaPipe', 'MoveNet'].forEach(m => {
            calib[m] = { state: 'waiting', countdownStart: 0, frames: 0, baseHipX: null, baseHipY: null, swayHistory: [] };
        });
    }

    startCamBtn.addEventListener('click', async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'environment' } });
        video.srcObject = stream;
        video.onloadeddata = () => {
            canvasMP.width = canvasMN.width = video.videoWidth; 
            canvasMP.height = canvasMN.height = video.videoHeight;
            isCameraRunning = true;
            startCamBtn.style.display = 'none';
            document.getElementById('resetEvalBtn').style.display = 'inline-block';
            processFrame();
        };
    });

    function calculateAngle(A, B, C) {
        if (!A || !B || !C) return null;
        let deg = Math.abs((Math.atan2(C.y-B.y, C.x-B.x) - Math.atan2(A.y-B.y, A.x-B.x)) * 180 / Math.PI);
        return deg > 180 ? 360 - deg : deg;
    }

    function getAngleFromVertical(A, B) {
        if (!A || !B) return null;
        return Math.abs(Math.atan2(B.x - A.x, B.y - A.y) * 180 / Math.PI);
    }

    async function processFrame() {
        if (!isCameraRunning) return;
        ctxMP.drawImage(video, 0, 0, canvasMP.width, canvasMP.height);
        ctxMN.drawImage(video, 0, 0, canvasMN.width, canvasMN.height);

        if (detectorAR && !homographyMatrix && modeSelect.value === 'single_leg') {
            let markers = detectorAR.detect(ctxMP.getImageData(0,0,canvasMP.width, canvasMP.height));
            markers.forEach(m => {
                if (m.id >= 0 && m.id <= 3) {
                    let cx = 0, cy = 0; m.corners.forEach(c => { cx+=c.x; cy+=c.y; });
                    markerCoords[m.id] = { x: cx/4, y: cy/4 };
                    ctxMP.fillStyle = "#00ff00"; ctxMP.fillRect(cx/4-5, cy/4-5, 10, 10);
                }
            });
            if (markerCoords[0] && markerCoords[1] && markerCoords[2] && markerCoords[3]) computeH(markerCoords);
        }

        const posesMP = await detectorMP.estimatePoses(video);
        const posesMN = await detectorMN.estimatePoses(video);

        drawAndAnalyze(posesMP, ctxMP, 'red', 'MediaPipe', canvasMP, 'badgeMP');
        drawAndAnalyze(posesMN, ctxMN, 'cyan', 'MoveNet', canvasMN, 'badgeMN');

        requestAnimationFrame(processFrame);
    }

    function drawAndAnalyze(poses, ctx, color, modelName, canvasObj, badgeId) {
        const badge = document.getElementById(badgeId);
        if (poses.length === 0) {
            badge.innerText = `${modelName}: 認識なし`; badge.classList.remove('active');
            return;
        }
        badge.innerText = `${modelName}: 稼働中`; badge.classList.add('active');
        
        const kps = poses[0].keypoints;
        const getK = (n) => kps.find(k => k.name === n && k.score > 0.3);

        // 骨格描画（基本機能）
        ctx.strokeStyle = color; ctx.lineWidth = 2;
        [[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],[23,25],[25,27],[24,26],[26,28]].forEach(([s, e]) => {
            if (kps[s] && kps[e] && kps[s].score > 0.3 && kps[e].score > 0.3) {
                ctx.beginPath(); ctx.moveTo(kps[s].x, kps[s].y); ctx.lineTo(kps[e].x, kps[e].y); ctx.stroke();
            }
        });
        kps.forEach(k => { if(k.score > 0.3) { ctx.fillStyle = color; ctx.beginPath(); ctx.arc(k.x, k.y, 4, 0, 2*Math.PI); ctx.fill(); }});

        // モード別評価
        const mode = modeSelect.value;
        const rS = getK('right_shoulder'), rH = getK('right_hip'), rK = getK('right_knee'), rA = getK('right_ankle');
        const lS = getK('left_shoulder'), lH = getK('left_hip'), lK = getK('left_knee'), lA = getK('left_ankle');

        if (mode === 'squat_side' && rS && rH && rK && rA) {
            const tAngle = getAngleFromVertical(rS, rH), bAngle = getAngleFromVertical(rK, rA);
            ctx.fillStyle = "white"; ctx.font = "bold 20px sans-serif";
            ctx.fillText(`体幹: ${tAngle.toFixed(1)}° 脛: ${bAngle.toFixed(1)}°`, 20, 50);
            ctx.fillStyle = Math.abs(tAngle - bAngle) < 15 ? "#00ff00" : "#ff4444";
            ctx.fillText(Math.abs(tAngle - bAngle) < 15 ? "✅ 平行性良好" : "⚠️ 平行性不足", 20, 80);
        } 
        else if (mode === 'squat_front' && rH && rK && rA && lH && lK && lA) {
            const rAng = calculateAngle(rH, rK, rA), lAng = calculateAngle(lH, lK, lA);
            ctx.fillStyle = (rAng < 165 || lAng < 165) ? "#ff4444" : "#00ff00";
            ctx.font = "bold 20px sans-serif";
            ctx.fillText(`膝角度 L:${lAng.toFixed(1)}° R:${rAng.toFixed(1)}°`, 20, 50);
        }
        else if (mode === 'single_leg' && lH && rH) {
            let hX = (lH.x + rH.x)/2, hY = (lH.y + rH.y)/2;
            let tx = hX, ty = hY;
            if (homographyMatrix) {
                let m = homographyMatrix; let w = m[6]*hX + m[7]*hY + m[8];
                tx = (m[0]*hX + m[1]*hY + m[2])/w; ty = (m[3]*hX + m[4]*hY + m[5])/w;
            }
            const c = calib[modelName];
            if (c.state === 'waiting') { c.state = 'countdown'; c.countdownStart = performance.now(); }
            else if (c.state === 'countdown') {
                let rem = Math.ceil(4 - (performance.now() - c.countdownStart)/1000);
                ctx.fillStyle = "yellow"; ctx.font = "bold 30px sans-serif"; ctx.fillText(`⏳ 静止... ${rem}`, 20, 100);
                if (rem <= 0) c.state = 'calibrating';
            } else if (c.state === 'calibrating') {
                c.baseHipX = (c.baseHipX || 0) + tx; c.baseHipY = (c.baseHipY || 0) + ty;
                if (++c.frames >= 20) { c.baseHipX /= 20; c.baseHipY /= 20; c.state = 'done'; }
            } else if (c.state === 'done') {
                const rSiz = 250, rx = canvasObj.width - rSiz - 20, ry = canvasObj.height - rSiz - 20;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(rx, ry, rSiz, rSiz);
                let dx = (tx - c.baseHipX) * 3, dy = (ty - c.baseHipY) * 3;
                c.swayHistory.push({x: dx, y: dy}); if (c.swayHistory.length > 100) c.swayHistory.shift();
                ctx.beginPath(); ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 2;
                c.swayHistory.forEach((p, i) => { if(i===0) ctx.moveTo(rx+rSiz/2+p.x, ry+rSiz/2+p.y); else ctx.lineTo(rx+rSiz/2+p.x, ry+rSiz/2+p.y); });
                ctx.stroke();
                ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(rx+rSiz/2+dx, ry+rSiz/2+dy, 8, 0, 2*Math.PI); ctx.fill();
            }
        }
    }

    function computeH(p) {
        let x0=p[0].x, y0=p[0].y, x1=p[1].x, y1=p[1].y, x2=p[2].x, y2=p[2].y, x3=p[3].x, y3=p[3].y;
        let dx1=x1-x2, dx2=x3-x2, sx=x0-x1+x2-x3, dy1=y1-y2, dy2=y3-y2, sy=y0-y1+y2-y3, det=dx1*dy2-dy1*dx2;
        if (Math.abs(det) < 0.1) return;
        let g=(sx*dy2-sy*dx2)/det, h=(dx1*sy-dy1*sx)/det, a=x1-x0+g*x1, b=x3-x0+h*x3, c=x0, d=y1-y0+g*y1, e=y3-y0+h*y3, f=y0, detH=a*(e-f*h)-b*(d-f*g)+c*(d*h-e*g), i=1/detH;
        let inv=[(e-f*h)*i, (c*h-b)*i, (b*f-c*e)*i, (g*f-d)*i, (a-c*g)*i, (d*c-a*f)*i, (d*h-e*g)*i, (b*g-a*h)*i, (a*e-b*d)*i];
        homographyMatrix = [inv[0]*500, inv[1]*500, inv[2]*500, inv[3]*500, inv[4]*500, inv[5]*500, inv[6], inv[7], inv[8]];
    }

    init();
    document.getElementById('resetEvalBtn').onclick = () => { resetEvaluation(); homographyMatrix = null; markerCoords = {0:null,1:null,2:null,3:null}; };
</script>
</body>
</html>
